<!DOCTYPE html>

<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Field | IPL Fantasy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF6B35;--accent-soft:rgba(255,107,53,.14);--accent-glow:rgba(255,107,53,.3);
  --blue:#4facfe;--blue-soft:rgba(79,172,254,.12);
  --gold:#FFD700;--silver:#b8c8d8;
  --font-main:'Outfit',sans-serif;--font-mono:'DM Mono',monospace;--font-display:'Bebas Neue',cursive;
  --ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#060d1a;
  --mesh:radial-gradient(ellipse at 15% 5%,rgba(79,172,254,.12) 0%,transparent 50%),
        radial-gradient(ellipse at 85% 90%,rgba(255,107,53,.09) 0%,transparent 50%),#060d1a;
  --surf:rgba(255,255,255,.04);--surf2:rgba(10,20,40,.97);
  --brd:rgba(79,172,254,.12);--brd2:rgba(79,172,254,.22);
  --nav:rgba(6,13,26,.96);--t1:#eef2ff;--t2:rgba(238,242,255,.55);--t3:rgba(238,242,255,.28);
  --div:rgba(255,255,255,.055);--tog:rgba(255,255,255,.06);
  --field-bg1:#1e5c22;--field-bg2:#174d1a;--field-bg3:#0f3811;
  --pitch-c1:#c8a55c;--pitch-c2:#b8914a;
  --boundary:rgba(255,255,255,.2);
  --row-label:rgba(255,255,255,.55);
  --name-chip:rgba(0,0,0,.75);
}
[data-theme="light"]{
  --bg:#eae6df;
  --mesh:radial-gradient(ellipse at 20% 10%,rgba(79,172,254,.07) 0%,transparent 55%),#eae6df;
  --surf:rgba(255,255,255,.65);--surf2:rgba(255,255,255,.98);
  --brd:rgba(0,0,0,.08);--brd2:rgba(0,0,0,.14);
  --nav:rgba(234,230,223,.96);--t1:#17202e;--t2:rgba(23,32,46,.58);--t3:rgba(23,32,46,.34);
  --div:rgba(0,0,0,.07);--tog:rgba(0,0,0,.06);
  --field-bg1:#2e7d32;--field-bg2:#256326;--field-bg3:#1b4d1e;
  --pitch-c1:#d4b882;--pitch-c2:#c4a86c;
  --boundary:rgba(255,255,255,.28);
  --row-label:rgba(255,255,255,.8);
  --name-chip:rgba(0,0,0,.78);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{
  font-family:var(--font-main);background:var(--mesh);background-color:var(--bg);
  min-height:100vh;color:var(--t1);
  padding-bottom:calc(68px + 14px + 28px);
  overflow-x:hidden;transition:background-color .3s,color .3s;
}
#pitch-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.25;}
.page-wrap{position:relative;z-index:1;}

/* ── TOPBAR ── */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 20px 12px;animation:slideDown .5s var(–bounce) both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:none;}}
.topbar-left .sub{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(–accent);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.topbar-left .sub::before{content:’’;width:16px;height:2px;background:linear-gradient(90deg,var(–accent),transparent);border-radius:1px;}
.topbar-left h1{font-family:var(–font-display);font-size:36px;letter-spacing:.05em;line-height:1;background:linear-gradient(90deg,var(–t1),var(–accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-right{display:flex;gap:8px;align-items:center;padding-top:4px;}
.theme-btn{width:40px;height:40px;border-radius:14px;background:var(–tog);border:1px solid var(–brd2);color:var(–t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s var(–bounce);}
.theme-btn:active{transform:scale(.88);}

/* ── LEGEND ── */
.legend{display:flex;gap:10px;padding:0 20px 12px;flex-wrap:wrap;animation:fadeUp .5s var(–ease) .1s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(–t3);}
.legend-dot{width:16px;height:16px;border-radius:5px;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1;}

/* ══════════════════════════════════════
CRICKET FIELD
══════════════════════════════════════ */
.field-outer{
margin:0 12px;border-radius:32px;overflow:hidden;
box-shadow:0 16px 60px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.08);
animation:fadeUp .6s var(–bounce) .15s both;
position:relative;
}
.field{
position:relative;
background:radial-gradient(ellipse at 50% 50%, var(–field-bg1) 0%, var(–field-bg2) 55%, var(–field-bg3) 100%);
padding:12px 8px 14px;
/* subtle grass stripes */
background-image:
repeating-linear-gradient(180deg,rgba(0,0,0,.04) 0px,rgba(0,0,0,.04) 28px,transparent 28px,transparent 56px),
radial-gradient(ellipse at 50% 50%, var(–field-bg1) 0%, var(–field-bg2) 55%, var(–field-bg3) 100%);
}

/* Boundary oval — purely decorative */
.field::before{
content:’’;position:absolute;inset:10px;border-radius:50%;
border:1.5px dashed var(–boundary);pointer-events:none;
}

/* Pitch strip */
.pitch-strip{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
width:38px;height:210px;
background:linear-gradient(180deg,var(–pitch-c1),var(–pitch-c2),var(–pitch-c1));
border-radius:5px;border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 20px rgba(0,0,0,.4);
pointer-events:none;z-index:0;
}
/* Crease lines */
.pitch-strip::before,.pitch-strip::after{
content:’’;position:absolute;left:-8px;right:-8px;height:2px;
background:rgba(255,255,255,.6);border-radius:1px;
}
.pitch-strip::before{top:22px;}
.pitch-strip::after{bottom:22px;}

/* ── ROLE ROW ── */
.role-row{
position:relative;z-index:1;
display:flex;justify-content:center;align-items:flex-end;
gap:6px;padding:6px 4px 4px;flex-wrap:wrap;
}
.role-label{
text-align:center;font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
color:var(–row-label);text-shadow:0 1px 4px rgba(0,0,0,.6);
margin-bottom:4px;margin-top:4px;
}

/* ── PLAYER TOKEN ── */
.fp{
display:flex;flex-direction:column;align-items:center;gap:3px;
cursor:pointer;-webkit-tap-highlight-color:transparent;
animation:tokenIn .45s var(–bounce) both;
}
@keyframes tokenIn{from{opacity:0;transform:translateY(12px) scale(.8);}to{opacity:1;transform:none;}}
.fp:active .fp-avatar{transform:scale(.9);}

.fp-avatar-wrap{position:relative;}
.fp-avatar{
width:50px;height:50px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:22px;border:2.5px solid;
box-shadow:0 4px 16px rgba(0,0,0,.5);
transition:transform .2s var(–bounce),box-shadow .2s;
position:relative;overflow:hidden;
}
.fp:hover .fp-avatar{transform:scale(1.1);box-shadow:0 8px 24px rgba(0,0,0,.6);}
.fp-avatar::after{
content:’’;position:absolute;inset:0;border-radius:50%;
background:linear-gradient(145deg,rgba(255,255,255,.18),transparent 60%);
pointer-events:none;
}

/* Badges over avatar */
.fp-badge{
position:absolute;font-size:10px;line-height:1;
background:rgba(0,0,0,.7);border-radius:4px;padding:1px 3px;
font-weight:900;font-family:var(–font-mono);
backdrop-filter:blur(4px);
}
.fp-badge.cap-c{top:-4px;right:-4px;background:#ffc400;color:#1a0f00;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;box-shadow:0 0 10px rgba(255,196,0,.6);}
.fp-badge.cap-vc{top:-4px;right:-4px;background:#9ca8b4;color:#111;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;box-shadow:0 0 8px rgba(180,180,200,.4);}
.fp-badge.orange-cap{top:-4px;left:-4px;background:#FF6B35;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 0 10px rgba(255,107,53,.6);}
.fp-badge.purple-cap{bottom:-4px;left:-4px;background:#9b59b6;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 0 10px rgba(155,89,182,.6);}

/* Name chip */
.fp-name{
background:var(–name-chip);backdrop-filter:blur(8px);
border-radius:8px;padding:3px 7px;
font-size:9.5px;font-weight:800;color:#fff;
white-space:nowrap;max-width:74px;overflow:hidden;text-overflow:ellipsis;
text-align:center;letter-spacing:.01em;
box-shadow:0 2px 8px rgba(0,0,0,.5);
text-shadow:0 1px 3px rgba(0,0,0,.6);
}
/* Points chip */
.fp-pts{
font-family:var(–font-mono);font-size:9px;font-weight:600;
color:rgba(255,255,255,.85);text-shadow:0 1px 3px rgba(0,0,0,.7);
letter-spacing:.03em;
}

/* ══════════════════════════════════════
PLAYER DETAIL MODAL
══════════════════════════════════════ */
.modal{
display:none;position:fixed;inset:0;z-index:300;
background:rgba(0,0,0,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
align-items:flex-end;justify-content:center;
-webkit-tap-highlight-color:transparent;
}
.modal.open{display:flex;animation:overlayIn .22s var(–ease);}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}

.modal-sheet{
width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
border-radius:28px 28px 0 0;
background:var(–surf2);border:1px solid var(–brd2);border-bottom:none;
box-shadow:0 -16px 60px rgba(0,0,0,.7);
animation:sheetUp .35s var(–bounce) both;
position:relative;overflow:hidden;
}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:none;}}

/* Modal team color header */
.modal-header{
padding:20px 20px 16px;position:relative;overflow:hidden;
}
.modal-header::before{
content:’’;position:absolute;inset:0;opacity:.85;pointer-events:none;
}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);margin:0 auto 16px;position:relative;z-index:1;}
.modal-top{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}

/* Team logo badge in modal */
.team-logo{
width:60px;height:60px;border-radius:16px;
display:flex;flex-direction:column;align-items:center;justify-content:center;
border:1.5px solid rgba(255,255,255,.3);font-size:11px;
font-weight:900;letter-spacing:.08em;color:#fff;
box-shadow:0 4px 20px rgba(0,0,0,.4);flex-shrink:0;
text-shadow:0 1px 4px rgba(0,0,0,.5);gap:2px;
}
.team-logo .tl-abbr{font-family:var(–font-display);font-size:22px;line-height:1;letter-spacing:.04em;}
.team-logo .tl-full{font-size:7px;font-weight:700;letter-spacing:.06em;opacity:.8;}

.modal-player-info{flex:1;min-width:0;}
.modal-player-name{font-family:var(–font-display);font-size:28px;letter-spacing:.04em;line-height:1;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4);}
.modal-player-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px;font-weight:500;}
.modal-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.mbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:7px;display:flex;align-items:center;gap:4px;}
.mbadge.role{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);}
.mbadge.captain{background:rgba(255,196,0,.25);color:#ffc400;border:1px solid rgba(255,196,0,.4);}
.mbadge.vc{background:rgba(180,180,200,.2);color:#c8d0dc;border:1px solid rgba(180,180,200,.3);}
.mbadge.ocap{background:rgba(255,107,53,.2);color:#ff8c5a;border:1px solid rgba(255,107,53,.4);}
.mbadge.pcap{background:rgba(155,89,182,.2);color:#bb8fce;border:1px solid rgba(155,89,182,.4);}
.mbadge.price{background:rgba(255,215,0,.15);color:var(–gold);border:1px solid rgba(255,215,0,.25);font-family:var(–font-mono);}

/* Close button */
.modal-close{
position:absolute;top:16px;right:16px;z-index:2;
width:32px;height:32px;border-radius:10px;
background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);
color:#fff;font-size:14px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:transform .2s var(–bounce),background .2s;
}
.modal-close:hover{transform:scale(1.1) rotate(90deg);background:rgba(231,76,60,.4);}

/* Rank strip */
.rank-strip{
margin:0 20px 0;padding:12px 16px;border-radius:14px;
display:flex;align-items:center;gap:12px;
background:rgba(79,172,254,.08);border:1px solid rgba(79,172,254,.2);
}
.rank-num{font-family:var(–font-display);font-size:36px;line-height:1;color:var(–blue);}
.rank-info{flex:1;}
.rank-label{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(–t3);}
.rank-sub{font-size:12px;color:var(–t2);margin-top:2px;font-weight:500;}
.pts-big{font-family:var(–font-display);font-size:36px;line-height:1;color:var(–t1);text-align:right;}
.pts-big-label{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(–t3);text-align:right;}

/* Stats grid */
.stats-section{padding:14px 20px 24px;}
.stats-sec-title{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(–t3);margin:14px 0 8px;display:flex;align-items:center;gap:7px;}
.stats-sec-title::after{content:’’;flex:1;height:1px;background:linear-gradient(90deg,var(–div),transparent);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{
background:var(–surf);border:1px solid var(–brd);border-radius:14px;
padding:11px 12px;transition:transform .2s var(–bounce),border-color .2s;
}
.stat-box:hover{transform:scale(1.03);border-color:var(–brd2);}
.stat-box-icon{font-size:14px;margin-bottom:2px;display:block;}
.stat-box-val{font-family:var(–font-mono);font-size:20px;font-weight:500;color:var(–t1);line-height:1;margin-bottom:2px;}
.stat-box-label{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(–t3);}

/* Highlight zero stats */
.stat-box-val.zero{color:var(–t3);}

/* ── BOTTOM NAV ── */
.bottom-nav{
position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
width:calc(100% - 28px);max-width:480px;height:68px;
background:var(–nav);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
border:1px solid var(–brd2);border-radius:28px;
display:flex;justify-content:space-around;align-items:center;
padding:6px 2px;box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);z-index:100;
}
.nav-item{text-align:center;color:var(–t3);text-decoration:none;font-size:8px;font-weight:700;letter-spacing:.05em;flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .25s,transform .2s var(–bounce);}
.nav-item:active{transform:scale(.9);}
.nav-item.active{color:var(–accent);}
.nav-icon-wrap{width:36px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .2s var(–bounce);}
.nav-item.active .nav-icon-wrap{background:var(–accent-soft);box-shadow:0 0 12px rgba(255,107,53,.2);}
.nav-item:hover .nav-icon-wrap{transform:translateY(-2px);}
.nav-icon{font-size:16px;line-height:1;}

/* Loading / empty */
.field-loading{
height:480px;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:12px;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;
}
.field-loading-emoji{font-size:42px;animation:float 2.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
</style>

</head>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxe8ueJLArFFRBqnVIhYn6LBEAnHsU6El_BlKeRgXIdR5Xo4UNgLV79NiLWtQyfQpDy/exec";
const myTeamName=localStorage.getItem("teamName");
if(!myTeamName){window.location.href="index.html";}

/* ── THEME ── */
const savedTheme=localStorage.getItem("theme")||"dark";
document.documentElement.setAttribute("data-theme",savedTheme);
document.getElementById("theme-icon").textContent=savedTheme==="dark"?"☀️":"🌙";
function toggleTheme(){
  const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("theme",next);
  document.getElementById("theme-icon").textContent=next==="dark"?"☀️":"🌙";
}

/* ── PARTICLES ── */
(function(){
  const c=document.getElementById("pitch-canvas"),ctx=c.getContext("2d");
  let W,H,P=[];
  const EM=["🏏","⚡","✨","🌟","💫","•","•","•"];
  const resize=()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight;};
  const mk=()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:-Math.random()*.4-.1,s:Math.random()*7+4,e:EM[Math.floor(Math.random()*EM.length)],a:Math.random()*.2+.04,l:Math.random()*200+100});
  const init=()=>{P=Array.from({length:16},mk);};
  const tick=()=>{
    ctx.clearRect(0,0,W,H);
    const dk=document.documentElement.getAttribute("data-theme")==="dark";
    P.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.l--;if(p.l<=0||p.y<-20)P[i]=mk();
      ctx.save();ctx.globalAlpha=p.a*(dk?1:.3);ctx.font=`${p.s}px serif`;ctx.fillText(p.e,p.x,p.y);ctx.restore();});
    requestAnimationFrame(tick);
  };
  window.addEventListener("resize",()=>{resize();init();});resize();init();tick();
})();

/* ── TEAM COLOURS + LOGOS ── */
const TEAMS={
  MI:  {c1:"#004BA0",c2:"#1a6fd4",abbr:"MI",  full:"Mumbai Indians",          logo:"ipl team logo/mi.webp",  fb:"🔵"},
  CSK: {c1:"#c07c08",c2:"#FFD700",abbr:"CSK", full:"Chennai Super Kings",     logo:"ipl team logo/csk.jpg",  fb:"🟡"},
  RCB: {c1:"#8B0000",c2:"#ff4560",abbr:"RCB", full:"Royal Challengers",       logo:"ipl team logo/rcb.jpg",  fb:"🔴"},
  KKR: {c1:"#3A225D",c2:"#8b5cf6",abbr:"KKR", full:"Kolkata Knight Riders",   logo:"ipl team logo/kkr.webp", fb:"🟣"},
  DC:  {c1:"#17479E",c2:"#4facfe",abbr:"DC",  full:"Delhi Capitals",           logo:"ipl team logo/dc.webp",  fb:"🔷"},
  PBKS:{c1:"#c41920",c2:"#ff6b6b",abbr:"PBKS",full:"Punjab Kings",             logo:"ipl team logo/pk.webp",  fb:"🦁"},
  RR:  {c1:"#254AA5",c2:"#f542b3",abbr:"RR",  full:"Rajasthan Royals",         logo:"ipl team logo/rr.webp",  fb:"💗"},
  SRH: {c1:"#c04010",c2:"#ff8c00",abbr:"SRH", full:"Sunrisers Hyderabad",     logo:"ipl team logo/srh.webp", fb:"🟠"},
  GT:  {c1:"#1B2133",c2:"#3a5a9a",abbr:"GT",  full:"Gujarat Titans",           logo:"ipl team logo/gt.webp",  fb:"🛡️"},
  LSG: {c1:"#1d6b42",c2:"#5ec48a",abbr:"LSG", full:"Lucknow Super Giants",    logo:"ipl team logo/lsg.jpg",  fb:"🟢"},
};
function getTC(name){
  const u=(name||"").toUpperCase();
  for(const k of Object.keys(TEAMS))if(u.includes(k))return TEAMS[k];
  return{c1:"#2a3a5a",c2:"#4facfe",abbr:"IPL",full:"IPL Team",logo:"",fb:"🏏"};
}

const ROLE_EMOJI={BAT:"🏏",BOWL:"🎳",AR:"⚡",WK:"🧤"};
function getPts(p){return parseFloat(p["Total Points"]||p["Current Points"]||0)||0;}

/* ── DATA ── */
let allPlayersGlobal=[];
let leadersGlobal={};
let myPlayersGlobal=[];

async function api(body){
  try{const r=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify(body)});return r.json();}
  catch{return null;}
}

document.addEventListener("DOMContentLoaded",loadField);

async function loadField(){
  // Sync C/VC from sheet
  try{
    const rolesRes=await api({action:"getRoles",teamName:myTeamName});
    if(rolesRes?.status==="success"){
      if(rolesRes.captain)     localStorage.setItem("captain",rolesRes.captain);
      if(rolesRes.viceCaptain) localStorage.setItem("viceCaptain",rolesRes.viceCaptain);
    }
  }catch{}

  const [playersRes,leadersRes]=await Promise.all([
    api({action:"getPlayers"}),
    api({action:"getLeaders"})
  ]);

  if(!playersRes||playersRes.status!=="success"){
    document.getElementById("field-loading").innerHTML='<span style="font-size:32px">⚠️</span><br>Failed to load squad.';
    return;
  }

  allPlayersGlobal=playersRes.players||[];
  leadersGlobal=leadersRes?.leaders||{};
  myPlayersGlobal=allPlayersGlobal.filter(p=>p["Sold To"]===myTeamName);

  if(!myPlayersGlobal.length){
    document.getElementById("field-loading").innerHTML='<span style="font-size:42px">🏏</span><br>Your squad is empty.<br>Head to Squad to draft players!';
    return;
  }

  document.getElementById("field-loading").style.display="none";
  renderField();
}

function renderField(){
  const cap=localStorage.getItem("captain")||"";
  const vc =localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leadersGlobal.purpleCap?.name||"").trim().toLowerCase();

  // Group by role
  const groups={WK:[],BAT:[],AR:[],BOWL:[]};
  myPlayersGlobal.forEach(p=>{
    const r=p["Role"];
    if(groups[r])groups[r].push(p);else groups.BAT.push(p);
  });

  // Rank all players globally by points
  const sorted=[...allPlayersGlobal].sort((a,b)=>getPts(b)-getPts(a));
  const rankMap={};
  sorted.forEach((p,i)=>{rankMap[(p["Player Name"]||"").trim()]=i+1;});

  const container=document.getElementById("field-container");

  // Build rows: BOWL (top) → AR → BAT → WK (bottom) — like Dream11
  const rowOrder=[
    {key:"BOWL",label:"BOWLERS",roleKey:"BOWL"},
    {key:"AR",  label:"ALL-ROUNDERS",roleKey:"AR"},
    {key:"BAT", label:"BATTERS",roleKey:"BAT"},
    {key:"WK",  label:"WICKET-KEEPERS",roleKey:"WK"},
  ];

  let rowHtml="";
  rowOrder.forEach(({key,label,roleKey})=>{
    const players=groups[roleKey];
    if(!players.length)return;

    let tokenHtml=players.map((p,idx)=>{
      const name=p["Player Name"]||"";
      const nameLower=name.trim().toLowerCase();
      const isC=cap===name;const isVC=vc===name;
      const isOC=ocName&&nameLower===ocName;
      const isPC=pcName&&nameLower===pcName;
      const pts=getPts(p);
      const tc=getTC(p["IPL Team"]||"");
      const icon=ROLE_EMOJI[p["Role"]]||"🏏";
      const shortName=name.split(" ").slice(-1)[0]; // last name
      const delay=idx*0.06+0.1;

      let badgesHtml="";
      if(isC)  badgesHtml+=`<div class="fp-badge cap-c">C</div>`;
      else if(isVC) badgesHtml+=`<div class="fp-badge cap-vc">VC</div>`;
      if(isOC) badgesHtml+=`<div class="fp-badge orange-cap">🧢</div>`;
      if(isPC) badgesHtml+=`<div class="fp-badge purple-cap">🎩</div>`;

      const rank=rankMap[name.trim()]||999;

      const logoHTML=tc.logo
        ?`<img src="${tc.logo}" style="width:34px;height:34px;object-fit:contain;" alt="${tc.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;font-size:22px">${tc.fb}</span>`
        :`<span style="font-size:22px">${tc.fb}</span>`;

      return`<div class="fp" style="animation-delay:${delay}s" onclick="openPlayer('${encodeURIComponent(name)}')">
        <div class="fp-avatar-wrap">
          <div class="fp-avatar" style="background:linear-gradient(135deg,${tc.c1},${tc.c2});border-color:${tc.c2}88">${logoHTML}</div>
          ${badgesHtml}
        </div>
        <div class="fp-name">${shortName}</div>
        <div class="fp-pts">${pts} pts</div>
      </div>`;
    }).join("");

    rowHtml+=`
      <div class="role-label">${label}</div>
      <div class="role-row">${tokenHtml}</div>`;
  });

  // Insert rows (preserve pitch strip)
  const pitchStrip=container.querySelector(".pitch-strip");
  container.innerHTML="";
  container.appendChild(pitchStrip);
  const rowsDiv=document.createElement("div");
  rowsDiv.innerHTML=rowHtml;
  container.appendChild(rowsDiv);
}

/* ── PLAYER DETAIL MODAL ── */
function openPlayer(enc){
  const name=decodeURIComponent(enc);
  const p=myPlayersGlobal.find(x=>(x["Player Name"]||"")===name);
  if(!p)return;

  const tc=getTC(p["IPL Team"]||"");
  const cap=localStorage.getItem("captain")||"";
  const vc =localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leadersGlobal.purpleCap?.name||"").trim().toLowerCase();
  const pNameLower=name.trim().toLowerCase();
  const pts=getPts(p);

  // Rank
  const sorted=[...allPlayersGlobal].sort((a,b)=>getPts(b)-getPts(a));
  const rank=sorted.findIndex(x=>(x["Player Name"]||"").trim()===name.trim())+1;
  const total=sorted.length;

  // Header gradient
  const header=document.getElementById("modal-header");
  header.style.background=`linear-gradient(135deg,${tc.c1} 0%,${tc.c2} 100%)`;
  header.querySelector(".modal-handle").style.background="rgba(255,255,255,.25)";

  // Team logo in modal
  const logo=document.getElementById("modal-team-logo");
  logo.style.background=`linear-gradient(135deg,${tc.c1},${tc.c2})`;
  logo.style.borderColor="rgba(255,255,255,.3)";
  if(tc.logo){
    logo.innerHTML=`<img src="${tc.logo}" style="width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))" alt="${tc.abbr}" onerror="this.parentNode.innerHTML='<div class=\\'tl-abbr\\'>${tc.abbr}</div><div class=\\'tl-full\\'>${tc.full}</div>'">`;
  }else{
    logo.innerHTML=`<div class="tl-abbr">${tc.abbr}</div><div class="tl-full">${tc.full}</div>`;
  }

  document.getElementById("modal-name").textContent=name;
  document.getElementById("modal-sub").textContent=(p["IPL Team"]||"—")+" · "+(p["Role"]||"—")+" · ₹"+(p["Price Bought"]||"—")+" Cr";

  // Badges
  const badgesEl=document.getElementById("modal-badges");
  let badgesHtml=`<span class="mbadge role">${p["Role"]||"—"}</span>`;
  if(cap===name) badgesHtml+=`<span class="mbadge captain">👑 Captain</span>`;
  if(vc===name)  badgesHtml+=`<span class="mbadge vc">⭐ Vice-Captain</span>`;
  if(ocName&&pNameLower===ocName) badgesHtml+=`<span class="mbadge ocap">🧢 Orange Cap</span>`;
  if(pcName&&pNameLower===pcName) badgesHtml+=`<span class="mbadge pcap">🎩 Purple Cap</span>`;
  badgesHtml+=`<span class="mbadge price">₹${p["Price Bought"]||"—"} Cr</span>`;
  badgesEl.innerHTML=badgesHtml;

  // Rank
  document.getElementById("modal-rank").textContent="#"+rank;
  document.getElementById("modal-rank-sub").textContent=`out of ${total} players`;
  document.getElementById("modal-pts").textContent=pts;

  // Stats sections
  const statDefs={
    batting:[
      {key:"Runs",    icon:"🏃",label:"Runs"},
      {key:"6s",      icon:"💥",label:"Sixes"},
      {key:"4s",      icon:"4️⃣",label:"Fours"},
      {key:"50s",     icon:"⭐",label:"50s"},
      {key:"100s",    icon:"💯",label:"100s"},
    ],
    bowling:[
      {key:"Wickets", icon:"🎯",label:"Wickets"},
      {key:"Maidens", icon:"🔵",label:"Maidens"},
      {key:"Dots",    icon:"⚫",label:"Dot Balls"},
      {key:"3W",      icon:"🎳",label:"3-Wkt Haul"},
      {key:"5W",      icon:"🔥",label:"5-Wkt Haul"},
      {key:"fourv",   icon:"⚡",label:"4-Wkt Haul"},
    ],
    fielding:[
      {key:"Catches",   icon:"🧤",label:"Catches"},
      {key:"Run Outs",  icon:"🏃",label:"Run Outs"},
      {key:"Stumpings", icon:"🥅",label:"Stumpings"},
    ]
  };

  let statsHtml="";
  const sections=[
    {title:"Batting",defs:statDefs.batting},
    {title:"Bowling",defs:statDefs.bowling},
    {title:"Fielding",defs:statDefs.fielding},
  ];
  sections.forEach(sec=>{
    statsHtml+=`<div class="stats-sec-title">${sec.title}</div><div class="stats-grid">`;
    sec.defs.forEach(d=>{
      const val=parseFloat(p[d.key])||0;
      statsHtml+=`<div class="stat-box">
        <span class="stat-box-icon">${d.icon}</span>
        <div class="stat-box-val${val===0?" zero":""}">${val}</div>
        <div class="stat-box-label">${d.label}</div>
      </div>`;
    });
    statsHtml+="</div>";
  });

  document.getElementById("modal-stats").innerHTML=statsHtml;

  document.getElementById("player-modal").classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.getElementById("player-modal").classList.remove("open");
  document.body.style.overflow="";
}
function handleModalOverlay(e){if(e.target===document.getElementById("player-modal"))closeModal();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
</script>
