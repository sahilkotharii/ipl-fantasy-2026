<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL Fantasy 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ─── DESIGN TOKENS ─────────────────────────────── */
        :root {
            --accent: #FF6B35;
            --accent-soft: rgba(255, 107, 53, 0.15);
            --radius-card: 22px;
            --radius-input: 14px;
            --radius-btn: 14px;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ─── DARK THEME ─────────────────────────────────── */
        [data-theme="dark"] {
            --bg: #080d14;
            --bg-mesh: radial-gradient(ellipse at 20% 20%, rgba(30, 60, 100, 0.5) 0%, transparent 60%),
                       radial-gradient(ellipse at 80% 80%, rgba(20, 40, 70, 0.4) 0%, transparent 60%),
                       radial-gradient(ellipse at 50% 50%, #0a1220 0%, #080d14 100%);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            --input-bg: rgba(0, 0, 0, 0.25);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus: rgba(255, 107, 53, 0.4);
            --text-primary: #f0f2f5;
            --text-secondary: rgba(240, 242, 245, 0.5);
            --text-muted: rgba(240, 242, 245, 0.3);
            --btn-primary-bg: #f0f2f5;
            --btn-primary-text: #0a1220;
            --theme-toggle-bg: rgba(255,255,255,0.06);
        }

        /* ─── LIGHT THEME ────────────────────────────────── */
        [data-theme="light"] {
            --bg: #f0ece6;
            --bg-mesh: radial-gradient(ellipse at 20% 20%, rgba(255, 200, 150, 0.25) 0%, transparent 60%),
                       radial-gradient(ellipse at 80% 80%, rgba(200, 180, 255, 0.15) 0%, transparent 60%),
                       radial-gradient(ellipse at 50% 50%, #f5f1eb 0%, #ece8e1 100%);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.04);
            --input-border: rgba(0, 0, 0, 0.1);
            --input-focus: rgba(255, 107, 53, 0.35);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(26, 26, 46, 0.55);
            --text-muted: rgba(26, 26, 46, 0.35);
            --btn-primary-bg: #1a1a2e;
            --btn-primary-text: #f0ece6;
            --theme-toggle-bg: rgba(0,0,0,0.06);
        }

        /* ─── RESET ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg-mesh);
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            transition: background-color var(--transition), color var(--transition);
            padding: 20px;
        }

        /* ─── THEME TOGGLE ───────────────────────────────── */
        .theme-btn {
            position: fixed;
            top: 18px; right: 18px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--theme-toggle-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 17px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            transition: all var(--transition);
            z-index: 999;
        }
        .theme-btn:active { transform: scale(0.92); }

        /* ─── GLASS CARD ─────────────────────────────────── */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: var(--radius-card);
            width: 100%;
            max-width: 380px;
            padding: 36px 28px 32px;
            animation: slideUp 0.45s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── HEADER ─────────────────────────────────────── */
        .logo {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 28px;
            line-height: 1.2;
        }

        /* ─── INPUTS ─────────────────────────────────────── */
        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-input);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        input::placeholder { color: var(--text-muted); }

        .hidden { display: none !important; }

        /* ─── BUTTONS ────────────────────────────────────── */
        .btn-primary {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: none;
            border-radius: var(--radius-btn);
            font-family: var(--font-main);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.01em;
        }

        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-accent {
            background: var(--accent);
            color: #fff;
        }

        /* ─── TOGGLE TEXT ────────────────────────────────── */
        .toggle-row {
            margin-top: 22px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toggle-row button {
            background: none;
            border: none;
            color: var(--accent);
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* ─── DIVIDER ─────────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--input-border);
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <span id="theme-icon">☀️</span>
    </button>

    <div class="card" id="auth-card">
        <p class="logo">IPL Fantasy 2026</p>
        <h2 id="form-title">Welcome back</h2>

        <form id="auth-form" autocomplete="off">
            <div class="field">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="field hidden" id="team-name-group">
                <label>Team Name</label>
                <input type="text" id="team-name" placeholder="e.g. Mumbai Mavericks">
            </div>

            <div class="field">
                <label>4-Digit PIN</label>
                <input type="password" id="pin" placeholder="••••" pattern="\d{4}" maxlength="4" inputmode="numeric" required>
            </div>

            <div class="field hidden" id="confirm-pin-group">
                <label>Confirm PIN</label>
                <input type="password" id="confirm-pin" placeholder="••••" pattern="\d{4}" maxlength="4" inputmode="numeric">
            </div>

            <button type="submit" class="btn-primary btn-accent" id="submit-btn">Login</button>
        </form>

        <div class="toggle-row">
            <span id="toggle-label">Don't have an account?</span>
            <button onclick="toggleForm()" id="toggle-btn"> Sign Up</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxe8ueJLArFFRBqnVIhYn6LBEAnHsU6El_BlKeRgXIdR5Xo4UNgLV79NiLWtQyfQpDy/exec";

        // ─── THEME ────────────────────────────────────────
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
        document.getElementById("theme-icon").textContent = savedTheme === "dark" ? "☀️" : "🌙";

        function toggleTheme() {
            const cur = document.documentElement.getAttribute("data-theme");
            const next = cur === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);
            document.getElementById("theme-icon").textContent = next === "dark" ? "☀️" : "🌙";
        }

        // ─── FORM TOGGLE ──────────────────────────────────
        let isLogin = true;

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Welcome back" : "Create your squad";
            document.getElementById('team-name-group').classList.toggle('hidden', isLogin);
            document.getElementById('confirm-pin-group').classList.toggle('hidden', isLogin);
            document.getElementById('submit-btn').innerText = isLogin ? "Login" : "Sign Up";
            document.getElementById('toggle-label').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-btn').innerText = isLogin ? " Sign Up" : " Login";

            if (!isLogin) {
                document.getElementById('team-name').setAttribute('required', 'true');
                document.getElementById('confirm-pin').setAttribute('required', 'true');
            } else {
                document.getElementById('team-name').removeAttribute('required');
                document.getElementById('confirm-pin').removeAttribute('required');
            }
        }

        // ─── SUBMIT ───────────────────────────────────────
        document.getElementById('auth-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const name = document.getElementById('name').value.trim();
            const pin = document.getElementById('pin').value;
            const action = isLogin ? 'login' : 'signup';
            let payload = { action, name, pin };

            if (!isLogin) {
                const teamName = document.getElementById('team-name').value.trim();
                const confirmPin = document.getElementById('confirm-pin').value;
                if (pin !== confirmPin) { alert("PINs do not match!"); return; }
                payload.teamName = teamName;
            }

            btn.innerText = "One sec...";
            btn.disabled = true;

            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === "success") {
                    localStorage.setItem("userName", name);
                    localStorage.setItem("teamName", isLogin ? result.teamName : payload.teamName);
                    window.location.href = "dashboard.html";
                } else {
                    alert(result.message);
                }
            } catch {
                alert("Connection failed. Check your Web App URL.");
            } finally {
                btn.innerText = isLogin ? "Login" : "Sign Up";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
