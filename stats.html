<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Stats | IPL Fantasy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF6B35;--accent-soft:rgba(255,107,53,.14);--accent-glow:rgba(255,107,53,.3);
  --blue:#4facfe;--blue-soft:rgba(79,172,254,.12);--blue-glow:rgba(79,172,254,.25);
  --neon:#39ff85;
  --font-main:'Outfit',sans-serif;--font-mono:'DM Mono',monospace;--font-display:'Bebas Neue',cursive;
  --ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#07101f;
  --mesh:radial-gradient(ellipse at 15% 5%,rgba(79,172,254,.13) 0%,transparent 50%),
        radial-gradient(ellipse at 85% 85%,rgba(255,107,53,.10) 0%,transparent 50%),#07101f;
  --surf:rgba(255,255,255,.04);--surf2:rgba(8,16,34,.94);
  --brd:rgba(79,172,254,.12);--brd2:rgba(79,172,254,.22);
  --nav:rgba(7,16,31,.95);--t1:#eef2ff;--t2:rgba(238,242,255,.52);--t3:rgba(238,242,255,.28);
  --div:rgba(255,255,255,.055);--inp:rgba(0,0,0,.3);--ibrd:rgba(79,172,254,.15);
  --ov:rgba(0,0,0,.88);--tog:rgba(255,255,255,.06);
  --cur:rgba(0,0,0,.2);--th:rgba(79,172,254,.06);--sheet:#0a1628;
  --row-hover:rgba(79,172,254,.04);
}
[data-theme="light"]{
  --bg:#f0ece6;
  --mesh:radial-gradient(ellipse at 20% 10%,rgba(255,200,150,.2) 0%,transparent 55%),#f0ece6;
  --surf:rgba(255,255,255,.65);--surf2:rgba(255,255,255,.97);
  --brd:rgba(0,0,0,.07);--brd2:rgba(0,0,0,.13);
  --nav:rgba(240,236,230,.92);--t1:#1a1a2e;--t2:rgba(26,26,46,.55);--t3:rgba(26,26,46,.32);
  --div:rgba(0,0,0,.07);--inp:rgba(0,0,0,.05);--ibrd:rgba(0,0,0,.1);
  --ov:rgba(0,0,0,.82);--tog:rgba(0,0,0,.06);
  --cur:rgba(0,0,0,.03);--th:rgba(0,0,0,.04);--sheet:#f5f1ec;
  --row-hover:rgba(0,0,0,.03);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-main);background:var(--mesh);background-color:var(--bg);
  min-height:100vh;color:var(--t1);padding-bottom:calc(68px + 14px + 28px);
  overflow-x:hidden;transition:background-color .3s,color .3s;
}

/* ── PARTICLES ── */
#pitch-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.3;}

/* ── TOPBAR ── */
.topbar{
  position:relative;z-index:1;
  display:flex;justify-content:space-between;align-items:flex-start;padding:24px 20px 10px;
  animation:slideDown .5s var(--bounce) both;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:none;}}
.topbar-left .greeting{
  font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  margin-bottom:3px;display:flex;align-items:center;gap:5px;
}
.topbar-left .greeting::before{content:'';width:16px;height:2px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:1px;}
.topbar-left h1{
  font-family:var(--font-display);font-size:34px;letter-spacing:.06em;line-height:1;
  background:linear-gradient(90deg,var(--t1),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar-left p{font-size:12px;color:var(--t3);margin-top:4px;font-weight:500;}
.theme-btn{
  width:40px;height:40px;border-radius:14px;background:var(--tog);border:1px solid var(--brd2);
  color:var(--t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .2s var(--bounce),background .3s;
}
.theme-btn:active{transform:scale(.86);}

/* ── SEARCH ── */
.search-wrap{
  margin:0 16px 14px;position:relative;z-index:1;
  animation:fadeUp .4s var(--ease) .1s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.search-bar{
  width:100%;padding:13px 14px 13px 42px;border-radius:16px;
  border:1px solid var(--ibrd);background:var(--inp);color:var(--t1);
  font-family:var(--font-main);font-size:14px;outline:none;-webkit-appearance:none;
  transition:border-color .25s,box-shadow .25s;
}
.search-bar:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.12);}
.search-bar::placeholder{color:var(--t3);}

/* ── LIST WRAPPER ── */
.list-wrap{
  position:relative;z-index:1;margin:0 16px 16px;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--brd);border-radius:24px;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
  animation:fadeUp .4s var(--ease) .15s both;
}
[data-theme="light"] .list-wrap{background:rgba(255,255,255,.6);}

/* ── PLAYER ROW ── */
.player-row{
  display:flex;align-items:center;padding:0;
  border-bottom:1px solid var(--div);
  position:relative;overflow:hidden;
  animation:rowIn .35s var(--ease) both;
  transition:transform .2s var(--bounce);
  cursor:pointer;
}
.player-row:last-child{border-bottom:none;}
.player-row:active{transform:scale(.99);}

/* Team gradient BG */
.row-bg{
  position:absolute;inset:0;pointer-events:none;opacity:.18;transition:opacity .25s;
}
[data-theme="light"] .row-bg{opacity:.09;}
.player-row:hover .row-bg{opacity:.3;}
[data-theme="light"] .player-row:hover .row-bg{opacity:.16;}

/* Shimmer */
.row-shimmer{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  transform:translateX(-100%);
}
.player-row:hover .row-shimmer{animation:shimmerSlide .55s var(--ease);}
@keyframes shimmerSlide{to{transform:translateX(100%);}}

/* Left accent */
.row-accent{
  position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;
  transition:width .2s var(--bounce);
}
.player-row:hover .row-accent{width:5px;}

/* Row content */
.row-content{
  position:relative;z-index:1;display:flex;align-items:center;
  gap:12px;padding:13px 16px 13px 20px;width:100%;
}

/* Avatar */
.p-avatar{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:1px solid rgba(255,255,255,.08);
  transition:transform .2s var(--bounce);
}
[data-theme="light"] .p-avatar{border-color:rgba(0,0,0,.07);}
.player-row:hover .p-avatar{transform:scale(1.1) rotate(-4deg);}

.p-info{flex:1;min-width:0;}
.p-name{
  font-size:14px;font-weight:800;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.p-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}

/* Badges */
.badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.05em;text-transform:uppercase;}
.badge.bat{background:rgba(79,172,254,.15);color:#4facfe;}
.badge.bowl{background:rgba(231,76,60,.15);color:#e74c3c;}
.badge.ar{background:rgba(241,196,15,.15);color:#f1c40f;}
.badge.wk{background:rgba(155,89,182,.15);color:#bb8fce;}
.badge.owned{background:rgba(79,172,254,.1);color:var(--blue);}
.badge.unsold{background:rgba(255,255,255,.05);color:var(--t3);}
[data-theme="light"] .badge.unsold{background:rgba(0,0,0,.05);}

.p-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* Points pill */
.pts-pill{
  background:var(--accent-soft);border:1px solid var(--accent-glow);border-radius:12px;
  padding:6px 10px;text-align:center;
  transition:transform .2s var(--bounce);
}
.player-row:hover .pts-pill{transform:scale(1.06);}
.pts-pill .pv{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--accent);display:block;line-height:1;}
.pts-pill .pl{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);opacity:.65;margin-top:2px;}

/* Action buttons */
.p-actions{display:flex;gap:5px;}
.act-btn{
  width:36px;height:36px;border-radius:11px;border:1px solid var(--brd);
  background:var(--surf);color:var(--t2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--bounce),background .2s,border-color .2s,box-shadow .2s;
  touch-action:manipulation;
}
.act-btn:hover{transform:scale(1.08);}
.act-btn:active{transform:scale(.88);}
.act-btn.add{
  background:var(--accent-soft);border-color:var(--accent-glow);color:var(--accent);font-size:18px;font-weight:700;
  box-shadow:0 2px 10px rgba(255,107,53,.2);
}
.act-btn.add:hover{box-shadow:0 4px 16px rgba(255,107,53,.35);}
.act-btn.edit{background:var(--blue-soft);border-color:var(--blue-glow);color:var(--blue);}

@keyframes rowIn{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:none;}}
.empty-state{padding:40px 20px;text-align:center;color:var(--t3);font-size:14px;}

/* ══════════════════════════════════
   BOTTOM SHEET / MODAL
══════════════════════════════════ */
.modal{
  display:none;position:fixed;inset:0;
  background:var(--ov);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  z-index:200;align-items:flex-end;justify-content:center;
}
.modal.open{display:flex;}
.modal-sheet{
  background:var(--sheet);border:1px solid var(--brd2);border-radius:28px 28px 0 0;
  width:100%;max-height:93vh;display:flex;flex-direction:column;
  animation:sheetUp .32s var(--ease);
  box-shadow:0 -20px 60px rgba(0,0,0,.55);
}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:none;}}

/* Sheet top */
.sheet-top{flex-shrink:0;padding:14px 20px 0;border-bottom:1px solid var(--div);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--t3);margin:0 auto 14px;opacity:.4;}
.sheet-title-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.sheet-title-row h3{
  font-family:var(--font-display);font-size:24px;letter-spacing:.05em;
  background:linear-gradient(90deg,var(--t1),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sheet-title-row p{font-size:11px;color:var(--t3);margin-top:3px;font-weight:500;}
.close-btn{
  width:34px;height:34px;border-radius:11px;background:var(--tog);border:1px solid var(--brd);
  color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .2s var(--bounce),background .2s;
}
.close-btn:hover{transform:scale(1.1) rotate(90deg);background:rgba(255,60,40,.2);}

/* Mode tabs */
.mode-row{
  display:flex;gap:5px;margin-bottom:14px;
  background:var(--inp);border:1px solid var(--ibrd);border-radius:14px;padding:4px;
}
.mode-tab{
  flex:1;padding:9px;border-radius:10px;border:none;background:transparent;
  color:var(--t3);font-family:var(--font-main);font-size:11px;font-weight:800;cursor:pointer;
  transition:all .22s var(--bounce);letter-spacing:.04em;text-transform:uppercase;
}
.mode-tab.active.add-tab{
  background:linear-gradient(135deg,var(--accent),#ff8c5a);color:#fff;
  box-shadow:0 3px 14px rgba(255,107,53,.35);
}
.mode-tab.active.edit-tab{
  background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;
  box-shadow:0 3px 14px rgba(231,76,60,.3);
}

/* Sheet body */
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.sheet-body::-webkit-scrollbar{display:none;}

/* Current stats table */
.cur-stats-wrap{padding:14px 16px 8px;}
.cur-stats-label{
  font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.cur-stats-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--div),transparent);}
.tbl-scroll{overflow-x:auto;border-radius:14px;border:1px solid var(--brd);background:var(--cur);scrollbar-width:thin;}
.tbl-scroll::-webkit-scrollbar{height:3px;}
.tbl-scroll::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
.cur-tbl{border-collapse:collapse;width:100%;}
.cur-tbl th{
  padding:8px 12px;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);background:var(--th);text-align:center;white-space:nowrap;
}
.cur-tbl td{
  padding:10px 12px;font-family:var(--font-mono);font-size:14px;font-weight:600;
  text-align:center;color:var(--t2);border-top:1px solid var(--div);white-space:nowrap;
}
.cur-tbl td.hi{color:var(--blue);}
.cur-tbl td.pts-cell{font-size:17px;font-weight:700;color:var(--accent);background:rgba(255,107,53,.07);}
.scroll-hint{text-align:center;font-size:10px;color:var(--t3);margin:5px 0 0;letter-spacing:.05em;}

/* Mode hint */
.mode-hint{
  margin:4px 16px 0;padding:10px 14px;border-radius:12px;border:1px solid;
  font-size:12px;line-height:1.55;
}
.mode-hint.add-hint{background:var(--accent-soft);border-color:rgba(255,107,53,.2);color:var(--t2);}
.mode-hint.add-hint b{color:var(--accent);}
.mode-hint.edit-hint{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.2);color:var(--t2);}
.mode-hint.edit-hint b{color:#e74c3c;}

/* Stat sections */
.stat-section{padding:16px 16px 0;}
.sec-title{
  font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--div);
  display:flex;align-items:center;gap:7px;
}
.sec-title::before{content:'';width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.sec-title.c-bat{color:#4facfe;}.sec-title.c-bat::before{background:#4facfe;}
.sec-title.c-bowl{color:#e74c3c;}.sec-title.c-bowl::before{background:#e74c3c;}
.sec-title.c-field{color:#52c8ff;}.sec-title.c-field::before{background:#52c8ff;}
.sec-title.c-ms{color:#f1c40f;}.sec-title.c-ms::before{background:#f1c40f;}
.sec-title.c-custom{color:#a29bfe;}.sec-title.c-custom::before{background:#a29bfe;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.sig{display:flex;flex-direction:column;}
.sig label{
  font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--t2);margin-bottom:7px;line-height:1.3;min-height:22px;
}

/* Stepper control */
.sig-ctrl{
  display:grid;grid-template-columns:42px 1fr 42px;
  border:1px solid var(--ibrd);border-radius:13px;overflow:hidden;
  background:var(--inp);
  transition:border-color .25s,box-shadow .25s;
}
.sig-ctrl:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.12);}
.step-btn{
  background:transparent;border:none;color:var(--t3);font-size:22px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;height:50px;
  transition:background .2s,color .2s;touch-action:manipulation;
}
.step-btn.minus{border-right:1px solid var(--ibrd);}
.step-btn.plus{border-left:1px solid var(--ibrd);}
.step-btn:active{background:var(--accent-soft);color:var(--accent);}
.sig input{
  width:100%;padding:8px 4px;border:none;background:transparent;
  color:var(--t1);font-family:var(--font-mono);font-size:20px;font-weight:700;
  text-align:center;outline:none;-webkit-appearance:none;min-width:0;
}
.sig input::-webkit-outer-spin-button,.sig input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.sig input[type=number]{-moz-appearance:textfield;}

/* Sheet footer */
.sheet-footer{
  flex-shrink:0;padding:14px 20px 36px;border-top:1px solid var(--div);
  background:var(--sheet);
}
.footer-note{font-size:11px;color:var(--t3);text-align:center;margin-bottom:10px;line-height:1.5;}
.footer-note b{color:var(--accent);}
.footer-note b.red{color:#e74c3c;}
.submit-btn{
  width:100%;padding:16px;color:#fff;border:none;border-radius:16px;
  font-family:var(--font-main);font-size:15px;font-weight:800;cursor:pointer;
  letter-spacing:.03em;
  transition:transform .15s var(--bounce),opacity .2s,box-shadow .2s;
}
.submit-btn:active{transform:scale(.97);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-add{
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  box-shadow:0 6px 22px rgba(255,107,53,.4);
}
.btn-add:hover:not(:disabled){box-shadow:0 8px 28px rgba(255,107,53,.5);transform:translateY(-1px);}
.btn-edit{
  background:linear-gradient(135deg,#e74c3c,#c0392b);
  box-shadow:0 6px 22px rgba(231,76,60,.35);
}
.btn-edit:hover:not(:disabled){box-shadow:0 8px 28px rgba(231,76,60,.45);transform:translateY(-1px);}

/* ── TEAM COLOURS ── */
/* (shared with other pages for consistent row gradients) */

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  width:calc(100% - 28px);max-width:480px;height:68px;
  background:var(--nav);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid var(--brd);border-radius:28px;
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 2px;box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);z-index:100;
}
.nav-item{
  text-align:center;color:var(--t3);text-decoration:none;font-size:8px;font-weight:700;letter-spacing:.05em;
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .25s;
}
.nav-item.active{color:var(--accent);}
.nav-icon-wrap{width:36px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .2s var(--bounce);}
.nav-item.active .nav-icon-wrap{background:var(--accent-soft);box-shadow:0 0 12px rgba(255,107,53,.2);}
.nav-item:hover .nav-icon-wrap{transform:translateY(-2px);}
.nav-icon{font-size:16px;line-height:1;}
</style>
</head>
<body>
<canvas id="pitch-canvas"></canvas>

<div class="topbar">
  <div class="topbar-left">
    <p class="greeting" id="role-label">Stats</p>
    <h1>Match Stats</h1>
    <p id="role-desc">Loading…</p>
  </div>
  <button class="theme-btn" onclick="toggleTheme()"><span id="theme-icon">☀️</span></button>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-bar" id="search-bar" type="text" placeholder="Search players…" oninput="renderList()">
</div>

<div class="list-wrap">
  <div id="player-list"><div class="empty-state">Loading players…</div></div>
</div>

<!-- BOTTOM SHEET -->
<div id="stat-modal" class="modal" onclick="handleOverlay(event)">
  <div class="modal-sheet">
    <div class="sheet-top">
      <div class="sheet-handle"></div>
      <div class="sheet-title-row">
        <div>
          <h3 id="modal-name">Player</h3>
          <p id="modal-team">—</p>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="mode-row">
        <button class="mode-tab add-tab active" id="tab-add"  onclick="setMode('add')">＋ Add Stats</button>
        <button class="mode-tab edit-tab"       id="tab-edit" onclick="setMode('edit')">✏️ Edit / Replace</button>
      </div>
    </div>
    <div class="sheet-body" id="sheet-body">
      <div class="cur-stats-wrap">
        <div class="cur-stats-label">📊 Current Stats</div>
        <div class="tbl-scroll">
          <table class="cur-tbl">
            <thead id="cur-thead"></thead>
            <tbody id="cur-tbody"></tbody>
          </table>
        </div>
        <p class="scroll-hint">← swipe to see all →</p>
      </div>
      <div id="mode-hint-wrap" class="mode-hint add-hint"><b>＋ Add mode:</b> values are added on top of current totals.</div>
      <div id="dynamic-form"></div>
      <div style="height:16px"></div>
    </div>
    <div class="sheet-footer">
      <p class="footer-note" id="footer-note">Stats will be <b>added</b> to totals.</p>
      <button class="submit-btn btn-add" id="submit-btn" onclick="submitStats()">＋ Add Stats &amp; Update Points</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">🏠</span></div>Home</a>
  <a href="squad.html"     class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">🛡️</span></div>Squad</a>
  <a href="players.html"   class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">🃏</span></div>Cards</a>
  <a href="teams.html"     class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">👥</span></div>Teams</a>
  <a href="stats.html"     class="nav-item active"><div class="nav-icon-wrap"><span class="nav-icon">📊</span></div>Stats</a>
  <a href="settings.html"  class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">⚙️</span></div>Settings</a>
</nav>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxe8ueJLArFFRBqnVIhYn6LBEAnHsU6El_BlKeRgXIdR5Xo4UNgLV79NiLWtQyfQpDy/exec";
const myTeam=localStorage.getItem("teamName")||"";
if(!myTeam){window.location.href="index.html";}
const isAdmin=myTeam==="Admin";
let allPlayers=[],pointsConfig=[],curPlayer=null,curMode="add";

/* ── THEME ── */
const savedTheme=localStorage.getItem("theme")||"dark";
document.documentElement.setAttribute("data-theme",savedTheme);
document.getElementById("theme-icon").textContent=savedTheme==="dark"?"☀️":"🌙";
function toggleTheme(){
  const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("theme",next);
  document.getElementById("theme-icon").textContent=next==="dark"?"☀️":"🌙";
}

/* ── PARTICLES ── */
(function(){
  const canvas=document.getElementById("pitch-canvas");
  const ctx=canvas.getContext("2d");
  let W,H,p=[];
  const EM=["📊","⚡","✨","🌟","💫","•","•","•","•"];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:-Math.random()*.4-.1,s:Math.random()*7+4,e:EM[Math.floor(Math.random()*EM.length)],a:Math.random()*.2+.04,l:Math.random()*200+100};}
  function init(){p=Array.from({length:18},mk);}
  function tick(){
    ctx.clearRect(0,0,W,H);
    const dark=document.documentElement.getAttribute("data-theme")==="dark";
    p.forEach((q,i)=>{q.x+=q.vx;q.y+=q.vy;q.l--;if(q.l<=0||q.y<-20)p[i]=mk();
      ctx.save();ctx.globalAlpha=q.a*(dark?1:.35);ctx.font=`${q.s}px serif`;ctx.fillText(q.e,q.x,q.y);ctx.restore();});
    requestAnimationFrame(tick);
  }
  window.addEventListener("resize",()=>{resize();init();});resize();init();tick();
})();

/* ── TEAM COLOURS for row gradients ── */
const TEAMS={
  MI:{c1:"#004BA0",c2:"#1a6fd4"},CSK:{c1:"#c07c08",c2:"#FFD700"},RCB:{c1:"#8B0000",c2:"#ff4560"},
  KKR:{c1:"#3A225D",c2:"#8b5cf6"},DC:{c1:"#17479E",c2:"#4facfe"},PBKS:{c1:"#c41920",c2:"#ff6b6b"},
  RR:{c1:"#254AA5",c2:"#f542b3"},SRH:{c1:"#c04010",c2:"#ff8c00"},GT:{c1:"#1B2133",c2:"#3a5a9a"},LSG:{c1:"#1d6b42",c2:"#5ec48a"},
};
function getTC(n){
  const u=(n||"").toUpperCase();
  for(const k of Object.keys(TEAMS)) if(u.includes(k)) return TEAMS[k];
  return{c1:"#2a3a5a",c2:"#4facfe"};
}

/* ── HELPERS ── */
function getPts(p){return parseFloat(p["Total Points"]||p["Current Points"]||0)||0;}
function n(v){return parseInt(v)||0;}
function keyAlias(key){
  const a={fours:"4s",sixes:"6s",fifties:"50s",hundreds:"100s",
    runouts:"Run Outs",threew:"3W",fivew:"5W",fourv:"fourv",
    maidens:"Maidens",dots:"Dots",catches:"Catches",wickets:"Wickets",runs:"Runs",stumpings:"Stumpings"};
  return a[key.toLowerCase()]||key;
}
function roleClass(r){return{BOWL:"bowl",AR:"ar",WK:"wk"}[r]||"bat";}
const roleEmoji={BAT:"🏏",BOWL:"🎳",AR:"⚡",WK:"🧤"};
const TIER_COLOR={gold:"#FFD700",silver:"#C0C8D8",bronze:"#CD7F32"};

/* ── INIT ── */
document.addEventListener("DOMContentLoaded",async()=>{
  document.getElementById("role-label").innerText=isAdmin?"Admin Panel":"My Squad";
  document.getElementById("role-desc").innerText=isAdmin?"Update stats for any player":"Your players only";
  await Promise.all([loadConfig(),loadPlayers()]);
});

async function loadConfig(){
  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getPointsConfig"})});
    const r=await res.json();
    if(r.status==="success") pointsConfig=r.config;
  }catch(e){console.warn("Config:",e);}
}

async function loadPlayers(){
  const container=document.getElementById("player-list");
  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getPlayers"})});
    const r=await res.json();
    if(r.status==="success"){
      allPlayers=isAdmin?r.players:r.players.filter(p=>p["Sold To"]===myTeam);
      if(!allPlayers.length&&!isAdmin){
        container.innerHTML='<div class="empty-state">No players in your squad yet.</div>';return;
      }
      renderList();
    }
  }catch{
    container.innerHTML='<div class="empty-state" style="color:#e74c3c">⚠️ Failed to load players.</div>';
  }
}

/* ── RENDER LIST ── */
function renderList(){
  const q=document.getElementById("search-bar").value.toLowerCase();
  const fl=allPlayers.filter(p=>p["Player Name"].toLowerCase().includes(q));
  const el=document.getElementById("player-list");
  if(!fl.length){el.innerHTML='<div class="empty-state">No players found 🔍</div>';return;}

  // Store globally for openModal to use index
  window._statPlayers=fl;

  el.innerHTML=fl.map((p,i)=>{
    const rc=roleClass(p["Role"]);
    const pts=getPts(p);
    const icon=roleEmoji[p["Role"]]||"👤";
    const own=p["Sold To"]
      ?`<span class="badge owned">${p["Sold To"]}</span>`
      :`<span class="badge unsold">Unsold</span>`;
    const tc=getTC(p["IPL Team"]||"");

    return`<div class="player-row" style="animation-delay:${Math.min(i*.04,.5)}s">
      <div class="row-bg" style="background:linear-gradient(110deg,${tc.c1}CC 0%,${tc.c2}55 40%,transparent 70%)"></div>
      <div class="row-shimmer"></div>
      <div class="row-accent" style="background:linear-gradient(180deg,${tc.c2},${tc.c1})"></div>
      <div class="row-content">
        <div class="p-avatar" style="background:linear-gradient(135deg,${tc.c1}55,${tc.c2}33);border-color:${tc.c2}44">${icon}</div>
        <div class="p-info" onclick="openModal(${i},'add')">
          <div class="p-name">${p["Player Name"]}</div>
          <div class="p-meta">
            <span class="badge ${rc}">${p["Role"]}</span>
            ${own}
          </div>
        </div>
        <div class="p-right">
          <div class="pts-pill">
            <span class="pv">${pts}</span>
            <span class="pl">pts</span>
          </div>
          <div class="p-actions">
            <button class="act-btn add" title="Add stats" onclick="openModal(${i},'add')">＋</button>
            <button class="act-btn edit" title="Edit stats" onclick="openModal(${i},'edit')">✏️</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ── MODAL ── */
async function openModal(idx,mode){
  curPlayer=window._statPlayers&&window._statPlayers[idx];
  if(!curPlayer) return;
  if(!pointsConfig.length) await loadConfig();
  document.getElementById("modal-name").innerText=curPlayer["Player Name"];
  document.getElementById("modal-team").innerText=curPlayer["Sold To"]?`Owned by: ${curPlayer["Sold To"]}`:"Status: Unsold";
  buildStatsTable();
  buildForm();
  setMode(mode);
  document.getElementById("stat-modal").classList.add("open");
  document.getElementById("sheet-body").scrollTop=0;
}

function buildStatsTable(){
  let thHTML="<tr><th>PTS</th>";
  let tdHTML=`<td class="pts-cell">${getPts(curPlayer)}</td>`;
  pointsConfig.forEach(attr=>{
    thHTML+=`<th>${attr.label}</th>`;
    const val=n(curPlayer[attr.key])||n(curPlayer[keyAlias(attr.key)])||0;
    tdHTML+=`<td class="${val>0?"hi":""}">${val}</td>`;
  });
  document.getElementById("cur-thead").innerHTML=thHTML+"</tr>";
  document.getElementById("cur-tbody").innerHTML="<tr>"+tdHTML+"</tr>";
}

function buildForm(){
  const catOrder=["batting","bowling","fielding","milestone","custom"];
  const catMeta={
    batting:{title:"Batting",cls:"c-bat"},bowling:{title:"Bowling",cls:"c-bowl"},
    fielding:{title:"Fielding",cls:"c-field"},milestone:{title:"Milestones",cls:"c-ms"},custom:{title:"Custom",cls:"c-custom"}
  };
  const groups={};
  pointsConfig.forEach(attr=>{
    const cat=(attr.category||"custom").toLowerCase();
    if(!groups[cat]) groups[cat]=[];
    groups[cat].push(attr);
  });
  const buildSection=(cat,meta)=>{
    let h=`<div class="stat-section"><p class="sec-title ${meta.cls}">${meta.title}</p><div class="stat-grid">`;
    groups[cat].forEach(attr=>{
      const sid="si-"+attr.key;
      h+=`<div class="sig">
        <label>${attr.label}<br><span style="color:var(--t3);font-size:8px;font-weight:600">${attr.points} pts each</span></label>
        <div class="sig-ctrl">
          <button type="button" class="step-btn minus" onclick="stepVal('${sid}',-1)">−</button>
          <input type="number" id="${sid}" value="0" min="0" inputmode="numeric" data-key="${attr.key}">
          <button type="button" class="step-btn plus" onclick="stepVal('${sid}',1)">+</button>
        </div>
      </div>`;
    });
    return h+"</div></div>";
  };
  let html="";
  catOrder.forEach(cat=>{if(groups[cat]?.length) html+=buildSection(cat,catMeta[cat]||{title:cat,cls:"c-custom"});});
  Object.keys(groups).forEach(cat=>{if(!catOrder.includes(cat)) html+=buildSection(cat,{title:cat,cls:"c-custom"});});
  if(!html) html='<div class="stat-section"><p style="color:var(--t3);font-size:13px;padding:20px 0;text-align:center">No scoring attributes configured.</p></div>';
  document.getElementById("dynamic-form").innerHTML=html;
}

function setMode(mode){
  curMode=mode;
  const isAdd=mode==="add";
  document.getElementById("tab-add").classList.toggle("active",isAdd);
  document.getElementById("tab-edit").classList.toggle("active",!isAdd);
  const hint=document.getElementById("mode-hint-wrap");
  hint.className=isAdd?"mode-hint add-hint":"mode-hint edit-hint";
  hint.innerHTML=isAdd
    ?`<b>＋ Add mode:</b> values are added on top of current totals.`
    :`<b>✏️ Edit mode:</b> will <b>replace</b> all existing stats. Use to correct mistakes.`;
  const note=document.getElementById("footer-note");
  const btn=document.getElementById("submit-btn");
  if(isAdd){
    note.innerHTML=`Stats will be <b>added</b> to player totals.`;
    btn.textContent="＋ Add Stats & Update Points";
    btn.className="submit-btn btn-add";
    resetInputs(0);
  } else {
    note.innerHTML=`Will <b class="red">replace</b> all current stats and recalculate points.`;
    btn.textContent="✏️ Replace Stats & Recalculate";
    btn.className="submit-btn btn-edit";
    prefillInputs();
  }
  btn.disabled=false;
}
function resetInputs(v){document.querySelectorAll("#dynamic-form input[data-key]").forEach(i=>i.value=v);}
function prefillInputs(){
  if(!curPlayer) return;
  document.querySelectorAll("#dynamic-form input[data-key]").forEach(inp=>{
    const key=inp.getAttribute("data-key");
    inp.value=n(curPlayer[key])||n(curPlayer[keyAlias(key)]);
  });
}
function stepVal(id,delta){
  const inp=document.getElementById(id);
  if(inp) inp.value=Math.max(0,(parseInt(inp.value)||0)+delta);
}
function closeModal(){document.getElementById("stat-modal").classList.remove("open");}
function handleOverlay(e){if(e.target===document.getElementById("stat-modal")) closeModal();}

async function submitStats(){
  const btn=document.getElementById("submit-btn");
  btn.textContent="Calculating…";btn.disabled=true;
  const stats={};
  document.querySelectorAll("#dynamic-form input[data-key]").forEach(inp=>{
    stats[inp.getAttribute("data-key")]=inp.value;
  });
  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({
      action:"updateStats",playerName:curPlayer["Player Name"],requesterTeam:myTeam,mode:curMode,stats
    })});
    const r=await res.json();
    if(r.status==="success"){alert(r.message);closeModal();await loadPlayers();}
    else alert(r.message||"Error updating stats.");
  }catch{alert("Failed to update. Check connection.");}
  finally{setMode(curMode);}
}
</script>
</body>
