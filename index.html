<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>IPL Fantasy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#FF6B35;--accent-soft:rgba(255,107,53,.15);--blue:#4facfe;
  --font-main:'Outfit',sans-serif;--font-display:'Bebas Neue',cursive;--font-mono:'DM Mono',monospace;
  --t:.25s cubic-bezier(.4,0,.2,1);}
[data-theme="dark"]{
  --bg:#07101f;--mesh:radial-gradient(ellipse at 20% 15%,rgba(79,172,254,.12) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(255,107,53,.1) 0%,transparent 50%),#07101f;
  --surf:rgba(255,255,255,.04);--brd:rgba(79,172,254,.13);--text-1:#eef2ff;
  --text-2:rgba(238,242,255,.5);--text-3:rgba(238,242,255,.28);
  --inp:rgba(0,0,0,.3);--inp-brd:rgba(79,172,254,.18);}
[data-theme="light"]{
  --bg:#f0ece6;--mesh:radial-gradient(ellipse at 20% 15%,rgba(255,200,150,.2) 0%,transparent 55%),#f0ece6;
  --surf:rgba(255,255,255,.65);--brd:rgba(255,255,255,.9);--text-1:#1a1a2e;
  --text-2:rgba(26,26,46,.55);--text-3:rgba(26,26,46,.32);
  --inp:rgba(0,0,0,.05);--inp-brd:rgba(0,0,0,.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-main);background:var(--mesh);background-color:var(--bg);
  min-height:100vh;color:var(--text-1);display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;transition:background var(--t),color var(--t);}
.theme-btn{position:fixed;top:20px;right:20px;width:38px;height:38px;border-radius:50%;
  background:var(--surf);border:1px solid var(--brd);color:var(--text-1);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;}
.logo-wrap{text-align:center;margin-bottom:32px;}
.logo-emoji{font-size:56px;display:block;margin-bottom:10px;}
.logo-title{font-family:var(--font-display);font-size:52px;letter-spacing:.04em;line-height:1;
  background:linear-gradient(135deg,var(--blue),var(--accent));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:13px;color:var(--text-2);margin-top:4px;font-weight:500;}
.card{background:var(--surf);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--brd);border-radius:24px;padding:28px 24px;width:100%;max-width:400px;
  box-shadow:0 16px 60px rgba(0,0,0,.3);}
.tabs{display:flex;background:var(--inp);border:1px solid var(--inp-brd);border-radius:12px;padding:3px;margin-bottom:22px;}
.tab{flex:1;padding:9px;border-radius:10px;border:none;background:transparent;
  color:var(--text-2);font-family:var(--font-main);font-size:13px;font-weight:700;cursor:pointer;
  transition:all var(--t);}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(255,107,53,.3);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:6px;}
.field input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--inp-brd);
  background:var(--inp);color:var(--text-1);font-family:var(--font-main);font-size:15px;outline:none;
  -webkit-appearance:none;transition:border-color var(--t);}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text-3);}
.submit{width:100%;padding:14px;margin-top:6px;background:linear-gradient(135deg,var(--accent),#e8531a);
  color:#fff;border:none;border-radius:12px;font-family:var(--font-main);font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);box-shadow:0 4px 18px rgba(255,107,53,.35);}
.submit:active{transform:scale(.97);}
.submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.msg{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;
  text-align:center;display:none;}
.msg.err{background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.2);}
.msg.ok {background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2);}
.hint{text-align:center;font-size:12px;color:var(--text-3);margin-top:18px;}
.hint b{color:var(--accent);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.shake{animation:shake .3s ease;}
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()"><span id="ti">☀️</span></button>
<div class="logo-wrap">
  <span class="logo-emoji">🏏</span>
  <div class="logo-title">IPL Fantasy</div>
  <div class="logo-sub">2026 Season · Private League</div>
</div>
<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-login"  onclick="showTab('login')">Login</button>
    <button class="tab"        id="tab-signup" onclick="showTab('signup')">Sign Up</button>
  </div>
  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="field"><label>Your Name</label><input type="text" id="l-name" placeholder="Enter your name" autocomplete="username"></div>
    <div class="field"><label>PIN</label><input type="number" id="l-pin" placeholder="Enter your PIN" autocomplete="current-password" inputmode="numeric"></div>
    <button class="submit" id="login-btn" onclick="doLogin()">Login →</button>
  </div>
  <!-- SIGNUP FORM -->
  <div id="signup-form" style="display:none">
    <div class="field"><label>Your Name</label><input type="text" id="s-name" placeholder="Full name"></div>
    <div class="field"><label>Team Name</label><input type="text" id="s-team" placeholder="e.g. Thakur XI"></div>
    <div class="field"><label>Choose a PIN (4 digits)</label><input type="number" id="s-pin" placeholder="e.g. 1234" inputmode="numeric"></div>
    <button class="submit" id="signup-btn" onclick="doSignup()">Create Account →</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<div class="hint">Admin PIN: <b>9999</b> · All data synced to Google Sheets</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbxe8ueJLArFFRBqnVIhYn6LBEAnHsU6El_BlKeRgXIdR5Xo4UNgLV79NiLWtQyfQpDy/exec";
// Theme
const th=localStorage.getItem("theme")||"dark";
document.documentElement.setAttribute("data-theme",th);
document.getElementById("ti").textContent=th==="dark"?"☀️":"🌙";
function toggleTheme(){
  const n=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",n);
  localStorage.setItem("theme",n);
  document.getElementById("ti").textContent=n==="dark"?"☀️":"🌙";
}
function showTab(t){
  document.getElementById("login-form").style.display=t==="login"?"block":"none";
  document.getElementById("signup-form").style.display=t==="signup"?"block":"none";
  document.getElementById("tab-login").classList.toggle("active",t==="login");
  document.getElementById("tab-signup").classList.toggle("active",t==="signup");
  hideMsg();
}
function showMsg(txt,type){
  const m=document.getElementById("msg");
  m.textContent=txt;m.className="msg "+type;m.style.display="block";
}
function hideMsg(){const m=document.getElementById("msg");m.style.display="none";}
async function api(body){
  try{const r=await fetch(URL,{method:"POST",body:JSON.stringify(body)});return r.json();}
  catch{return null;}
}
async function doLogin(){
  const name=document.getElementById("l-name").value.trim();
  const pin =document.getElementById("l-pin").value.trim();
  if(!name||!pin){showMsg("Please fill in all fields.","err");return;}
  const btn=document.getElementById("login-btn");
  btn.textContent="Logging in…";btn.disabled=true;
  const r=await api({action:"login",name,pin});
  btn.textContent="Login →";btn.disabled=false;
  if(!r){showMsg("Connection failed. Try again.","err");return;}
  if(r.status==="success"){
    localStorage.setItem("teamName",r.teamName);
    localStorage.setItem("userName",r.userName||name);
    showMsg("Welcome back! Redirecting…","ok");
    setTimeout(()=>window.location.href="dashboard.html",700);
  } else {
    showMsg(r.message||"Login failed.","err");
    document.querySelector("#login-form").classList.add("shake");
    setTimeout(()=>document.querySelector("#login-form").classList.remove("shake"),400);
  }
}
async function doSignup(){
  const name=document.getElementById("s-name").value.trim();
  const team=document.getElementById("s-team").value.trim();
  const pin =document.getElementById("s-pin").value.trim();
  if(!name||!team||!pin){showMsg("Please fill in all fields.","err");return;}
  if(!/^\d{4}$/.test(pin)){showMsg("PIN must be exactly 4 digits.","err");return;}
  const btn=document.getElementById("signup-btn");
  btn.textContent="Creating…";btn.disabled=true;
  const r=await api({action:"signup",name,teamName:team,pin});
  btn.textContent="Create Account →";btn.disabled=false;
  if(!r){showMsg("Connection failed. Try again.","err");return;}
  if(r.status==="success"){
    showMsg("Account created! Please login.","ok");
    setTimeout(()=>showTab("login"),1200);
  } else showMsg(r.message||"Signup failed.","err");
}
// Enter key support
document.addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  if(document.getElementById("login-form").style.display!=="none") doLogin();
  else doSignup();
});
</script>
</body>
</html>
