<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Players | IPL Fantasy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF6B35;--accent-soft:rgba(255,107,53,.14);--accent-glow:rgba(255,107,53,.3);
  --blue:#4facfe;--blue-soft:rgba(79,172,254,.12);--gold:#FFD700;--silver:#b8c8d8;
  --font-main:'Outfit',sans-serif;--font-mono:'DM Mono',monospace;--font-display:'Bebas Neue',cursive;
  --ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#07101f;
  --mesh:radial-gradient(ellipse at 15% 5%,rgba(79,172,254,.13) 0%,transparent 50%),
        radial-gradient(ellipse at 85% 85%,rgba(255,107,53,.10) 0%,transparent 50%),#07101f;
  --surf:rgba(255,255,255,.04);--surf2:rgba(10,20,40,.97);
  --brd:rgba(79,172,254,.14);--brd2:rgba(79,172,254,.22);--nav:rgba(7,16,31,.95);
  --t1:#eef2ff;--t2:rgba(238,242,255,.52);--t3:rgba(238,242,255,.28);--div:rgba(255,255,255,.055);
  --inp:rgba(0,0,0,.3);--ibrd:rgba(79,172,254,.15);--ov:rgba(0,0,0,.9);--tog:rgba(255,255,255,.06);
  --field-bg1:#1e5c22;--field-bg2:#174d1a;--field-bg3:#0f3811;
  --pitch-c1:#c8a55c;--pitch-c2:#b8914a;
  --boundary:rgba(255,255,255,.2);--row-label:rgba(255,255,255,.55);--name-chip:rgba(0,0,0,.75);
}
[data-theme="light"]{
  --bg:#f0ece6;
  --mesh:radial-gradient(ellipse at 20% 10%,rgba(255,200,150,.2) 0%,transparent 55%),#f0ece6;
  --surf:rgba(255,255,255,.65);--surf2:rgba(255,255,255,.98);
  --brd:rgba(0,0,0,.07);--brd2:rgba(0,0,0,.14);--nav:rgba(240,236,230,.92);
  --t1:#1a1a2e;--t2:rgba(26,26,46,.55);--t3:rgba(26,26,46,.32);--div:rgba(0,0,0,.07);
  --inp:rgba(0,0,0,.05);--ibrd:rgba(0,0,0,.1);--ov:rgba(0,0,0,.85);--tog:rgba(0,0,0,.06);
  --field-bg1:#2e7d32;--field-bg2:#256326;--field-bg3:#1b4d1e;
  --pitch-c1:#d4b882;--pitch-c2:#c4a86c;
  --boundary:rgba(255,255,255,.28);--row-label:rgba(255,255,255,.8);--name-chip:rgba(0,0,0,.78);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-main);background:var(--mesh);background-color:var(--bg);min-height:100vh;color:var(--t1);padding-bottom:calc(68px + 14px + 28px);overflow-x:hidden;transition:background-color .3s,color .3s;}
#pitch-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.3;}

/* TOPBAR */
.topbar{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;padding:24px 20px 10px;animation:slideDown .5s var(--bounce) both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:none;}}
.topbar-left .greeting{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.topbar-left .greeting::before{content:'';width:16px;height:2px;background:linear-gradient(90deg,var(--blue),transparent);border-radius:1px;}
.topbar-left h1{font-family:var(--font-display);font-size:36px;letter-spacing:.06em;line-height:1;background:linear-gradient(90deg,var(--t1),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-left .player-count-sub{font-size:11px;color:var(--t3);margin-top:3px;font-weight:500;}
.theme-btn{width:40px;height:40px;border-radius:14px;background:var(--tog);border:1px solid var(--brd);color:var(--t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s var(--bounce),background .3s;}
.theme-btn:active{transform:scale(.85);}

/* VIEW TOGGLE */
.view-toggle{
  display:flex;margin:0 16px 14px;
  background:var(--inp);border:1px solid var(--ibrd);border-radius:18px;padding:4px;
  position:relative;z-index:1;
  animation:fadeUp .4s var(--ease) .06s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.vt-btn{
  flex:1;padding:11px 10px;border-radius:14px;border:none;background:transparent;
  color:var(--t2);font-family:var(--font-main);font-size:13px;font-weight:800;
  cursor:pointer;letter-spacing:.03em;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .25s var(--bounce);
}
.vt-btn.active{
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  color:#fff;
  box-shadow:0 4px 18px rgba(255,107,53,.4);
  transform:scale(1.02);
}
.vt-btn:not(.active):hover{color:var(--t1);}

/* SEARCH */
.search-wrap{margin:0 16px 10px;position:relative;z-index:1;animation:fadeUp .4s var(--ease) .1s both;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.search-bar{width:100%;padding:13px 14px 13px 42px;border-radius:16px;border:1px solid var(--ibrd);background:var(--inp);color:var(--t1);font-family:var(--font-main);font-size:14px;outline:none;-webkit-appearance:none;transition:border-color .25s,box-shadow .25s;}
.search-bar:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.12);}
.search-bar::placeholder{color:var(--t3);}

/* FILTER ROW */
.filter-row{display:flex;gap:7px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;animation:fadeUp .4s var(--ease) .15s both;z-index:1;position:relative;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--ibrd);background:var(--inp);color:var(--t2);font-family:var(--font-main);font-size:11px;font-weight:700;cursor:pointer;transition:all .22s var(--bounce);white-space:nowrap;letter-spacing:.03em;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
.filter-btn.active{background:linear-gradient(135deg,var(--accent),#ff8c5a);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(255,107,53,.35);transform:translateY(-1px);}

/* PLAYER LIST */
.list-wrap{position:relative;z-index:1;background:rgba(255,255,255,.03);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--brd);border-radius:24px;margin:0 16px 16px;overflow:hidden;animation:fadeUp .4s var(--ease) .2s both;box-shadow:0 8px 40px rgba(0,0,0,.3);}
[data-theme="light"] .list-wrap{background:rgba(255,255,255,.6);}
.player-row{display:flex;align-items:center;padding:0;border-bottom:1px solid var(--div);cursor:pointer;position:relative;overflow:hidden;animation:rowIn .35s var(--ease) both;transition:transform .2s var(--bounce);}
.player-row:last-child{border-bottom:none;}
.player-row:active{transform:scale(.99);}
/* Stronger team bg */
.row-bg{position:absolute;inset:0;pointer-events:none;transition:opacity .25s;}
.row-shimmer{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.07) 50%,transparent 100%);transform:translateX(-100%);opacity:0;}
.player-row:hover .row-shimmer{animation:shimmerSlide .55s var(--ease) both;}
@keyframes shimmerSlide{from{transform:translateX(-100%);opacity:1;}to{transform:translateX(100%);opacity:0;}}
.row-accent-line{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 3px 3px 0;opacity:.9;transition:width .2s var(--bounce);}
.player-row:hover .row-accent-line{width:6px;}
.row-content{position:relative;z-index:1;display:flex;align-items:center;gap:12px;padding:10px 14px 10px 18px;width:100%;}
/* Circle avatar — matches field token */
.row-avatar-wrap{position:relative;flex-shrink:0;}
.row-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid;box-shadow:0 4px 16px rgba(0,0,0,.45);transition:transform .2s var(--bounce),box-shadow .2s;position:relative;overflow:hidden;}
.player-row:hover .row-avatar{transform:scale(1.1);box-shadow:0 8px 22px rgba(0,0,0,.6);}
.row-avatar::after{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,rgba(255,255,255,.22),transparent 60%);pointer-events:none;}
.row-avatar img{width:30px;height:30px;object-fit:contain;position:relative;z-index:1;}
.row-avatar-fb{font-size:20px;position:relative;z-index:1;}
/* Mini badges on avatar */
.row-av-badge{position:absolute;line-height:1;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;z-index:2;}
.row-av-badge.c-badge{top:-3px;right:-3px;background:#ffc400;color:#1a0f00;box-shadow:0 0 8px rgba(255,196,0,.7);}
.row-av-badge.vc-badge{top:-3px;right:-3px;background:#9ca8b4;color:#111;box-shadow:0 0 6px rgba(180,180,200,.5);}
.row-av-badge.oc-badge{top:-3px;left:-3px;background:#FF6B35;color:#fff;box-shadow:0 0 8px rgba(255,107,53,.6);}
.row-av-badge.pc-badge{bottom:-3px;left:-3px;background:#9b59b6;color:#fff;box-shadow:0 0 8px rgba(155,89,182,.6);}
/* Tier dot bottom-right */
.row-av-tier{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;z-index:2;border:2px solid var(--bg);}
.row-av-tier.gold{background:#FFD700;box-shadow:0 0 8px rgba(255,215,0,.6);}
.row-av-tier.silver{background:#C0C8D8;box-shadow:0 0 6px rgba(192,200,216,.5);}
.row-av-tier.bronze{background:#CD7F32;box-shadow:0 0 6px rgba(205,127,50,.4);}
.row-info{flex:1;min-width:0;}
.row-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;letter-spacing:.01em;}
.row-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.row-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.05em;text-transform:uppercase;transition:transform .15s var(--bounce);}
.row-badge:hover{transform:scale(1.08);}
.rb-bat{background:rgba(79,172,254,.15);color:#4facfe;}
.rb-bowl{background:rgba(231,76,60,.15);color:#e74c3c;}
.rb-ar{background:rgba(241,196,15,.15);color:#f1c40f;}
.rb-wk{background:rgba(155,89,182,.15);color:#bb8fce;}
.rb-team{background:rgba(255,255,255,.07);color:var(--t2);}
[data-theme="light"] .rb-team{background:rgba(0,0,0,.06);}
.rb-owned{background:rgba(255,107,53,.12);color:var(--accent);}
.rb-unsold{background:rgba(255,255,255,.05);color:var(--t3);}
[data-theme="light"] .rb-unsold{background:rgba(0,0,0,.05);}
.rb-cap{background:rgba(255,215,0,.2);color:#ffd700;animation:capPulse 2s ease infinite;}
.rb-vc{background:rgba(180,180,200,.15);color:#b4b4c8;}
@keyframes capPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.5);}50%{box-shadow:0 0 0 5px rgba(255,215,0,0);}}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.row-pts{font-family:var(--font-mono);font-size:14px;font-weight:500;transition:transform .2s var(--bounce);}
.player-row:hover .row-pts{transform:scale(1.1);}
.row-pts-label{font-size:8px;color:var(--t3);font-weight:600;letter-spacing:.04em;}
.row-chevron{font-size:10px;color:var(--t3);transition:transform .2s var(--bounce),color .2s;}
.player-row:hover .row-chevron{transform:translateX(3px);color:var(--accent);}
.empty-state{padding:40px 20px;text-align:center;color:var(--t3);font-size:14px;}
@keyframes rowIn{from{opacity:0;transform:translateX(-18px);}to{opacity:1;transform:none;}}

/* ════════════════════════════════════
   CARD MODAL
════════════════════════════════════ */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.modal.open{display:flex;animation:modalIn .3s var(--ease) both;}
@keyframes modalIn{from{opacity:0;}to{opacity:1;}}
.modal-close{
  position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:14px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:300;transition:transform .2s var(--bounce),background .2s;backdrop-filter:blur(8px);
}
.modal-close:hover{transform:scale(1.1) rotate(90deg);background:rgba(231,76,60,.4);}
.modal-hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:600;letter-spacing:.06em;
  color:rgba(255,255,255,.38);pointer-events:none;
  animation:fadeUp .6s .5s both;white-space:nowrap;
}

/* ── Card scene & outer glow ── */
.card-scene-wrap{position:relative;display:flex;align-items:center;justify-content:center;}

/* The animated card glow follows the FIFA shape */
.card-glow-ring{
  position:absolute;inset:-6px;
  pointer-events:none;z-index:0;
  clip-path:polygon(8% 0%,92% 0%,100% 8%,100% 78%,50% 100%,0% 78%,0% 8%);
  /* filled by JS */
  animation:glowPulse 2.2s ease-in-out infinite alternate;
  filter:blur(12px);
}
@keyframes glowPulse{from{opacity:.55;}to{opacity:1;}}

.card-scene{
  perspective:1400px;
  width:min(72vw,270px);
  aspect-ratio:.66;
  cursor:pointer;
  animation:cardPop .5s var(--bounce) .05s both;
  position:relative;z-index:1;
}
@keyframes cardPop{from{opacity:0;transform:scale(.65) translateY(40px);}to{opacity:1;transform:none;}}
.card-flip{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .72s cubic-bezier(.22,.61,.36,1);
}
.card-flip.flipped{transform:rotateY(180deg);}

/* ── FIFA card shape ── */
.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  clip-path:polygon(8% 0%,92% 0%,100% 8%,100% 80%,50% 100%,0% 80%,0% 8%);
  overflow:hidden;
  display:flex;flex-direction:column;
}
.card-back-face{transform:rotateY(180deg);}

/* ── Standard tier gradients ── */
.card-face.bronze{
  background:
    linear-gradient(125deg,rgba(255,255,255,.13) 0%,transparent 45%,rgba(255,255,255,.06) 100%),
    linear-gradient(165deg,#2e1000 0%,#6a3008 18%,#be6820 36%,#e89840 50%,#be6820 65%,#6a3008 82%,#2e1000 100%);
  color:#280e00;
}
.card-face.silver{
  background:
    linear-gradient(125deg,rgba(255,255,255,.16) 0%,transparent 45%,rgba(255,255,255,.08) 100%),
    linear-gradient(165deg,#141414 0%,#484848 18%,#b0b0b0 36%,#e0e0e0 50%,#b0b0b0 65%,#484848 82%,#141414 100%);
  color:#0e0e0e;
}
.card-face.gold{
  background:
    linear-gradient(125deg,rgba(255,255,255,.18) 0%,transparent 45%,rgba(255,255,255,.09) 100%),
    linear-gradient(165deg,#362000 0%,#7a5400 18%,#d8a800 36%,#f8d840 50%,#d8a800 65%,#7a5400 82%,#362000 100%);
  color:#261600;
}

/* ── Special animated gradient cards ── */
/* Elite (96-99 pts) — electric blue, gold outer border */
.card-face.elite{
  background-size:300% 300%;
  animation:eliteGrad 4s ease infinite;
  color:#b8f0ff;
}
@keyframes eliteGrad{
  0%  {background:linear-gradient(165deg,#020c1e 0%,#04204a 25%,#0840a0 45%,#2090e0 55%,#0840a0 70%,#04204a 85%,#020c1e 100%);}
  50% {background:linear-gradient(200deg,#04204a 0%,#0840a0 20%,#2090e0 40%,#60c8ff 55%,#2090e0 70%,#0840a0 88%,#020c1e 100%);}
  100%{background:linear-gradient(165deg,#020c1e 0%,#04204a 25%,#0840a0 45%,#2090e0 55%,#0840a0 70%,#04204a 85%,#020c1e 100%);}
}

/* Orange cap */
.card-face.orange-special{
  animation:orangeGrad 4s ease infinite;
  color:#ffe8b8;
}
@keyframes orangeGrad{
  0%  {background:linear-gradient(165deg,#1a0400 0%,#501000 25%,#c03800 45%,#ff6800 55%,#c03800 70%,#501000 85%,#1a0400 100%);}
  50% {background:linear-gradient(200deg,#501000 0%,#c03800 20%,#ff6800 40%,#ffaa00 55%,#ff6800 70%,#c03800 88%,#1a0400 100%);}
  100%{background:linear-gradient(165deg,#1a0400 0%,#501000 25%,#c03800 45%,#ff6800 55%,#c03800 70%,#501000 85%,#1a0400 100%);}
}

/* Purple cap */
.card-face.purple-special{
  animation:purpleGrad 4s ease infinite;
  color:#e8c8ff;
}
@keyframes purpleGrad{
  0%  {background:linear-gradient(165deg,#0c0018 0%,#280850 25%,#6010a8 45%,#a040e0 55%,#6010a8 70%,#280850 85%,#0c0018 100%);}
  50% {background:linear-gradient(200deg,#280850 0%,#6010a8 20%,#a040e0 40%,#d080ff 55%,#a040e0 70%,#6010a8 88%,#0c0018 100%);}
  100%{background:linear-gradient(165deg,#0c0018 0%,#280850 25%,#6010a8 45%,#a040e0 55%,#6010a8 70%,#280850 85%,#0c0018 100%);}
}

/* Player of Tournament — gold shimmer */
.card-face.pot{
  animation:potGrad 4s ease infinite;
  color:#fff8e0;
}
@keyframes potGrad{
  0%  {background:linear-gradient(165deg,#1a1200 0%,#604000 20%,#c89000 36%,#ffd040 50%,#c89000 65%,#604000 82%,#1a1200 100%);}
  33% {background:linear-gradient(210deg,#604000 0%,#c89000 22%,#ffd040 42%,#fff080 52%,#ffd040 68%,#c89000 85%,#1a1200 100%);}
  66% {background:linear-gradient(140deg,#1a1200 0%,#c89000 28%,#fff080 46%,#ffd040 54%,#c89000 72%,#604000 88%,#1a1200 100%);}
  100%{background:linear-gradient(165deg,#1a1200 0%,#604000 20%,#c89000 36%,#ffd040 50%,#c89000 65%,#604000 82%,#1a1200 100%);}
}

/* ── Outer gold border ring for elite cards ── */
.card-face.elite::before{
  content:'';position:absolute;inset:3px;z-index:0;pointer-events:none;
  clip-path:polygon(8% 0%,92% 0%,100% 8%,100% 80%,50% 100%,0% 80%,0% 8%);
  border:2px solid rgba(255,215,0,.0);
  box-shadow:inset 0 0 0 2px rgba(255,215,0,.7);
  animation:goldBorder 2.5s ease-in-out infinite alternate;
}
@keyframes goldBorder{
  from{box-shadow:inset 0 0 0 2px rgba(255,215,0,.4),inset 0 0 12px rgba(255,215,0,.1);}
  to  {box-shadow:inset 0 0 0 2px rgba(255,215,0,1),  inset 0 0 20px rgba(255,215,0,.3);}
}
.card-face.orange-special::before{
  content:'';position:absolute;inset:3px;z-index:0;pointer-events:none;
  clip-path:polygon(8% 0%,92% 0%,100% 8%,100% 80%,50% 100%,0% 80%,0% 8%);
  animation:orangeBorder 2.5s ease-in-out infinite alternate;
}
@keyframes orangeBorder{
  from{box-shadow:inset 0 0 0 2px rgba(255,140,40,.4),inset 0 0 10px rgba(255,140,40,.1);}
  to  {box-shadow:inset 0 0 0 2px rgba(255,180,60,1), inset 0 0 20px rgba(255,140,40,.3);}
}
.card-face.purple-special::before{
  content:'';position:absolute;inset:3px;z-index:0;pointer-events:none;
  clip-path:polygon(8% 0%,92% 0%,100% 8%,100% 80%,50% 100%,0% 80%,0% 8%);
  animation:purpleBorder 2.5s ease-in-out infinite alternate;
}
@keyframes purpleBorder{
  from{box-shadow:inset 0 0 0 2px rgba(180,80,255,.4),inset 0 0 10px rgba(180,80,255,.1);}
  to  {box-shadow:inset 0 0 0 2px rgba(200,120,255,1), inset 0 0 20px rgba(180,80,255,.3);}
}
.card-face.pot::before{
  content:'';position:absolute;inset:3px;z-index:0;pointer-events:none;
  clip-path:polygon(8% 0%,92% 0%,100% 8%,100% 80%,50% 100%,0% 80%,0% 8%);
  animation:potBorder 2s ease-in-out infinite alternate;
}
@keyframes potBorder{
  from{box-shadow:inset 0 0 0 2px rgba(255,220,80,.5),inset 0 0 14px rgba(255,220,80,.1);}
  to  {box-shadow:inset 0 0 0 2.5px rgba(255,255,180,1),inset 0 0 28px rgba(255,220,80,.4);}
}

/* Diagonal shine on all cards */
.card-face::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(105deg,transparent 28%,rgba(255,255,255,.06) 50%,transparent 72%);
}

/* ════════════════════════════════════
   CARD FRONT FACE (FIFA layout)
════════════════════════════════════ */
.cf-wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;z-index:2;}

/* Animated particles canvas (special cards) */
.cf-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;}

/* Photo zone: top 55% */
.cf-photo-zone{position:relative;flex:0 0 55%;overflow:hidden;}
.cf-player-photo{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;position:relative;z-index:1;}
.cf-photo-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:clamp(48px,15vw,72px);background:rgba(0,0,0,.15);position:relative;z-index:1;}
/* Gradient fade photo → info zone */
.cf-photo-fade{position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,transparent,rgba(0,0,0,.4));pointer-events:none;z-index:2;}
/* Rating overlay top-left */
.cf-rating-block{position:absolute;top:7%;left:8%;z-index:3;line-height:1;}
.cf-rating{font-family:var(--font-display);font-size:clamp(28px,8.5vw,44px);line-height:.9;display:block;text-shadow:0 2px 8px rgba(0,0,0,.45);}
.cf-role-lbl{font-family:var(--font-display);font-size:clamp(10px,3vw,14px);letter-spacing:.04em;display:block;opacity:.88;text-shadow:0 1px 4px rgba(0,0,0,.4);}
/* Team logo bottom-left of photo */
.cf-team-logo-zone{position:absolute;bottom:9%;left:8%;z-index:3;width:clamp(26px,8vw,36px);height:clamp(26px,8vw,36px);}
.cf-team-logo-zone img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 5px rgba(0,0,0,.55));}
/* Special badge top-right */
.cf-special-badge{
  position:absolute;top:6%;right:6%;z-index:3;
  font-size:clamp(6px,1.7vw,8px);font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 6px;border-radius:4px;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.9);
  line-height:1.3;text-align:center;
}

/* Info zone: bottom 45% — extra padding bottom to prevent clip */
.cf-info-zone{
  flex:1;display:flex;flex-direction:column;
  padding:3% 8% 26% 8%;
  position:relative;z-index:2;
}
.cf-name{
  font-family:var(--font-display);
  font-size:clamp(13px,4.2vw,20px);
  letter-spacing:.06em;line-height:1;
  text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 4px rgba(0,0,0,.2);
  margin-bottom:2%;
}
.cf-owner-badge{
  font-size:clamp(6px,1.8vw,8px);font-weight:700;letter-spacing:.04em;
  text-align:center;opacity:.68;margin-bottom:4%;
  background:rgba(0,0,0,.18);border-radius:3px;padding:1px 6px;
  display:inline-block;align-self:center;
}
.cf-divider-line{height:1px;background:currentColor;opacity:.22;margin:0 0 4%;border-radius:1px;}
/* 2-col stats matching FIFA card */
.cf-stats-row{display:flex;align-items:stretch;flex:1;}
.cf-stat-col{flex:1;display:flex;flex-direction:column;gap:clamp(3px,1vw,6px);}
.cf-stat-col.left{padding-right:5%;}
.cf-stat-col.right{padding-left:5%;}
.cf-stat-vdiv{width:1px;background:currentColor;opacity:.2;flex-shrink:0;margin:2px 0;}
.cf-stat-item{display:flex;align-items:baseline;justify-content:space-between;gap:3px;}
.cf-sv{font-family:var(--font-display);font-size:clamp(11px,3.5vw,17px);line-height:1;flex-shrink:0;font-weight:400;}
.cf-sl{font-family:var(--font-display);font-size:clamp(8px,2.4vw,12px);opacity:.55;white-space:nowrap;}

/* ════════════════════════════════════
   CARD BACK FACE
════════════════════════════════════ */
.cb-wrap{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;padding:8% 8% 26% 8%;}
.cb-header{text-align:center;margin-bottom:4%;padding-bottom:4%;border-bottom:1px solid rgba(0,0,0,.18);}
.cb-name{font-family:var(--font-display);font-size:clamp(13px,4.2vw,20px);letter-spacing:.05em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cb-sub{font-size:clamp(7px,1.9vw,9px);opacity:.68;margin-top:3px;font-weight:700;letter-spacing:.03em;}
.cb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(3px,1vw,5px);flex:1;}
.cb-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.12);border-radius:5px;padding:clamp(3px,1vw,6px) 2px;border:1px solid rgba(0,0,0,.1);}
.cb-sv{font-family:var(--font-display);font-size:clamp(11px,3.5vw,17px);line-height:1;}
.cb-sl{font-size:clamp(6px,1.5vw,8px);font-weight:700;text-transform:uppercase;letter-spacing:.04em;opacity:.55;margin-top:1px;text-align:center;}
.cb-footer{margin-top:4%;text-align:center;font-size:clamp(7px,2vw,9px);font-weight:700;opacity:.78;padding:4px 8px;background:rgba(0,0,0,.14);border-radius:5px;border:1px solid rgba(0,0,0,.08);}
@keyframes capPulse2{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.5);}50%{box-shadow:0 0 0 5px rgba(255,215,0,0);}}
.rb-cap{animation:capPulse2 2s ease infinite;}

/* ════════════════════════════════════
   FIELD PLAYER DETAIL SHEET
   — Small floating card, NOT full screen
   — Player image left, info right (sticky)
   — Stats scrollable below
════════════════════════════════════ */
.fm-modal{
  display:none;position:fixed;inset:0;z-index:250;
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  align-items:center;justify-content:center;
  padding:16px;
}
.fm-modal.open{display:flex;animation:fmIn .24s var(--ease) both;}
@keyframes fmIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:none;}}

.fm-card{
  width:100%;max-width:440px;
  max-height:min(88vh,640px);
  border-radius:24px;
  background:var(--surf2);
  border:1px solid var(--brd2);
  box-shadow:0 20px 60px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  animation:fmPop .38s var(--bounce) both;
}
@keyframes fmPop{from{opacity:0;transform:scale(.88) translateY(16px);}to{opacity:1;transform:none;}}

/* Close button */
.fm-close{
  position:absolute;top:12px;right:14px;z-index:20;
  width:30px;height:30px;border-radius:9px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--bounce),background .2s;
}
.fm-close:hover{transform:scale(1.12) rotate(90deg);background:rgba(231,76,60,.5);}

/* ── STICKY HEADER: image LEFT + info RIGHT ── */
.fm-header{
  flex-shrink:0;
  display:flex;align-items:stretch;
  min-height:140px;
  position:relative;overflow:hidden;
}
/* Team colour gradient fills header */
.fm-header-bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  /* filled via JS */
}
.fm-header-bg::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:50px;
  background:linear-gradient(to bottom,transparent,var(--surf2));
  z-index:1;
}

/* Player image — left column */
.fm-img-col{
  flex-shrink:0;width:110px;
  position:relative;z-index:2;
  overflow:hidden;
}
.fm-img-col img.fm-player-img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;
}
.fm-img-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;
}
/* Fade right edge of image */
.fm-img-col::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:50%;
  background:linear-gradient(to right,transparent,var(--surf2));
  pointer-events:none;z-index:3;
}

/* Info column — right */
.fm-info-col{
  flex:1;min-width:0;
  padding:16px 46px 14px 8px;
  position:relative;z-index:2;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.fm-player-name{
  font-family:var(--font-display);font-size:22px;letter-spacing:.05em;line-height:1;
  color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);
  margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fm-player-sub{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:8px;font-weight:500;}
.fm-badges{display:flex;gap:4px;flex-wrap:wrap;}
.fmbadge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;display:flex;align-items:center;gap:3px;}
.fmbadge.role{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.28);}
.fmbadge.captain{background:rgba(255,196,0,.28);color:#ffc400;border:1px solid rgba(255,196,0,.45);}
.fmbadge.vc{background:rgba(180,180,200,.22);color:#c8d0dc;border:1px solid rgba(180,180,200,.32);}
.fmbadge.ocap{background:rgba(255,107,53,.22);color:#ff9060;border:1px solid rgba(255,107,53,.42);}
.fmbadge.pcap{background:rgba(155,89,182,.22);color:#cc99ff;border:1px solid rgba(155,89,182,.42);}
.fmbadge.price{background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.28);font-family:var(--font-mono);}

/* ── Rank + pts row (inside sticky header, below image) ── */
.fm-rank-row{
  flex-shrink:0;
  display:flex;align-items:center;gap:0;
  border-top:1px solid var(--div);
  position:relative;z-index:2;
}
.fm-rank-cell{
  flex:1;padding:10px 16px;
  display:flex;flex-direction:column;
  border-right:1px solid var(--div);
}
.fm-rank-cell:last-child{border-right:none;}
.fm-rc-label{font-size:8px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);margin-bottom:2px;}
.fm-rc-val{font-family:var(--font-display);font-size:28px;line-height:1;color:var(--blue);}
.fm-rc-val.pts{color:var(--t1);}
.fm-rc-sub{font-size:10px;color:var(--t2);margin-top:1px;font-weight:500;}

/* ── Scrollable stats ── */
.fm-scroll-body{
  flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}
.fm-scroll-body::-webkit-scrollbar{display:none;}
.fm-stats-section{padding:8px 14px 32px;}
.fm-stats-title{
  font-size:8.5px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  color:var(--t3);margin:12px 0 7px;
  display:flex;align-items:center;gap:7px;
}
.fm-stats-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--div),transparent);}
.fm-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.fm-stat-box{
  background:var(--surf);border:1px solid var(--brd);border-radius:12px;
  padding:10px 8px;transition:transform .18s var(--bounce),border-color .2s;
  text-align:center;
}
.fm-stat-box:hover{transform:scale(1.04);border-color:var(--brd2);}
.fm-stat-icon{font-size:14px;margin-bottom:3px;display:block;}
.fm-stat-val{font-family:var(--font-display);font-size:20px;color:var(--t1);line-height:1;margin-bottom:2px;}
.fm-stat-val.zero{color:var(--t3);}
.fm-stat-label{font-size:7.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}

/* FIELD VIEW */
.field-centering{display:flex;justify-content:center;padding:0 12px;}
.field-outer{
  width:100%;max-width:520px;
  border-radius:32px;overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.08);
  animation:fadeUp .6s var(--bounce) .15s both;position:relative;
}
/* No horizontal scroll ever */
.field-centering,.field-outer,.field{overflow-x:hidden;}
.field{position:relative;padding:10px 6px 14px;background-color:#174d1a;background-image:repeating-linear-gradient(180deg,rgba(0,0,0,.05) 0px,rgba(0,0,0,.05) 28px,transparent 28px,transparent 56px),radial-gradient(ellipse at 50% 50%,#2a7a2e 0%,#1e5c22 45%,#0f3811 100%);}
[data-theme="light"] .field{background-color:#256326;background-image:repeating-linear-gradient(180deg,rgba(0,0,0,.04) 0px,rgba(0,0,0,.04) 28px,transparent 28px,transparent 56px),radial-gradient(ellipse at 50% 50%,#3a9e3f 0%,#2e7d32 45%,#1b4d1e 100%);}
.field::before{content:'';position:absolute;inset:10px;border-radius:50%;border:1.5px dashed var(--boundary);pointer-events:none;}
.pitch-strip{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:38px;height:210px;background:linear-gradient(180deg,#d4b882 0%,#c8a55c 40%,#b89040 60%,#c8a55c 100%);border-radius:5px;border:1px solid rgba(255,255,255,.25);box-shadow:0 0 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);pointer-events:none;z-index:0;}
.pitch-strip::before,.pitch-strip::after{content:'';position:absolute;left:-8px;right:-8px;height:2px;background:rgba(255,255,255,.6);border-radius:1px;}
.pitch-strip::before{top:22px;}.pitch-strip::after{bottom:22px;}
.role-row{position:relative;z-index:1;display:flex;justify-content:center;align-items:flex-end;gap:4px;padding:4px 4px 3px;flex-wrap:nowrap;overflow:hidden;}
.role-label{text-align:center;font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--row-label);text-shadow:0 1px 4px rgba(0,0,0,.6);margin-bottom:2px;margin-top:6px;}
.fp{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;animation:tokenIn .45s var(--bounce) both;}
@keyframes tokenIn{from{opacity:0;transform:translateY(12px) scale(.8);}to{opacity:1;transform:none;}}
.fp:active .fp-avatar{transform:scale(.9);}
.fp-avatar-wrap{position:relative;}
.fp-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid;box-shadow:0 3px 12px rgba(0,0,0,.5);transition:transform .2s var(--bounce),box-shadow .2s;position:relative;overflow:hidden;}
.fp:hover .fp-avatar{transform:scale(1.1);box-shadow:0 8px 24px rgba(0,0,0,.6);}
.fp-avatar::after{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,rgba(255,255,255,.18),transparent 60%);pointer-events:none;}
.fp-badge{position:absolute;font-size:10px;line-height:1;background:rgba(0,0,0,.7);border-radius:4px;padding:1px 3px;font-weight:900;font-family:var(--font-mono);backdrop-filter:blur(4px);}
.fp-badge.cap-c{top:-3px;right:-3px;background:#ffc400;color:#1a0f00;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;box-shadow:0 0 8px rgba(255,196,0,.6);}
.fp-badge.cap-vc{top:-3px;right:-3px;background:#9ca8b4;color:#111;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;box-shadow:0 0 6px rgba(180,180,200,.4);}
.fp-badge.orange-cap{top:-3px;left:-3px;background:#FF6B35;color:#fff;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:8px;box-shadow:0 0 8px rgba(255,107,53,.6);}
.fp-badge.purple-cap{bottom:-3px;left:-3px;background:#9b59b6;color:#fff;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:8px;box-shadow:0 0 8px rgba(155,89,182,.6);}
.fp-name{background:var(--name-chip);backdrop-filter:blur(8px);border-radius:6px;padding:2px 5px;font-size:8px;font-weight:800;color:#fff;white-space:nowrap;max-width:52px;overflow:hidden;text-overflow:ellipsis;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.5);text-shadow:0 1px 3px rgba(0,0,0,.6);}
.fp-pts{font-family:var(--font-mono);font-size:7.5px;font-weight:600;color:rgba(255,255,255,.85);text-shadow:0 1px 3px rgba(0,0,0,.7);}
.legend{display:flex;gap:10px;padding:0 16px 12px;flex-wrap:wrap;position:relative;z-index:1;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--t3);}
.legend-dot{width:16px;height:16px;border-radius:5px;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1;}
.field-loading{height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;}
.field-loading-emoji{font-size:42px;animation:floatBounce 2.5s ease-in-out infinite;}
@keyframes floatBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ════════════════════════════════════
   FIELD PLAYER DETAIL SHEET
   — Bottom sheet, sticky hero header,
     overflowing player image, scrollable stats
════════════════════════════════════ */
.fm-modal{
  display:none;position:fixed;inset:0;z-index:250;
  background:rgba(0,0,0,.86);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  align-items:flex-end;justify-content:center;
}
.fm-modal.open{display:flex;animation:fmIn .22s var(--ease);}
@keyframes fmIn{from{opacity:0;}to{opacity:1;}}
/* The whole sheet incl. overflowing image */
.fm-shell{
  width:100%;max-width:480px;
  /* extra top space for the overflowing player image */
  padding-top:90px;
  position:relative;
  animation:fmSlide .42s var(--bounce) both;
}
@keyframes fmSlide{from{opacity:0;transform:translateY(60px);}to{opacity:1;transform:none;}}

/* Overflowing player image — sits above the sheet */
.fm-hero-img-wrap{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:140px;height:168px;
  z-index:10;
}
.fm-hero-img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  border-radius:20px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);
  display:block;
}
.fm-hero-img-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:56px;border-radius:20px;
}
/* Gradient fade at bottom of hero image */
.fm-hero-fade{
  position:absolute;bottom:0;left:0;right:0;height:50%;
  border-radius:0 0 20px 20px;
  pointer-events:none;
}

/* The actual sheet card */
.fm-sheet{
  width:100%;
  max-height:82vh;
  border-radius:28px 28px 0 0;
  background:var(--surf2);
  border:1px solid var(--brd2);border-bottom:none;
  box-shadow:0 -12px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Sticky header inside sheet */
.fm-sticky{
  flex-shrink:0;
  /* Enough padding-top so content starts below the overflowing image */
  padding-top:90px;
  position:relative;z-index:1;
}
/* Team colour gradient fills the header + blends into sheet */
.fm-header-gradient{
  position:absolute;top:0;left:0;right:0;height:200px;
  z-index:0;pointer-events:none;
}
/* Bottom blend of header gradient into sheet bg */
.fm-header-gradient::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:70px;
  background:linear-gradient(to bottom,transparent,var(--surf2));
  z-index:1;
}

.fm-header-content{
  position:relative;z-index:2;
  padding:0 20px 14px;
  text-align:center;
}
.fm-player-name{
  font-family:var(--font-display);font-size:28px;letter-spacing:.05em;line-height:1;
  color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);
  margin-bottom:4px;
}
.fm-player-sub{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:10px;font-weight:500;}
.fm-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.fmbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:7px;display:flex;align-items:center;gap:4px;}
.fmbadge.role{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);}
.fmbadge.captain{background:rgba(255,196,0,.3);color:#ffc400;border:1px solid rgba(255,196,0,.5);}
.fmbadge.vc{background:rgba(180,180,200,.25);color:#c8d0dc;border:1px solid rgba(180,180,200,.35);}
.fmbadge.ocap{background:rgba(255,107,53,.25);color:#ff9060;border:1px solid rgba(255,107,53,.45);}
.fmbadge.pcap{background:rgba(155,89,182,.25);color:#cc99ff;border:1px solid rgba(155,89,182,.45);}
.fmbadge.price{background:rgba(255,215,0,.18);color:#ffd700;border:1px solid rgba(255,215,0,.3);font-family:var(--font-mono);}
.fm-close{
  position:absolute;top:14px;right:16px;z-index:20;
  width:32px;height:32px;border-radius:10px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--bounce),background .2s;
}
.fm-close:hover{transform:scale(1.1) rotate(90deg);background:rgba(231,76,60,.5);}

/* Rank + pts strip */
.fm-rank-strip{
  margin:0 16px 0;padding:12px 18px;border-radius:16px;
  display:flex;align-items:center;gap:12px;
  background:rgba(79,172,254,.08);border:1px solid rgba(79,172,254,.18);
  position:relative;z-index:2;
}
.fm-rank-left{flex:1;}
.fm-rank-label{font-size:9px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);}
.fm-rank-num{font-family:var(--font-display);font-size:38px;line-height:1;color:var(--blue);}
.fm-rank-sub{font-size:11px;color:var(--t2);margin-top:1px;font-weight:500;}
.fm-pts-right{text-align:right;}
.fm-pts-big-label{font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);}
.fm-pts-big{font-family:var(--font-display);font-size:38px;line-height:1;color:var(--t1);}

/* Scrollable stats */
.fm-scroll-body{
  flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
  padding-top:14px;
}
.fm-scroll-body::-webkit-scrollbar{display:none;}
.fm-stats-section{padding:0 16px 48px;}
.fm-stats-title{
  font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  color:var(--t3);margin:14px 0 8px;
  display:flex;align-items:center;gap:7px;
}
.fm-stats-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--div),transparent);}
.fm-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.fm-stat-box{
  background:var(--surf);border:1px solid var(--brd);border-radius:14px;
  padding:12px 10px;transition:transform .2s var(--bounce),border-color .2s;
  text-align:center;
}
.fm-stat-box:hover{transform:scale(1.04);border-color:var(--brd2);}
.fm-stat-icon{font-size:15px;margin-bottom:4px;display:block;}
.fm-stat-val{font-family:var(--font-display);font-size:22px;font-weight:500;color:var(--t1);line-height:1;margin-bottom:3px;}
.fm-stat-val.zero{color:var(--t3);}
.fm-stat-label{font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:480px;height:68px;background:var(--nav);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--brd);border-radius:28px;display:flex;justify-content:space-around;align-items:center;padding:6px 2px;box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);z-index:100;}
.nav-item{text-align:center;color:var(--t3);text-decoration:none;font-size:8px;font-weight:700;letter-spacing:.05em;flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .25s;}
.nav-item.active{color:var(--accent);}
.nav-icon-wrap{width:38px;height:29px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .2s var(--bounce);}
.nav-item.active .nav-icon-wrap{background:var(--accent-soft);box-shadow:0 0 12px rgba(255,107,53,.2);}
.nav-item:hover .nav-icon-wrap{transform:translateY(-2px);}
.nav-icon{font-size:17px;line-height:1;}
</style>
</head>
<body>
<canvas id="pitch-canvas"></canvas>

<div class="topbar">
  <div class="topbar-left">
    <p class="greeting">Player Cards</p>
    <h1 id="page-title">All Players</h1>
    <p class="player-count-sub" id="player-count">Loading…</p>
  </div>
  <button class="theme-btn" onclick="toggleTheme()"><span id="theme-icon">☀️</span></button>
</div>

<!-- VIEW TOGGLE -->
<div class="view-toggle">
  <button class="vt-btn active" id="vt-cards" onclick="switchView('cards')">🃏 Player Cards</button>
  <button class="vt-btn" id="vt-field" onclick="switchView('field')">🏟️ Team Field</button>
</div>

<!-- CARDS VIEW -->
<div id="view-cards">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-bar" id="search-bar" placeholder="Search players…" oninput="applyFilters()">
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('ALL',this)">All</button>
    <button class="filter-btn" onclick="setFilter('BAT',this)">🏏 Bat</button>
    <button class="filter-btn" onclick="setFilter('BOWL',this)">🎳 Bowl</button>
    <button class="filter-btn" onclick="setFilter('AR',this)">⚡ All-R</button>
    <button class="filter-btn" onclick="setFilter('WK',this)">🧤 WK</button>
    <button class="filter-btn" onclick="setFilter('GOLD',this)">🥇 Gold</button>
    <button class="filter-btn" onclick="setFilter('SILVER',this)">🥈 Silver</button>
    <button class="filter-btn" onclick="setFilter('BRONZE',this)">🥉 Bronze</button>
    <button class="filter-btn" onclick="setFilter('ELITE',this)">🔵 Elite</button>
    <button class="filter-btn" onclick="setFilter('SOLD',this)">✅ Sold</button>
    <button class="filter-btn" onclick="setFilter('UNSOLD',this)">⭕ Unsold</button>
  </div>
  <div class="list-wrap">
    <div id="player-list"><div class="empty-state">Loading players…</div></div>
  </div>
</div>

<!-- FIELD VIEW -->
<div id="view-field" style="display:none">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ffc400;color:#000">👑</div>Captain</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9ca8b4;color:#000">⭐</div>Vice-Capt</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FF6B35">🧢</div>Orange Cap</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9b59b6">🎩</div>Purple Cap</div>
  </div>
  <div class="field-centering">
    <div class="field-outer">
      <div class="field" id="field-container">
        <div class="pitch-strip"></div>
        <div class="field-loading" id="field-loading">
          <span class="field-loading-emoji">🏏</span>Loading your squad…
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CARD MODAL -->
<div id="card-modal" class="modal" onclick="handleCardOverlay(event)">
  <button class="modal-close" onclick="closeCardModal()">✕</button>
  <div class="card-scene-wrap">
    <div class="card-glow-ring" id="card-glow-ring"></div>
    <div class="card-scene" onclick="flipCard()">
      <div class="card-flip" id="card-flip">
        <div class="card-face" id="card-front"></div>
        <div class="card-face card-back-face" id="card-back"></div>
      </div>
    </div>
  </div>
  <div class="modal-hint">Tap card to flip</div>
</div>

<!-- FIELD PLAYER DETAIL SHEET -->
<div class="fm-modal" id="fm-modal" onclick="handleFmOverlay(event)">
  <div class="fm-card" onclick="event.stopPropagation()">
    <button class="fm-close" onclick="closeFmModal()">✕</button>

    <!-- Sticky header: image LEFT + info RIGHT -->
    <div class="fm-header" id="fm-header">
      <div class="fm-header-bg" id="fm-header-bg"></div>

      <!-- Left: player photo -->
      <div class="fm-img-col" id="fm-img-col">
        <div id="fm-img-slot" style="width:100%;height:100%"></div>
      </div>

      <!-- Right: name, sub, badges -->
      <div class="fm-info-col">
        <div class="fm-player-name" id="fm-name">—</div>
        <div class="fm-player-sub" id="fm-sub">—</div>
        <div class="fm-badges" id="fm-badges"></div>
      </div>
    </div>

    <!-- Rank + pts strip (sticky, below header) -->
    <div class="fm-rank-row" id="fm-rank-row">
      <div class="fm-rank-cell">
        <div class="fm-rc-label">Universal Rank</div>
        <div class="fm-rc-val" id="fm-rank">#—</div>
        <div class="fm-rc-sub" id="fm-rank-sub">of all players</div>
      </div>
      <div class="fm-rank-cell">
        <div class="fm-rc-label">Fantasy Pts</div>
        <div class="fm-rc-val pts" id="fm-pts">—</div>
        <div class="fm-rc-sub">total</div>
      </div>
      <div class="fm-rank-cell">
        <div class="fm-rc-label">Price</div>
        <div class="fm-rc-val" id="fm-price" style="font-size:22px">—</div>
        <div class="fm-rc-sub">auction</div>
      </div>
    </div>

    <!-- Scrollable stats -->
    <div class="fm-scroll-body">
      <div class="fm-stats-section" id="fm-stats"></div>
    </div>
  </div>
</div>

  <a href="dashboard.html" class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">🏠</span></div>Home</a>
  <a href="squad.html" class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">🛡️</span></div>Squad</a>
  <a href="players.html" class="nav-item active"><div class="nav-icon-wrap"><span class="nav-icon">🃏</span></div>Cards</a>
  <a href="teams.html" class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">👥</span></div>Teams</a>
  <a href="stats.html" class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">📊</span></div>Stats</a>
  <a href="settings.html" class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">⚙️</span></div>Settings</a>
</nav>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxe8ueJLArFFRBqnVIhYn6LBEAnHsU6El_BlKeRgXIdR5Xo4UNgLV79NiLWtQyfQpDy/exec";
const myTeam=localStorage.getItem("teamName")||"";

/* THEME */
const savedTheme=localStorage.getItem("theme")||"dark";
document.documentElement.setAttribute("data-theme",savedTheme);
document.getElementById("theme-icon").textContent=savedTheme==="dark"?"\u2600\ufe0f":"\ud83c\udf19";
function toggleTheme(){
  const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);localStorage.setItem("theme",next);
  document.getElementById("theme-icon").textContent=next==="dark"?"\u2600\ufe0f":"\ud83c\udf19";
}

/* PARTICLES */
(function(){
  const canvas=document.getElementById("pitch-canvas"),ctx=canvas.getContext("2d");
  let W,H,P=[];
  const EM=["\ud83c\udfcf","\u26a1","\u2728","\ud83c\udf1f","\ud83d\udcab","\u2022","\u2022","\u2022","\u2022","\u2022"];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function make(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:-Math.random()*.45-.1,size:Math.random()*7+5,emoji:EM[Math.floor(Math.random()*EM.length)],alpha:Math.random()*.28+.04,life:Math.random()*200+100};}
  function init(){P=Array.from({length:22},make);}
  function tick(){
    ctx.clearRect(0,0,W,H);
    const isDark=document.documentElement.getAttribute("data-theme")==="dark";
    P.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0||p.y<-20)P[i]=make();
      ctx.save();ctx.globalAlpha=p.alpha*(isDark?1:.4);ctx.font=p.size+"px serif";ctx.fillText(p.emoji,p.x,p.y);ctx.restore();});
    requestAnimationFrame(tick);
  }
  window.addEventListener("resize",()=>{resize();init();});resize();init();tick();
})();

/* TEAM DATA - unified for both views */
const TEAMS={
  MI:{color:"#004BA0",color2:"#1a6fd4",c1:"#004BA0",c2:"#1a6fd4",grad:"linear-gradient(110deg,#004BA0,#1a6fd4,#0090ff)",logo:"ipl team logo/mi.webp",fb:"\ud83d\udd35",full:"Mumbai Indians"},
  CSK:{color:"#c07c08",color2:"#f5a623",c1:"#c07c08",c2:"#FFD700",grad:"linear-gradient(110deg,#7a4f00,#c07c08,#FFD700)",logo:"ipl team logo/csk.jpg",fb:"\ud83d\udfe1",full:"Chennai Super Kings"},
  RCB:{color:"#8B0000",color2:"#ff1a35",c1:"#8B0000",c2:"#ff4560",grad:"linear-gradient(110deg,#4a0000,#b0001a,#ff4560)",logo:"ipl team logo/rcb.jpg",fb:"\ud83d\udd34",full:"Royal Challengers"},
  KKR:{color:"#3A225D",color2:"#6b3aaa",c1:"#3A225D",c2:"#8b5cf6",grad:"linear-gradient(110deg,#1a0a2e,#3A225D,#8b5cf6)",logo:"ipl team logo/kkr.webp",fb:"\ud83d\ufe35",full:"Kolkata Knight Riders"},
  DC:{color:"#17479E",color2:"#2a5fc0",c1:"#17479E",c2:"#4facfe",grad:"linear-gradient(110deg,#0a1f4e,#17479E,#4facfe)",logo:"ipl team logo/dc.webp",fb:"\ud83d\udd37",full:"Delhi Capitals"},
  PBKS:{color:"#c41920",color2:"#ED1F27",c1:"#c41920",c2:"#ff6b6b",grad:"linear-gradient(110deg,#6a0008,#c41920,#ff6b6b)",logo:"ipl team logo/pk.webp",fb:"\ud83e\udd81",full:"Punjab Kings"},
  RR:{color:"#254AA5",color2:"#f542b3",c1:"#254AA5",c2:"#f542b3",grad:"linear-gradient(110deg,#102060,#254AA5,#f542b3)",logo:"ipl team logo/rr.webp",fb:"\ud83d\udc97",full:"Rajasthan Royals"},
  SRH:{color:"#c04010",color2:"#F7591A",c1:"#c04010",c2:"#ff8c00",grad:"linear-gradient(110deg,#6a2000,#c04010,#ff8c00)",logo:"ipl team logo/srh.webp",fb:"\ud83d\udfe0",full:"Sunrisers Hyderabad"},
  GT:{color:"#1B2133",color2:"#3a5a9a",c1:"#1B2133",c2:"#3a5a9a",grad:"linear-gradient(110deg,#0a0e18,#1B2133,#3a5a9a)",logo:"ipl team logo/gt.webp",fb:"\ud83d\udee1\ufe0f",full:"Gujarat Titans"},
  LSG:{color:"#1d6b42",color2:"#5ec48a",c1:"#1d6b42",c2:"#5ec48a",grad:"linear-gradient(110deg,#0a3020,#1d6b42,#5ec48a)",logo:"ipl team logo/lsg.jpg",fb:"\ud83d\udfe2",full:"Lucknow Super Giants"},
};
function getTeam(n){
  const u=(n||"").toUpperCase();
  for(const k of Object.keys(TEAMS)) if(u.includes(k)) return{abbr:k,...TEAMS[k]};
  return{abbr:(u.slice(0,3)||"IPL"),color:"#2a3a5a",color2:"#4facfe",c1:"#2a3a5a",c2:"#4facfe",grad:"linear-gradient(110deg,#0d1a2e,#2a3a5a,#4facfe)",logo:"",fb:"\ud83c\udfcf",full:"IPL Team"};
}

/* HELPERS */
function getPts(p){return parseFloat(p["Total Points"]||p["Current Points"]||0)||0;}
function gi(p,...keys){for(const k of keys){const v=p[k];if(v!==undefined&&v!==null&&v!=="")return parseInt(v)||0;}return 0;}
function roleClass(r){return r==="BOWL"?"rb-bowl":r==="AR"?"rb-ar":r==="WK"?"rb-wk":"rb-bat";}
const TIER_PTS_COLOR={gold:"#FFD700",silver:"#C0C8D8",bronze:"#CD7F32"};

/* STATE */
let allPlayers=[],activeFilter="ALL",tierMap={},ratingMap={};
let leadersGlobal={},myPlayersGlobal=[];
let fieldLoaded=false;

function calcTiersAndRatings(players){
  const withPts=players.filter(p=>getPts(p)>0).sort((a,b)=>getPts(b)-getPts(a));
  const total=withPts.length,goldCount=Math.ceil(total*.33),silverCount=Math.ceil(total*.33);
  players.forEach(p=>{
    const pts=getPts(p),name=p["Player Name"];
    if(pts<=0){tierMap[name]="bronze";ratingMap[name]=35;return;}
    const rank=withPts.findIndex(x=>x["Player Name"]===name);
    if(rank<goldCount){tierMap[name]="gold";ratingMap[name]=Math.max(80,99-Math.round((rank/Math.max(goldCount-1,1))*19));}
    else if(rank<goldCount+silverCount){const r=rank-goldCount;tierMap[name]="silver";ratingMap[name]=Math.max(60,79-Math.round((r/Math.max(silverCount-1,1))*19));}
    else{const r=rank-goldCount-silverCount,bc=Math.max(total-goldCount-silverCount,1);tierMap[name]="bronze";ratingMap[name]=Math.max(40,59-Math.round((r/Math.max(bc-1,1))*19));}
  });
}

/* VIEW SWITCH */
let currentView="cards";
function switchView(view){
  currentView=view;
  document.getElementById("view-cards").style.display=view==="cards"?"block":"none";
  document.getElementById("view-field").style.display=view==="field"?"block":"none";
  document.getElementById("vt-cards").classList.toggle("active",view==="cards");
  document.getElementById("vt-field").classList.toggle("active",view==="field");
  document.getElementById("page-title").textContent=view==="cards"?"All Players":"My Squad";
  if(view==="cards") document.getElementById("player-count").textContent=allPlayers.length+" players";
  else document.getElementById("player-count").textContent="Your team on the pitch";
  if(view==="field"&&!fieldLoaded) loadField();
}

/* LOAD */
document.addEventListener("DOMContentLoaded",async()=>{
  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getPlayers"})});
    const r=await res.json();
    if(r.status==="success"){allPlayers=r.players;calcTiersAndRatings(allPlayers);applyFilters();}
    else throw new Error();
  }catch{
    document.getElementById("player-list").innerHTML='<div class="empty-state" style="color:#e74c3c">\u26a0\ufe0f Failed to load players.</div>';
  }
});

/* FILTERS */
function setFilter(val,btn){
  activeFilter=val;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");applyFilters();
}
function applyFilters(){
  const q=document.getElementById("search-bar").value.toLowerCase().trim();
  const f=allPlayers.filter(p=>{
    const mq=!q||p["Player Name"].toLowerCase().includes(q)||(p["IPL Team"]||"").toLowerCase().includes(q);
    const role=(p["Role"]||"").toUpperCase(),tier=tierMap[p["Player Name"]]||"bronze",sold=p["Sold To"]&&p["Sold To"].trim();
    if(activeFilter==="BAT")    return mq&&role==="BAT";
    if(activeFilter==="BOWL")   return mq&&role==="BOWL";
    if(activeFilter==="AR")     return mq&&role==="AR";
    if(activeFilter==="WK")     return mq&&role==="WK";
    if(activeFilter==="GOLD")   return mq&&tier==="gold";
    if(activeFilter==="SILVER") return mq&&tier==="silver";
    if(activeFilter==="BRONZE") return mq&&tier==="bronze";
    if(activeFilter==="ELITE")  return mq&&getCardType(p,leadersGlobal)!=="bronze"&&getCardType(p,leadersGlobal)!=="silver"&&getCardType(p,leadersGlobal)!=="gold";
    if(activeFilter==="SOLD")   return mq&&!!sold;
    if(activeFilter==="UNSOLD") return mq&&!sold;
    return mq;
  });
  document.getElementById("player-count").textContent=f.length+" of "+allPlayers.length+" players";
  renderList(f);
}

function renderList(players){
  const el=document.getElementById("player-list");
  if(!players.length){el.innerHTML='<div class="empty-state">No players match 🏏</div>';return;}
  const myCap=localStorage.getItem("captain")||"",myVC=localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal?.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leadersGlobal?.purpleCap?.name||"").trim().toLowerCase();
  el.innerHTML=players.map((p,i)=>{
    const tier=tierMap[p["Player Name"]]||"bronze",team=getTeam(p["IPL Team"]||""),pts=getPts(p);
    const role=(p["Role"]||"BAT").toUpperCase(),name=p["Player Name"]||"",owned=p["Sold To"]&&p["Sold To"].trim();
    const isCap=myCap===name&&p["Sold To"]===myTeam,isVC=myVC===name&&p["Sold To"]===myTeam;
    const pnl=name.trim().toLowerCase(),isOC=ocName&&pnl===ocName,isPC=pcName&&pnl===pcName;
    const tierColor=TIER_PTS_COLOR[tier];
    // Circle avatar — player headshot > team logo > emoji fallback
    const playerImg=p["Image"]&&p["Image"].toString().trim();
    const logoImg=playerImg
      ?`<img src="${playerImg}" style="width:46px;height:46px;object-fit:cover;object-position:top center;position:relative;z-index:1;border-radius:50%;" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
       (team.logo?`<img src="${team.logo}" style="width:30px;height:30px;object-fit:contain;position:relative;z-index:1;display:none" alt="${team.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="font-size:20px;display:none">${team.fb}</span>`:`<span style="font-size:20px;display:none">${team.fb}</span>`)
      :(team.logo?`<img src="${team.logo}" style="width:30px;height:30px;object-fit:contain;position:relative;z-index:1" alt="${team.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="font-size:20px;display:none">${team.fb}</span>`:`<span style="font-size:20px">${team.fb}</span>`);
    // Small badges around the circle
    let avBadges=`<div class="row-av-tier ${tier}"></div>`;
    if(isCap)     avBadges+=`<div class="row-av-badge c-badge">C</div>`;
    else if(isVC) avBadges+=`<div class="row-av-badge vc-badge">VC</div>`;
    if(isOC)      avBadges+=`<div class="row-av-badge oc-badge">🧢</div>`;
    if(isPC)      avBadges+=`<div class="row-av-badge pc-badge">🎩</div>`;
    return`<div class="player-row" style="animation-delay:${Math.min(i*.04,.5)}s" onclick="openCard(${i})">
      <div class="row-bg" style="background:linear-gradient(110deg,${team.color}44 0%,${team.color2}18 50%,transparent 80%)"></div>
      <div class="row-shimmer"></div>
      <div class="row-accent-line" style="background:linear-gradient(180deg,${tierColor},${team.color2})"></div>
      <div class="row-content">
        <div class="row-avatar-wrap">
          <div class="row-avatar" style="background:linear-gradient(135deg,${team.color},${team.color2});border-color:${team.color2}bb">${logoImg}</div>
          ${avBadges}
        </div>
        <div class="row-info">
          <div class="row-name">${name}</div>
          <div class="row-meta">
            <span class="row-badge ${roleClass(role)}">${role}</span>
            <span class="row-badge rb-team">${team.abbr}</span>
            ${owned?`<span class="row-badge rb-owned">${p["Sold To"]}</span>`:`<span class="row-badge rb-unsold">Unsold</span>`}
          </div>
        </div>
        <div class="row-right">
          <div class="row-pts" style="color:${tierColor}">${pts>0?pts+" pts":"—"}</div>
          <div class="row-pts-label">${pts>0?"fantasy pts":"no pts"}</div>
        </div>
        <div class="row-chevron">❯</div>
      </div>
    </div>`;
  }).join("");
  window._fp=players;
}

/* OPEN CARD */
// Helper: determine card type from pts + special roles
function getCardType(p, leaders){
  const pts=getPts(p);
  const name=(p["Player Name"]||"").trim().toLowerCase();
  const ocName=(leaders?.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leaders?.purpleCap?.name||"").trim().toLowerCase();
  const potName=(leaders?.highestPts?.name||"").trim().toLowerCase();
  if(potName&&name===potName) return "pot";
  if(ocName&&name===ocName)   return "orange-special";
  if(pcName&&name===pcName)   return "purple-special";
  if(pts>=96)  return "elite";
  if(pts>=81)  return "gold";
  if(pts>=36)  return "silver";
  return "bronze";
}

// Particle colours per card type
const PARTICLE_COLORS={
  elite:       ["#60c8ff","#2080e0","#ffd700","#ffffff"],
  "orange-special":["#ffaa40","#ff7020","#ffcc60","#ffffff"],
  "purple-special":["#c060ff","#8030d0","#e0b0ff","#ffffff"],
  pot:         ["#ffd040","#fff080","#c89000","#ffffff","#ffe0a0"],
};

function spawnParticles(canvas, cardType){
  const colors=PARTICLE_COLORS[cardType];
  if(!colors)return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width=canvas.offsetWidth;
  const H=canvas.height=canvas.offsetHeight;
  let particles=Array.from({length:28},()=>({
    x:Math.random()*W,y:H+8,
    vx:(Math.random()-.5)*.8,vy:-(Math.random()*1.2+.4),
    size:Math.random()*3+1.5,
    color:colors[Math.floor(Math.random()*colors.length)],
    alpha:Math.random()*.7+.3,
    life:Math.random()*120+60,maxLife:180
  }));
  let raf;
  function tick(){
    ctx.clearRect(0,0,W,H);
    particles.forEach((p,i)=>{
      p.x+=p.vx;p.y+=p.vy;p.life--;
      if(p.life<=0||p.y<-10){
        particles[i]={x:Math.random()*W,y:H+8,vx:(Math.random()-.5)*.8,vy:-(Math.random()*1.2+.4),
          size:Math.random()*3+1.5,color:colors[Math.floor(Math.random()*colors.length)],
          alpha:Math.random()*.7+.3,life:Math.random()*120+60,maxLife:180};
        return;
      }
      ctx.save();
      ctx.globalAlpha=p.alpha*(p.life/p.maxLife);
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    raf=requestAnimationFrame(tick);
  }
  tick();
  return raf;
}
let _particleRaf=null;

function openCard(idx){
  const p=window._fp[idx];
  if(!p)return;
  const name=p["Player Name"]||"";
  const cardType=getCardType(p,leadersGlobal);
  const tier=tierMap[name]||"bronze";
  const team=getTeam(p["IPL Team"]||"");
  const pts=getPts(p);
  const rating=ratingMap[name]||35;
  const role=(p["Role"]||"BAT").toUpperCase();
  const owned=p["Sold To"]&&p["Sold To"].trim();
  const myCap_=localStorage.getItem("captain")||"";
  const myVC_=localStorage.getItem("viceCaptain")||"";
  const isCap=myCap_===name&&p["Sold To"]===myTeam;
  const isVC=myVC_===name&&p["Sold To"]===myTeam;
  const price=p["Price Bought"]?`₹${p["Price Bought"]}Cr`:"Unsold";
  const fantasyTeam=owned||"Unsold";
  const runs=gi(p,"Runs","runs"),wkts=gi(p,"Wickets","wickets"),cats=gi(p,"Catches","catches");
  const fours=gi(p,"4s","fours"),sixes=gi(p,"6s","sixes"),fifties=gi(p,"50s","fifties");
  const hunds=gi(p,"100s","hundreds"),threeW=gi(p,"3W","threew"),fiveW=gi(p,"5W","fivew");
  const fourW=gi(p,"fourv"),maidens=gi(p,"Maidens","maidens"),dots=gi(p,"Dots","dots");

  // Glow ring colour + animation
  const glowColors={
    bronze:"rgba(180,100,30,.55)",silver:"rgba(180,180,180,.5)",gold:"rgba(220,170,0,.65)",
    elite:"rgba(40,160,255,.7)","orange-special":"rgba(255,130,30,.7)","purple-special":"rgba(170,60,255,.7)",pot:"rgba(255,210,40,.75)"
  };
  const glowRing=document.getElementById("card-glow-ring");
  glowRing.style.background=glowColors[cardType]||"transparent";

  // Set card classes
  const front=document.getElementById("card-front");
  const back=document.getElementById("card-back");
  front.className=`card-face ${cardType}`;
  back.className=`card-face card-back-face ${cardType}`;
  document.getElementById("card-flip").classList.remove("flipped");

  // Player photo
  const pImg=p["Image"]&&p["Image"].toString().trim();
  const photoHTML=pImg
    ?`<img class="cf-player-photo" src="${pImg}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
     `<div class="cf-photo-fallback" style="display:none">${team.logo?`<img src="${team.logo}" style="width:55%;height:55%;object-fit:contain">`:`<span>${team.fb}</span>`}</div>`
    :`<div class="cf-photo-fallback">${team.logo?`<img src="${team.logo}" style="width:55%;height:55%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))" alt="${team.abbr}">`:`<span style="font-size:clamp(44px,14vw,64px)">${team.fb}</span>`}</div>`;

  // Team logo
  const tLogoHTML=team.logo
    ?`<img src="${team.logo}" style="width:100%;height:100%;object-fit:contain;" alt="${team.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;font-size:clamp(22px,7vw,30px)">${team.fb}</span>`
    :`<span style="font-size:clamp(22px,7vw,30px)">${team.fb}</span>`;

  // Special badge
  const specialLabels={
    elite:"🔵 Elite",
    "orange-special":"🧢 Orange Cap",
    "purple-special":"🎩 Purple Cap",
    pot:"🏆 Player of Tournament"
  };
  const specialBadge=specialLabels[cardType]?`<div class="cf-special-badge">${specialLabels[cardType]}</div>`:"";

  // Front innerHTML
  front.innerHTML=`
  <canvas class="cf-canvas" id="cf-canvas"></canvas>
  <div class="cf-wrap">
    <div class="cf-photo-zone">
      ${photoHTML}
      <div class="cf-photo-fade"></div>
      <div class="cf-rating-block"><span class="cf-rating">${rating}</span><span class="cf-role-lbl">${role}</span></div>
      <div class="cf-team-logo-zone">${tLogoHTML}</div>
      ${specialBadge}
    </div>
    <div class="cf-info-zone">
      <div class="cf-name">${name.toUpperCase()}</div>
      <div class="cf-owner-badge">${fantasyTeam}</div>
      <div class="cf-divider-line"></div>
      <div class="cf-stats-row">
        <div class="cf-stat-col left">
          <div class="cf-stat-item"><span class="cf-sv">${runs}</span><span class="cf-sl">RUN</span></div>
          <div class="cf-stat-item"><span class="cf-sv">${wkts}</span><span class="cf-sl">WKT</span></div>
          <div class="cf-stat-item"><span class="cf-sv">${cats}</span><span class="cf-sl">CAT</span></div>
        </div>
        <div class="cf-stat-vdiv"></div>
        <div class="cf-stat-col right">
          <div class="cf-stat-item"><span class="cf-sv">${fours}</span><span class="cf-sl">4s</span></div>
          <div class="cf-stat-item"><span class="cf-sv">${sixes}</span><span class="cf-sl">6s</span></div>
          <div class="cf-stat-item"><span class="cf-sv">${pts}</span><span class="cf-sl">PTS</span></div>
        </div>
      </div>
    </div>
  </div>`;

  // Back innerHTML
  back.innerHTML=`
  <div class="cb-wrap">
    <div class="cb-header">
      <div class="cb-name">${name.toUpperCase()}</div>
      <div class="cb-sub">${team.abbr} · ${pts} pts · ${price} · ${fantasyTeam}</div>
    </div>
    <div class="cb-grid">
      <div class="cb-stat"><div class="cb-sv">${runs}</div><div class="cb-sl">Runs</div></div>
      <div class="cb-stat"><div class="cb-sv">${fours}</div><div class="cb-sl">4s</div></div>
      <div class="cb-stat"><div class="cb-sv">${sixes}</div><div class="cb-sl">6s</div></div>
      <div class="cb-stat"><div class="cb-sv">${cats}</div><div class="cb-sl">Catches</div></div>
      <div class="cb-stat"><div class="cb-sv">${wkts}</div><div class="cb-sl">Wickets</div></div>
      <div class="cb-stat"><div class="cb-sv">${maidens}</div><div class="cb-sl">Maidens</div></div>
      <div class="cb-stat"><div class="cb-sv">${dots}</div><div class="cb-sl">Dots</div></div>
      <div class="cb-stat"><div class="cb-sv">${fifties}</div><div class="cb-sl">50s</div></div>
      <div class="cb-stat"><div class="cb-sv">${hunds}</div><div class="cb-sl">100s</div></div>
      <div class="cb-stat"><div class="cb-sv">${threeW}</div><div class="cb-sl">3W</div></div>
      <div class="cb-stat"><div class="cb-sv">${fiveW}</div><div class="cb-sl">5W</div></div>
      <div class="cb-stat"><div class="cb-sv">${fourW}</div><div class="cb-sl">4W</div></div>
    </div>
    <div class="cb-footer">${pts} pts · Rating ${rating}${isCap?" · Captain 👑":isVC?" · Vice-Captain ⭐":""}</div>
  </div>`;

  document.getElementById("card-modal").classList.add("open");

  // Spawn particles after render
  cancelAnimationFrame(_particleRaf);
  requestAnimationFrame(()=>{
    const canvas=document.getElementById("cf-canvas");
    if(canvas&&PARTICLE_COLORS[cardType]){
      _particleRaf=spawnParticles(canvas,cardType);
    }
  });
}
function flipCard(){document.getElementById("card-flip").classList.toggle("flipped");}
function closeCardModal(){
  document.getElementById("card-modal").classList.remove("open");
  document.getElementById("card-flip").classList.remove("flipped");
  cancelAnimationFrame(_particleRaf);
}
function handleCardOverlay(e){if(e.target===document.getElementById("card-modal"))closeCardModal();}

/* ========================
   FIELD VIEW
======================== */
async function loadField(){
  fieldLoaded=true;
  try{
    const r=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getRoles",teamName:myTeam})}).then(x=>x.json());
    if(r?.status==="success"){if(r.captain)localStorage.setItem("captain",r.captain);if(r.viceCaptain)localStorage.setItem("viceCaptain",r.viceCaptain);}
  }catch{}
  const lr=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getLeaders"})}).then(x=>x.json()).catch(()=>null);
  leadersGlobal=lr?.leaders||{};
  myPlayersGlobal=allPlayers.filter(p=>p["Sold To"]===myTeam);
  const loadEl=document.getElementById("field-loading");
  if(!myPlayersGlobal.length){loadEl.innerHTML='<span style="font-size:42px">\ud83c\udfcf</span><br>Your squad is empty.<br>Head to Squad to draft players!';return;}
  loadEl.style.display="none";
  renderField();
}

function renderField(){
  const cap=localStorage.getItem("captain")||"",vc=localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leadersGlobal.purpleCap?.name||"").trim().toLowerCase();
  const groups={WK:[],BAT:[],AR:[],BOWL:[]};
  myPlayersGlobal.forEach(p=>{const r=p["Role"];if(groups[r])groups[r].push(p);else groups.BAT.push(p);});
  const sorted=[...allPlayers].sort((a,b)=>getPts(b)-getPts(a));
  const rankMap={};sorted.forEach((p,i)=>{rankMap[(p["Player Name"]||"").trim()]=i+1;});
  const container=document.getElementById("field-container");
  const rows=[{label:"BOWLERS",key:"BOWL"},{label:"ALL-ROUNDERS",key:"AR"},{label:"BATTERS",key:"BAT"},{label:"WICKET-KEEPERS",key:"WK"}];
  let html="";
  rows.forEach(({label,key})=>{
    const pl=groups[key];if(!pl.length)return;
    const tokens=pl.map((p,idx)=>{
      const name=p["Player Name"]||"",nl=name.trim().toLowerCase();
      const isC=cap===name,isVC_=vc===name,isOC=ocName&&nl===ocName,isPC=pcName&&nl===pcName;
      const pts=getPts(p),tc=getTeam(p["IPL Team"]||""),sn=name.split(" ").slice(-1)[0],delay=idx*.06+.1;
      let badges="";
      if(isC) badges+='<div class="fp-badge cap-c">C</div>';
      else if(isVC_) badges+='<div class="fp-badge cap-vc">VC</div>';
      if(isOC) badges+='<div class="fp-badge orange-cap">\ud83e\udde2</div>';
      if(isPC) badges+='<div class="fp-badge purple-cap">\ud83c\udfa9</div>';
      const pImg=p["Image"]&&p["Image"].toString().trim();
      const logoHTML=pImg
        ?`<img src="${pImg}" style="width:46px;height:46px;object-fit:cover;object-position:top center;border-radius:50%;position:relative;z-index:1;" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`+
         (tc.logo?`<img src="${tc.logo}" style="width:34px;height:34px;object-fit:contain;display:none" alt="${tc.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;font-size:22px">${tc.fb}</span>`:`<span style="display:none;font-size:22px">${tc.fb}</span>`)
        :(tc.logo?`<img src="${tc.logo}" style="width:34px;height:34px;object-fit:contain;" alt="${tc.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;font-size:22px">${tc.fb}</span>`:`<span style="font-size:22px">${tc.fb}</span>`);
      return`<div class="fp" style="animation-delay:${delay}s" onclick="openFmModal('${encodeURIComponent(name)}')">
        <div class="fp-avatar-wrap">
          <div class="fp-avatar" style="background:linear-gradient(135deg,${tc.c1},${tc.c2});border-color:${tc.c2}88">${logoHTML}</div>
          ${badges}
        </div>
        <div class="fp-name">${sn}</div>
        <div class="fp-pts">${pts} pts</div>
      </div>`;
    }).join("");
    html+=`<div class="role-label">${label}</div><div class="role-row">${tokens}</div>`;
  });
  const pitchStrip=container.querySelector(".pitch-strip");
  container.innerHTML="";container.appendChild(pitchStrip);
  const d=document.createElement("div");d.innerHTML=html;container.appendChild(d);
}

/* FIELD PLAYER DETAIL MODAL */
function openFmModal(enc){
  const name=decodeURIComponent(enc);
  const p=myPlayersGlobal.find(x=>(x["Player Name"]||"")===name);
  if(!p)return;
  const tc=getTeam(p["IPL Team"]||"");
  const cap=localStorage.getItem("captain")||"";
  const vc=localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leadersGlobal.purpleCap?.name||"").trim().toLowerCase();
  const pnl=name.trim().toLowerCase();
  const pts=getPts(p);
  const sorted=[...allPlayers].sort((a,b)=>getPts(b)-getPts(a));
  const rank=sorted.findIndex(x=>(x["Player Name"]||"").trim()===name.trim())+1;
  const total=sorted.length;

  // Header background — team colour gradient
  const bg=document.getElementById("fm-header-bg");
  bg.style.background=`linear-gradient(135deg,${tc.c1} 0%,${tc.c2} 55%,rgba(0,0,0,0) 100%)`;

  // Player image (left column)
  const fmImg=p["Image"]&&p["Image"].toString().trim();
  const imgSlot=document.getElementById("fm-img-slot");
  if(fmImg){
    imgSlot.innerHTML=`<img class="fm-player-img" src="${fmImg}" alt="${name}" style="width:100%;height:100%;object-fit:cover;object-position:top center;" onerror="this.parentNode.innerHTML='<div class=fm-img-fallback style=background:linear-gradient(135deg,${tc.c1},${tc.c2})>${tc.fb}</div>'">`;
  }else{
    const tl=tc.logo?`<img src="${tc.logo}" style="width:60%;height:60%;object-fit:contain" alt="${tc.abbr}">`:`<span style="font-size:44px">${tc.fb}</span>`;
    imgSlot.innerHTML=`<div class="fm-img-fallback" style="background:linear-gradient(135deg,${tc.c1},${tc.c2})">${tl}</div>`;
  }
  // Image right-edge fade: blend into header bg
  const imgCol=document.getElementById("fm-img-col");
  imgCol.style.setProperty("--fade-color",tc.c2);

  // Player info
  document.getElementById("fm-name").textContent=name;
  document.getElementById("fm-sub").textContent=(p["IPL Team"]||"—")+" · "+(p["Role"]||"—");

  // Badges
  let bh=`<span class="fmbadge role">${p["Role"]||"—"}</span>`;
  if(cap===name)bh+=`<span class="fmbadge captain">👑 Captain</span>`;
  if(vc===name) bh+=`<span class="fmbadge vc">⭐ VC</span>`;
  if(ocName&&pnl===ocName)bh+=`<span class="fmbadge ocap">🧢 Orange Cap</span>`;
  if(pcName&&pnl===pcName)bh+=`<span class="fmbadge pcap">🎩 Purple Cap</span>`;
  document.getElementById("fm-badges").innerHTML=bh;

  // Rank, pts, price
  document.getElementById("fm-rank").textContent="#"+rank;
  document.getElementById("fm-rank-sub").textContent="of "+total+" players";
  document.getElementById("fm-pts").textContent=pts;
  document.getElementById("fm-price").textContent=p["Price Bought"]?`₹${p["Price Bought"]} Cr`:"—";

  // Stats
  const statDefs={
    Batting:[{k:"Runs",i:"🏃",l:"Runs"},{k:"6s",i:"💥",l:"Sixes"},{k:"4s",i:"4️⃣",l:"Fours"},{k:"50s",i:"⭐",l:"50s"},{k:"100s",i:"💯",l:"100s"}],
    Bowling:[{k:"Wickets",i:"🎯",l:"Wickets"},{k:"Maidens",i:"🔵",l:"Maidens"},{k:"Dots",i:"⚫",l:"Dots"},{k:"3W",i:"🎳",l:"3W Haul"},{k:"5W",i:"🔥",l:"5W Haul"},{k:"fourv",i:"⚡",l:"4W Haul"}],
    Fielding:[{k:"Catches",i:"🧤",l:"Catches"},{k:"Run Outs",i:"🏃",l:"Run Outs"},{k:"Stumpings",i:"🥅",l:"Stumpings"}]
  };
  let sh="";
  Object.entries(statDefs).forEach(([title,defs])=>{
    sh+=`<div class="fm-stats-title">${title}</div><div class="fm-stats-grid">`;
    defs.forEach(d=>{
      const v=parseFloat(p[d.k])||0;
      sh+=`<div class="fm-stat-box"><span class="fm-stat-icon">${d.i}</span><div class="fm-stat-val${v===0?" zero":""}">${v}</div><div class="fm-stat-label">${d.l}</div></div>`;
    });
    sh+="</div>";
  });
  document.getElementById("fm-stats").innerHTML=sh;

  document.getElementById("fm-modal").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeFmModal(){document.getElementById("fm-modal").classList.remove("open");document.body.style.overflow="";}
function handleFmOverlay(e){if(e.target===document.getElementById("fm-modal"))closeFmModal();}
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeCardModal();closeFmModal();}});
