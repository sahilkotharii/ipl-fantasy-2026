<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Players | IPL Fantasy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF6B35;--accent-soft:rgba(255,107,53,.14);
  --blue:#4facfe;--blue-soft:rgba(79,172,254,.12);
  --font-main:'Outfit',sans-serif;--font-mono:'DM Mono',monospace;--font-display:'Bebas Neue',cursive;
  --ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#07101f;
  --mesh:radial-gradient(ellipse at 15% 5%,rgba(79,172,254,.13) 0%,transparent 50%),
        radial-gradient(ellipse at 85% 85%,rgba(255,107,53,.10) 0%,transparent 50%),#07101f;
  --surf:rgba(255,255,255,.04);--brd:rgba(79,172,254,.14);--nav:rgba(7,16,31,.95);
  --t1:#eef2ff;--t2:rgba(238,242,255,.52);--t3:rgba(238,242,255,.28);--div:rgba(255,255,255,.055);
  --inp:rgba(0,0,0,.3);--ibrd:rgba(79,172,254,.15);--ov:rgba(0,0,0,.9);--tog:rgba(255,255,255,.06);
  --row-base:rgba(8,18,38,.85);--row-edge:rgba(6,13,26,.95);
}
[data-theme="light"]{
  --bg:#f0ece6;
  --mesh:radial-gradient(ellipse at 20% 10%,rgba(255,200,150,.2) 0%,transparent 55%),#f0ece6;
  --surf:rgba(255,255,255,.65);--brd:rgba(0,0,0,.07);--nav:rgba(240,236,230,.92);
  --t1:#1a1a2e;--t2:rgba(26,26,46,.55);--t3:rgba(26,26,46,.32);--div:rgba(0,0,0,.07);
  --inp:rgba(0,0,0,.05);--ibrd:rgba(0,0,0,.1);--ov:rgba(0,0,0,.85);--tog:rgba(0,0,0,.06);
  --row-base:rgba(255,255,255,.82);--row-edge:rgba(240,236,230,.95);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-main);background:var(--mesh);background-color:var(--bg);min-height:100vh;
  color:var(--t1);padding-bottom:calc(68px + 14px + 28px);overflow-x:hidden;
  transition:background-color .3s,color .3s;
}

/* ── CRICKET PARTICLE CANVAS ── */
#pitch-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.3;}

/* ── TOPBAR ── */
.topbar{
  position:relative;z-index:1;
  display:flex;justify-content:space-between;align-items:flex-start;padding:24px 20px 10px;
  animation:slideDown .5s var(--bounce) both;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:none;}}
.topbar-left .greeting{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.topbar-left .greeting::before{content:'';width:16px;height:2px;background:linear-gradient(90deg,var(--blue),transparent);border-radius:1px;}
.topbar-left h1{font-family:var(--font-display);font-size:30px;letter-spacing:.06em;
  background:linear-gradient(90deg,var(--t1),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-left p{font-size:11px;color:var(--t3);margin-top:2px;font-weight:500;}
.theme-btn{
  width:40px;height:40px;border-radius:14px;background:var(--tog);border:1px solid var(--brd);
  color:var(--t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .2s var(--bounce),background .3s;
}
.theme-btn:active{transform:scale(.85);}

/* ── SEARCH ── */
.search-wrap{
  margin:0 16px 10px;position:relative;z-index:1;
  animation:fadeUp .4s var(--ease) .1s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.search-bar{
  width:100%;padding:13px 14px 13px 42px;border-radius:16px;
  border:1px solid var(--ibrd);background:var(--inp);color:var(--t1);
  font-family:var(--font-main);font-size:14px;outline:none;-webkit-appearance:none;
  transition:border-color .25s,box-shadow .25s;
}
.search-bar:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.12);}
.search-bar::placeholder{color:var(--t3);}

/* ── FILTER ROW ── */
.filter-row{
  display:flex;gap:7px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;
  animation:fadeUp .4s var(--ease) .15s both;z-index:1;position:relative;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{
  flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--ibrd);background:var(--inp);
  color:var(--t2);font-family:var(--font-main);font-size:11px;font-weight:700;cursor:pointer;
  transition:all .22s var(--bounce);white-space:nowrap;letter-spacing:.03em;
}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
.filter-btn.active{
  background:linear-gradient(135deg,var(--accent),#ff8c5a);border-color:var(--accent);color:#fff;
  box-shadow:0 4px 16px rgba(255,107,53,.35);transform:translateY(-1px);
}

/* ── PLAYER LIST WRAPPER ── */
.list-wrap{
  position:relative;z-index:1;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--brd);border-radius:24px;
  margin:0 16px 16px;overflow:hidden;
  animation:fadeUp .4s var(--ease) .2s both;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
}
[data-theme="light"] .list-wrap{background:rgba(255,255,255,.6);}

/* ── PLAYER ROW ── */
.player-row{
  display:flex;align-items:center;padding:0;
  border-bottom:1px solid var(--div);cursor:pointer;
  position:relative;overflow:hidden;
  animation:rowIn .35s var(--ease) both;
  transition:transform .2s var(--bounce);
}
.player-row:last-child{border-bottom:none;}
.player-row:active{transform:scale(.99);}

/* The full gradient background per team */
.row-bg{
  position:absolute;inset:0;
  opacity:.18;
  transition:opacity .25s;
  pointer-events:none;
}
[data-theme="light"] .row-bg{opacity:.1;}
.player-row:hover .row-bg{opacity:.3;}
[data-theme="light"] .player-row:hover .row-bg{opacity:.18;}

/* Shimmer on hover */
.row-shimmer{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%);
  transform:translateX(-100%);opacity:0;
  transition:none;
}
.player-row:hover .row-shimmer{
  animation:shimmerSlide .55s var(--ease) both;
}
@keyframes shimmerSlide{from{transform:translateX(-100%);opacity:1;}to{transform:translateX(100%);opacity:0;}}

/* Glow accent line on left */
.row-accent-line{
  position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:0 2px 2px 0;
  transition:width .2s var(--bounce),opacity .2s;
  opacity:.7;
}
.player-row:hover .row-accent-line{width:5px;opacity:1;}

/* Row content */
.row-content{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:12px;
  padding:13px 16px 13px 20px;width:100%;
}
.tier-gem{
  width:10px;height:10px;border-radius:2px;flex-shrink:0;
  transform:rotate(45deg);
  box-shadow:0 0 8px currentColor;
  transition:transform .25s var(--bounce);
}
.player-row:hover .tier-gem{transform:rotate(45deg) scale(1.3);}
.tier-gem.gold{color:#FFD700;background:#FFD700;box-shadow:0 0 10px rgba(255,215,0,.5);}
.tier-gem.silver{color:#C0C8D8;background:#C0C8D8;box-shadow:0 0 8px rgba(192,200,216,.4);}
.tier-gem.bronze{color:#CD7F32;background:#CD7F32;box-shadow:0 0 8px rgba(205,127,50,.3);}

.team-logo-mini{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.2);
  transition:transform .2s var(--bounce);
}
[data-theme="light"] .team-logo-mini{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.1);}
.player-row:hover .team-logo-mini{transform:scale(1.1) rotate(-3deg);}
.team-logo-mini img{width:100%;height:100%;object-fit:contain;}

.row-info{flex:1;min-width:0;}
.row-name{
  font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:4px;letter-spacing:.01em;
  transition:color .2s;
}
.player-row:hover .row-name{color:var(--t1);}
.row-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.row-badge{
  font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;
  letter-spacing:.05em;text-transform:uppercase;
  transition:transform .15s var(--bounce);
}
.row-badge:hover{transform:scale(1.08);}
.rb-bat{background:rgba(79,172,254,.15);color:#4facfe;}
.rb-bowl{background:rgba(231,76,60,.15);color:#e74c3c;}
.rb-ar{background:rgba(241,196,15,.15);color:#f1c40f;}
.rb-wk{background:rgba(155,89,182,.15);color:#bb8fce;}
.rb-team{background:rgba(255,255,255,.07);color:var(--t2);}
[data-theme="light"] .rb-team{background:rgba(0,0,0,.06);}
.rb-owned{background:rgba(255,107,53,.12);color:var(--accent);}
.rb-unsold{background:rgba(255,255,255,.05);color:var(--t3);}
[data-theme="light"] .rb-unsold{background:rgba(0,0,0,.05);}
.rb-cap{background:rgba(255,215,0,.2);color:#ffd700;}
.rb-vc{background:rgba(180,180,200,.15);color:#b4b4c8;}

.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.row-pts{
  font-family:var(--font-mono);font-size:14px;font-weight:500;
  transition:transform .2s var(--bounce);
}
.player-row:hover .row-pts{transform:scale(1.1);}
.row-chevron{
  font-size:10px;color:var(--t3);
  transition:transform .2s var(--bounce),color .2s;
}
.player-row:hover .row-chevron{transform:translateX(3px);color:var(--accent);}

.empty-state{padding:40px 20px;text-align:center;color:var(--t3);font-size:14px;}

/* ── MODAL ── */
.modal{
  display:none;position:fixed;inset:0;
  background:var(--ov);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.modal.open{display:flex;animation:modalIn .3s var(--ease) both;}
@keyframes modalIn{from{opacity:0;}to{opacity:1;}}
.modal-close{
  position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:14px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:300;transition:transform .2s var(--bounce),background .2s;backdrop-filter:blur(8px);
}
.modal-close:hover{transform:scale(1.1) rotate(90deg);background:rgba(255,80,50,.3);}

/* ── CARD SCENE ── */
.card-scene{
  perspective:1200px;width:min(80vw,300px);aspect-ratio:.68;
  filter:drop-shadow(0 28px 60px rgba(0,0,0,.85));cursor:pointer;
  animation:cardPop .45s var(--bounce) .05s both;
}
@keyframes cardPop{from{opacity:0;transform:scale(.7) translateY(30px);}to{opacity:1;transform:none;}}
.card-flip{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .65s cubic-bezier(.4,0,.2,1);
}
.card-flip.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  clip-path:polygon(12% 0%,88% 0%,100% 12%,100% 80%,50% 100%,0% 80%,0% 12%);
  display:flex;flex-direction:column;overflow:hidden;
}
.card-back-face{transform:rotateY(180deg);}

/* Card sheen layer */
.card-face::before{
  content:'';position:absolute;inset:4px;z-index:1;pointer-events:none;
  clip-path:polygon(12% 0%,88% 0%,100% 12%,100% 80%,50% 100%,0% 80%,0% 12%);
  background:rgba(255,255,255,.09);
}
/* Card grid texture */
.card-face::after{
  content:'';position:absolute;inset:4px;z-index:2;pointer-events:none;
  clip-path:polygon(12% 0%,88% 0%,100% 12%,100% 80%,50% 100%,0% 80%,0% 12%);
  background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,255,255,.04) 12px,rgba(255,255,255,.04) 13px);
}
.card-face.gold{background:linear-gradient(150deg,#3B2400 0%,#8B6000 18%,#E8B800 38%,#FFE066 50%,#C49A00 65%,#7A5000 82%,#3B2400 100%);color:#2C1A00;}
.card-face.silver{background:linear-gradient(150deg,#1C1C1C 0%,#606060 18%,#C4C4C4 38%,#EFEFEF 50%,#8C8C8C 65%,#444444 82%,#1C1C1C 100%);color:#111111;}
.card-face.bronze{background:linear-gradient(150deg,#2E1200 0%,#7A3800 18%,#C07028 38%,#E8A050 50%,#9A5018 65%,#4A2000 82%,#2E1200 100%);color:#2E1200;}
.cf-inner{position:relative;z-index:3;display:flex;flex-direction:column;height:100%;padding:8% 9% 24% 9%;}
.cf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4%;}
.cf-rating{font-family:var(--font-display);font-size:clamp(36px,10vw,52px);line-height:.88;}
.cf-role{font-family:var(--font-display);font-size:clamp(14px,4vw,18px);letter-spacing:.04em;margin-top:2px;opacity:.85;}
.cf-logo{width:clamp(60px,18vw,80px);height:clamp(60px,18vw,80px);object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));}
.cf-logo-fallback{font-size:clamp(40px,13vw,58px);line-height:1;}
.cf-name{font-family:var(--font-display);font-size:clamp(17px,5.5vw,28px);letter-spacing:.045em;line-height:1;text-align:center;white-space:normal;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,.15);margin-bottom:3%;}
.cf-owner{font-family:var(--font-main);font-size:clamp(8px,2.2vw,11px);font-weight:700;text-align:center;opacity:.75;letter-spacing:.02em;margin-bottom:3%;background:rgba(0,0,0,.15);border-radius:4px;padding:2px 6px;display:inline-block;align-self:center;}
.cf-divider{height:1.5px;background:currentColor;opacity:.2;margin:0 2% 4%;border-radius:1px;}
.cf-stats{display:flex;align-items:stretch;width:100%;}
.cf-stat-col{flex:1;display:flex;flex-direction:column;gap:clamp(3px,1vw,5px);}
.cf-stat-col:first-child{padding-right:5%;}.cf-stat-col:last-child{padding-left:5%;}
.cf-stat-vdiv{width:1.5px;background:currentColor;opacity:.2;flex-shrink:0;border-radius:1px;}
.cf-stat-row{display:flex;align-items:baseline;justify-content:space-between;gap:4px;}
.cf-stat-val{font-family:var(--font-display);font-size:clamp(14px,4.5vw,20px);line-height:1;flex-shrink:0;}
.cf-stat-lbl{font-family:var(--font-display);font-size:clamp(10px,3vw,14px);opacity:.6;white-space:nowrap;}
.cb-inner{position:relative;z-index:3;display:flex;flex-direction:column;height:100%;padding:8% 8% 24% 8%;}
.cb-header{text-align:center;margin-bottom:4%;padding-bottom:3%;border-bottom:1.5px solid rgba(0,0,0,.2);}
.cb-name{font-family:var(--font-display);font-size:clamp(15px,5vw,22px);letter-spacing:.045em;line-height:1;white-space:normal;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cb-sub{font-family:var(--font-main);font-size:clamp(8px,2.2vw,10px);opacity:.75;margin-top:3px;font-weight:700;letter-spacing:.03em;}
.cb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(3px,1vw,5px);flex:1;}
.cb-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.1);border-radius:6px;padding:clamp(3px,1vw,5px) 2px;border:1px solid rgba(0,0,0,.07);}
.cb-stat-val{font-family:var(--font-display);font-size:clamp(13px,4vw,18px);line-height:1;}
.cb-stat-lbl{font-size:clamp(7px,1.8vw,9px);font-weight:700;text-transform:uppercase;letter-spacing:.04em;opacity:.6;margin-top:1px;text-align:center;}
.cb-footer{margin-top:4%;text-align:center;font-family:var(--font-main);font-size:clamp(9px,2.5vw,11px);font-weight:700;opacity:.85;padding:5px 8px;background:rgba(0,0,0,.12);border-radius:7px;border:1px solid rgba(0,0,0,.07);}

/* ── PULSE BADGE for Captain/VC ── */
@keyframes capPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.5);}50%{box-shadow:0 0 0 5px rgba(255,215,0,0);}}
.rb-cap{animation:capPulse 2s ease infinite;}

/* ── ROW ENTRANCE ── */
@keyframes rowIn{
  from{opacity:0;transform:translateX(-18px);}
  to{opacity:1;transform:none;}
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  width:calc(100% - 28px);max-width:480px;height:68px;
  background:var(--nav);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid var(--brd);border-radius:28px;
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 2px;box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);z-index:100;
}
.nav-item{
  text-align:center;color:var(--t3);text-decoration:none;font-size:8px;font-weight:700;letter-spacing:.05em;
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .25s;
}
.nav-item.active{color:var(--accent);}
.nav-icon-wrap{width:36px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .2s var(--bounce);}
.nav-item.active .nav-icon-wrap{background:var(--accent-soft);box-shadow:0 0 12px rgba(255,107,53,.2);}
.nav-item:hover .nav-icon-wrap{transform:translateY(-2px);}
.nav-icon{font-size:16px;line-height:1;}

/* ── COUNT BADGE ── */
.count-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(79,172,254,.12);border:1px solid rgba(79,172,254,.2);
  border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--blue);
  margin-left:4px;
}

/* ── FLOATING TOOLTIP on row hover ── */
.row-pts-label{font-size:8px;color:var(--t3);font-weight:600;letter-spacing:.04em;}
</style>
</head>
<body>
<canvas id="pitch-canvas"></canvas>

<div class="topbar">
  <div class="topbar-left">
    <p class="greeting">Player Cards</p>
    <h1>All Players</h1>
    <p id="player-count">Loading…</p>
  </div>
  <button class="theme-btn" onclick="toggleTheme()"><span id="theme-icon">☀️</span></button>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" class="search-bar" id="search-bar" placeholder="Search players…" oninput="applyFilters()">
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('ALL',this)">All</button>
  <button class="filter-btn" onclick="setFilter('BAT',this)">🏏 Bat</button>
  <button class="filter-btn" onclick="setFilter('BOWL',this)">🎳 Bowl</button>
  <button class="filter-btn" onclick="setFilter('AR',this)">⚡ All-R</button>
  <button class="filter-btn" onclick="setFilter('WK',this)">🧤 WK</button>
  <button class="filter-btn" onclick="setFilter('GOLD',this)">🥇 Gold</button>
  <button class="filter-btn" onclick="setFilter('SILVER',this)">🥈 Silver</button>
  <button class="filter-btn" onclick="setFilter('BRONZE',this)">🥉 Bronze</button>
  <button class="filter-btn" onclick="setFilter('SOLD',this)">✅ Sold</button>
  <button class="filter-btn" onclick="setFilter('UNSOLD',this)">⭕ Unsold</button>
</div>

<div class="list-wrap">
  <div id="player-list"><div class="empty-state">Loading players…</div></div>
</div>

<!-- CARD MODAL -->
<div id="card-modal" class="modal" onclick="handleOverlay(event)">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="card-scene" onclick="flipCard()">
    <div class="card-flip" id="card-flip">
      <div class="card-face" id="card-front"></div>
      <div class="card-face card-back-face" id="card-back"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">🏠</span></div>Home</a>
  <a href="squad.html"     class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">🛡️</span></div>Squad</a>
  <a href="players.html"   class="nav-item active"><div class="nav-icon-wrap"><span class="nav-icon">🃏</span></div>Cards</a>
  <a href="teams.html"     class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">👥</span></div>Teams</a>
  <a href="stats.html"     class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">📊</span></div>Stats</a>
  <a href="settings.html"  class="nav-item"><div class="nav-icon-wrap"><span class="nav-icon">⚙️</span></div>Settings</a>
</nav>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxe8ueJLArFFRBqnVIhYn6LBEAnHsU6El_BlKeRgXIdR5Xo4UNgLV79NiLWtQyfQpDy/exec";
const myTeam=localStorage.getItem("teamName")||"";
const myCap=localStorage.getItem("captain")||"";
const myVC=localStorage.getItem("viceCaptain")||"";
let allPlayers=[],activeFilter="ALL",tierMap={},ratingMap={};

/* ── THEME ── */
const savedTheme=localStorage.getItem("theme")||"dark";
document.documentElement.setAttribute("data-theme",savedTheme);
document.getElementById("theme-icon").textContent=savedTheme==="dark"?"☀️":"🌙";
function toggleTheme(){
  const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("theme",next);
  document.getElementById("theme-icon").textContent=next==="dark"?"☀️":"🌙";
}

/* ── PARTICLE CANVAS ── */
(function(){
  const canvas=document.getElementById("pitch-canvas");
  const ctx=canvas.getContext("2d");
  let W,H,particles=[];
  const EMOJIS=["🏏","⚡","✨","🌟","💫","•","•","•","•","•"];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function make(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:-Math.random()*.45-.1,size:Math.random()*7+5,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],alpha:Math.random()*.28+.04,life:Math.random()*200+100};}
  function init(){particles=Array.from({length:22},make);}
  function tick(){
    ctx.clearRect(0,0,W,H);
    const isDark=document.documentElement.getAttribute("data-theme")==="dark";
    particles.forEach((p,i)=>{
      p.x+=p.vx;p.y+=p.vy;p.life--;
      if(p.life<=0||p.y<-20)particles[i]=make();
      ctx.save();ctx.globalAlpha=p.alpha*(isDark?1:.4);
      ctx.font=`${p.size}px serif`;ctx.fillText(p.emoji,p.x,p.y);ctx.restore();
    });
    requestAnimationFrame(tick);
  }
  window.addEventListener("resize",()=>{resize();init();});
  resize();init();tick();
})();

/* ── TEAM DATA ── */
const TEAMS={
  MI:{color:"#004BA0",color2:"#1a6fd4",grad:"linear-gradient(110deg,#004BA0,#1a6fd4,#0090ff)",logo:"ipl team logo/mi.webp",fb:"🔵"},
  CSK:{color:"#c07c08",color2:"#f5a623",grad:"linear-gradient(110deg,#7a4f00,#c07c08,#FFD700)",logo:"ipl team logo/csk.jpg",fb:"🟡"},
  RCB:{color:"#8B0000",color2:"#ff1a35",grad:"linear-gradient(110deg,#4a0000,#b0001a,#ff4560)",logo:"ipl team logo/rcb.jpg",fb:"🔴"},
  KKR:{color:"#3A225D",color2:"#6b3aaa",grad:"linear-gradient(110deg,#1a0a2e,#3A225D,#8b5cf6)",logo:"ipl team logo/kkr.webp",fb:"🟣"},
  DC:{color:"#17479E",color2:"#2a5fc0",grad:"linear-gradient(110deg,#0a1f4e,#17479E,#4facfe)",logo:"ipl team logo/dc.webp",fb:"🔷"},
  PBKS:{color:"#c41920",color2:"#ED1F27",grad:"linear-gradient(110deg,#6a0008,#c41920,#ff6b6b)",logo:"ipl team logo/pk.webp",fb:"🦁"},
  RR:{color:"#254AA5",color2:"#f542b3",grad:"linear-gradient(110deg,#102060,#254AA5,#f542b3)",logo:"ipl team logo/rr.webp",fb:"💗"},
  SRH:{color:"#c04010",color2:"#F7591A",grad:"linear-gradient(110deg,#6a2000,#c04010,#ff8c00)",logo:"ipl team logo/srh.webp",fb:"🟠"},
  GT:{color:"#1B2133",color2:"#3a5a9a",grad:"linear-gradient(110deg,#0a0e18,#1B2133,#3a5a9a)",logo:"ipl team logo/gt.webp",fb:"🔷"},
  LSG:{color:"#1d6b42",color2:"#5ec48a",grad:"linear-gradient(110deg,#0a3020,#1d6b42,#5ec48a)",logo:"ipl team logo/lsg.jpg",fb:"🟢"},
};
function getTeam(n){
  const u=(n||"").toUpperCase();
  for(const k of Object.keys(TEAMS)) if(u.includes(k)) return{abbr:k,...TEAMS[k]};
  return{abbr:(u.slice(0,3)||"IPL"),color:"#2a3a5a",color2:"#4facfe",grad:"linear-gradient(110deg,#0d1a2e,#2a3a5a,#4facfe)",logo:"",fb:"🏏"};
}

/* ── POINT HELPERS ── */
function getPts(p){return parseFloat(p["Total Points"]||p["Current Points"]||0)||0;}
function gi(p,...keys){for(const k of keys){const v=p[k];if(v!==undefined&&v!==null&&v!=="")return parseInt(v)||0;}return 0;}

/* ── TIERS ── */
function calcTiersAndRatings(players){
  const withPts=players.filter(p=>getPts(p)>0).sort((a,b)=>getPts(b)-getPts(a));
  const total=withPts.length;
  const goldCount=Math.ceil(total*.33);
  const silverCount=Math.ceil(total*.33);
  players.forEach(p=>{
    const pts=getPts(p);const name=p["Player Name"];
    if(pts<=0){tierMap[name]="bronze";ratingMap[name]=35;return;}
    const rank=withPts.findIndex(x=>x["Player Name"]===name);
    if(rank<goldCount){tierMap[name]="gold";ratingMap[name]=Math.max(80,99-Math.round((rank/Math.max(goldCount-1,1))*19));}
    else if(rank<goldCount+silverCount){const r=rank-goldCount;tierMap[name]="silver";ratingMap[name]=Math.max(60,79-Math.round((r/Math.max(silverCount-1,1))*19));}
    else{const r=rank-goldCount-silverCount;const bc=Math.max(total-goldCount-silverCount,1);tierMap[name]="bronze";ratingMap[name]=Math.max(40,59-Math.round((r/Math.max(bc-1,1))*19));}
  });
}

function roleClass(r){return r==="BOWL"?"rb-bowl":r==="AR"?"rb-ar":r==="WK"?"rb-wk":"rb-bat";}

/* ── TIER COLOURS for pts ── */
const TIER_PTS_COLOR={gold:"#FFD700",silver:"#C0C8D8",bronze:"#CD7F32"};

/* ── LOAD ── */
document.addEventListener("DOMContentLoaded",async()=>{
  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getPlayers"})});
    const r=await res.json();
    if(r.status==="success"){allPlayers=r.players;calcTiersAndRatings(allPlayers);applyFilters();}
    else throw new Error();
  }catch{
    document.getElementById("player-list").innerHTML='<div class="empty-state" style="color:#e74c3c">⚠️ Failed to load players.</div>';
  }
});

/* ── FILTERS ── */
function setFilter(val,btn){
  activeFilter=val;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");applyFilters();
}
function applyFilters(){
  const q=document.getElementById("search-bar").value.toLowerCase().trim();
  const f=allPlayers.filter(p=>{
    const mq=!q||p["Player Name"].toLowerCase().includes(q)||(p["IPL Team"]||"").toLowerCase().includes(q);
    const role=(p["Role"]||"").toUpperCase();
    const tier=tierMap[p["Player Name"]]||"bronze";
    const sold=p["Sold To"]&&p["Sold To"].trim();
    if(activeFilter==="BAT")    return mq&&role==="BAT";
    if(activeFilter==="BOWL")   return mq&&role==="BOWL";
    if(activeFilter==="AR")     return mq&&role==="AR";
    if(activeFilter==="WK")     return mq&&role==="WK";
    if(activeFilter==="GOLD")   return mq&&tier==="gold";
    if(activeFilter==="SILVER") return mq&&tier==="silver";
    if(activeFilter==="BRONZE") return mq&&tier==="bronze";
    if(activeFilter==="SOLD")   return mq&&!!sold;
    if(activeFilter==="UNSOLD") return mq&&!sold;
    return mq;
  });
  const el=document.getElementById("player-count");
  el.innerHTML=`${f.length} of ${allPlayers.length} players`;
  renderList(f);
}

/* ── RENDER ── */
function renderList(players){
  const el=document.getElementById("player-list");
  if(!players.length){el.innerHTML='<div class="empty-state">No players match 🏏</div>';return;}

  el.innerHTML=players.map((p,i)=>{
    const tier=tierMap[p["Player Name"]]||"bronze";
    const team=getTeam(p["IPL Team"]||"");
    const pts=getPts(p);
    const role=(p["Role"]||"BAT").toUpperCase();
    const name=p["Player Name"]||"";
    const owned=p["Sold To"]&&p["Sold To"].trim();
    const isCap=myCap===name&&p["Sold To"]===myTeam;
    const isVC=myVC===name&&p["Sold To"]===myTeam;
    const tierColor=TIER_PTS_COLOR[tier];

    // Logo HTML — inline in the row
    const logoHTML=team.logo
      ?`<img src="${team.logo}" style="width:100%;height:100%;object-fit:contain;" alt="${team.abbr}" onerror="this.parentNode.innerHTML='${team.fb}'">`
      :team.fb;

    // The gradient goes from team color → dark/light base
    const isDark=document.documentElement.getAttribute("data-theme")==="dark";
    const edgeColor=isDark?"rgba(6,13,26,.97)":"rgba(240,236,230,.97)";

    return`<div class="player-row" style="animation-delay:${Math.min(i*.04,.5)}s" onclick="openCard(${i})">
      <!-- Team gradient BG -->
      <div class="row-bg" style="background:linear-gradient(110deg,${team.color}CC 0%,${team.color2}55 40%,transparent 70%)"></div>
      <!-- Shimmer sweep -->
      <div class="row-shimmer"></div>
      <!-- Left accent line in tier colour -->
      <div class="row-accent-line" style="background:linear-gradient(180deg,${tierColor},${team.color2})"></div>
      <!-- Content -->
      <div class="row-content">
        <div class="tier-gem ${tier}"></div>
        <div class="team-logo-mini">${logoHTML}</div>
        <div class="row-info">
          <div class="row-name">${name}</div>
          <div class="row-meta">
            <span class="row-badge ${roleClass(role)}">${role}</span>
            <span class="row-badge rb-team">${team.abbr}</span>
            ${owned?`<span class="row-badge rb-owned">${p["Sold To"]}</span>`:`<span class="row-badge rb-unsold">Unsold</span>`}
            ${isCap?`<span class="row-badge rb-cap">© C</span>`:""}
            ${isVC?`<span class="row-badge rb-vc">★ VC</span>`:""}
          </div>
        </div>
        <div class="row-right">
          <div class="row-pts" style="color:${tierColor}">${pts>0?pts+" pts":"—"}</div>
          <div class="row-pts-label">${pts>0?"fantasy":"no pts"}</div>
        </div>
        <div class="row-chevron">❯</div>
      </div>
    </div>`;
  }).join("");
  window._fp=players;
}

/* ── OPEN CARD MODAL ── */
function openCard(idx){
  const p=window._fp[idx];
  const tier=tierMap[p["Player Name"]]||"bronze";
  const team=getTeam(p["IPL Team"]||"");
  const pts=getPts(p);
  const rating=ratingMap[p["Player Name"]]||35;
  const role=(p["Role"]||"BAT").toUpperCase();
  const name=p["Player Name"]||"";
  const owned=p["Sold To"]&&p["Sold To"].trim();
  const isCap=myCap===name&&p["Sold To"]===myTeam;
  const isVC=myVC===name&&p["Sold To"]===myTeam;
  const price=p["Price Bought"]?`₹${p["Price Bought"]}Cr`:"Unsold";
  const fantasyTeam=owned||"Unsold";

  const runs=gi(p,"Runs","runs");const wkts=gi(p,"Wickets","wickets");const cats=gi(p,"Catches","catches");
  const fours=gi(p,"4s","fours");const sixes=gi(p,"6s","sixes");const fifties=gi(p,"50s","fifties");
  const hunds=gi(p,"100s","hundreds");const threeW=gi(p,"3W","threew");const fiveW=gi(p,"5W","fivew");
  const fourW=gi(p,"fourv");const maidens=gi(p,"Maidens","maidens");const dots=gi(p,"Dots","dots");

  const front=document.getElementById("card-front");
  const back=document.getElementById("card-back");
  front.className=`card-face ${tier}`;
  back.className=`card-face card-back-face ${tier}`;
  document.getElementById("card-flip").classList.remove("flipped");

  const logoHTML=team.logo
    ?`<img src="${team.logo}" class="cf-logo" alt="${team.abbr}" onerror="this.style.display='none';this.nextSibling.style.display='block'"><span class="cf-logo-fallback" style="display:none">${team.fb}</span>`
    :`<span class="cf-logo-fallback">${team.fb}</span>`;

  front.innerHTML=`<div class="cf-inner">
    <div class="cf-top">
      <div><div class="cf-rating">${rating}</div><div class="cf-role">${role}</div></div>
      <div>${logoHTML}</div>
    </div>
    <div class="cf-name">${name.toUpperCase()}</div>
    <div class="cf-owner">${fantasyTeam}</div>
    <div class="cf-divider"></div>
    <div class="cf-stats">
      <div class="cf-stat-col">
        <div class="cf-stat-row"><span class="cf-stat-val">${runs}</span><span class="cf-stat-lbl">RUN</span></div>
        <div class="cf-stat-row"><span class="cf-stat-val">${wkts}</span><span class="cf-stat-lbl">WKT</span></div>
        <div class="cf-stat-row"><span class="cf-stat-val">${cats}</span><span class="cf-stat-lbl">CAT</span></div>
      </div>
      <div class="cf-stat-vdiv"></div>
      <div class="cf-stat-col">
        <div class="cf-stat-row"><span class="cf-stat-val">${fours}</span><span class="cf-stat-lbl">4s</span></div>
        <div class="cf-stat-row"><span class="cf-stat-val">${sixes}</span><span class="cf-stat-lbl">6s</span></div>
        <div class="cf-stat-row"><span class="cf-stat-val">${pts}</span><span class="cf-stat-lbl">PTS</span></div>
      </div>
    </div>
  </div>`;

  back.innerHTML=`<div class="cb-inner">
    <div class="cb-header">
      <div class="cb-name">${name.toUpperCase()}</div>
      <div class="cb-sub">${team.abbr} · ${pts} pts · ${price} · ${fantasyTeam}</div>
    </div>
    <div class="cb-grid">
      <div class="cb-stat"><div class="cb-stat-val">${runs}</div><div class="cb-stat-lbl">Runs</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${fours}</div><div class="cb-stat-lbl">4s</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${sixes}</div><div class="cb-stat-lbl">6s</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${cats}</div><div class="cb-stat-lbl">Catches</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${wkts}</div><div class="cb-stat-lbl">Wickets</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${maidens}</div><div class="cb-stat-lbl">Maidens</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${dots}</div><div class="cb-stat-lbl">Dots</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${fifties}</div><div class="cb-stat-lbl">50s</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${hunds}</div><div class="cb-stat-lbl">100s</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${threeW}</div><div class="cb-stat-lbl">3W</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${fiveW}</div><div class="cb-stat-lbl">5W</div></div>
      <div class="cb-stat"><div class="cb-stat-val">${fourW}</div><div class="cb-stat-lbl">4W</div></div>
    </div>
    <div class="cb-footer">${pts} pts · Rating ${rating}${isCap?" · Captain 🌟":isVC?" · Vice-Captain ⭐":""}</div>
  </div>`;

  document.getElementById("card-modal").classList.add("open");
}

function flipCard(){document.getElementById("card-flip").classList.toggle("flipped");}
function closeModal(){
  document.getElementById("card-modal").classList.remove("open");
  document.getElementById("card-flip").classList.remove("flipped");
}
function handleOverlay(e){if(e.target===document.getElementById("card-modal"))closeModal();}
</script>
</body>
