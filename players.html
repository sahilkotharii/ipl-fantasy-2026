<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Players | IPL Fantasy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF6B35;--accent-soft:rgba(255,107,53,.14);--accent-glow:rgba(255,107,53,.3);
  --blue:#4facfe;--blue-soft:rgba(79,172,254,.12);--gold:#FFD700;--silver:#b8c8d8;
  --font-main:'Outfit',sans-serif;--font-mono:'DM Mono',monospace;--font-display:'Bebas Neue',cursive;
  --ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#07101f;
  --mesh:radial-gradient(ellipse at 15% 5%,rgba(79,172,254,.13) 0%,transparent 50%),
        radial-gradient(ellipse at 85% 85%,rgba(255,107,53,.10) 0%,transparent 50%),#07101f;
  --surf:rgba(255,255,255,.04);--surf2:rgba(10,20,40,.97);
  --brd:rgba(79,172,254,.14);--brd2:rgba(79,172,254,.22);--nav:rgba(7,16,31,.95);
  --t1:#eef2ff;--t2:rgba(238,242,255,.52);--t3:rgba(238,242,255,.28);--div:rgba(255,255,255,.055);
  --inp:rgba(0,0,0,.3);--ibrd:rgba(79,172,254,.15);--ov:rgba(0,0,0,.9);--tog:rgba(255,255,255,.06);
  --field-bg1:#1e5c22;--field-bg2:#174d1a;--field-bg3:#0f3811;
  --pitch-c1:#c8a55c;--pitch-c2:#b8914a;
  --boundary:rgba(255,255,255,.2);--row-label:rgba(255,255,255,.55);--name-chip:rgba(0,0,0,.75);
}
[data-theme="light"]{
  --bg:#f0ece6;
  --mesh:radial-gradient(ellipse at 20% 10%,rgba(255,200,150,.2) 0%,transparent 55%),#f0ece6;
  --surf:rgba(255,255,255,.65);--surf2:rgba(255,255,255,.98);
  --brd:rgba(0,0,0,.07);--brd2:rgba(0,0,0,.14);--nav:rgba(240,236,230,.92);
  --t1:#1a1a2e;--t2:rgba(26,26,46,.55);--t3:rgba(26,26,46,.32);--div:rgba(0,0,0,.07);
  --inp:rgba(0,0,0,.05);--ibrd:rgba(0,0,0,.1);--ov:rgba(0,0,0,.85);--tog:rgba(0,0,0,.06);
  --field-bg1:#2e7d32;--field-bg2:#256326;--field-bg3:#1b4d1e;
  --pitch-c1:#d4b882;--pitch-c2:#c4a86c;
  --boundary:rgba(255,255,255,.28);--row-label:rgba(255,255,255,.8);--name-chip:rgba(0,0,0,.78);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-main);background:var(--mesh);background-color:var(--bg);min-height:100vh;color:var(--t1);padding-bottom:calc(68px + 14px + 28px);overflow-x:hidden;transition:background-color .3s,color .3s;}
#pitch-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.3;}

/* TOPBAR */
.topbar{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;padding:24px 20px 10px;animation:slideDown .5s var(--bounce) both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:none;}}
.topbar-left .greeting{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.topbar-left .greeting::before{content:'';width:16px;height:2px;background:linear-gradient(90deg,var(--blue),transparent);border-radius:1px;}
.topbar-left h1{font-family:var(--font-display);font-size:36px;letter-spacing:.06em;line-height:1;background:linear-gradient(90deg,var(--t1),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-left .player-count-sub{font-size:11px;color:var(--t3);margin-top:3px;font-weight:500;}
.theme-btn{width:40px;height:40px;border-radius:14px;background:var(--tog);border:1px solid var(--brd);color:var(--t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s var(--bounce),background .3s;}
.theme-btn:active{transform:scale(.85);}

/* VIEW TOGGLE */
.view-toggle{
  display:flex;margin:0 16px 14px;
  background:var(--inp);border:1px solid var(--ibrd);border-radius:18px;padding:4px;
  position:relative;z-index:1;
  animation:fadeUp .4s var(--ease) .06s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.vt-btn{
  flex:1;padding:11px 10px;border-radius:14px;border:none;background:transparent;
  color:var(--t2);font-family:var(--font-main);font-size:13px;font-weight:800;
  cursor:pointer;letter-spacing:.03em;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .25s var(--bounce);
}
.vt-btn.active{
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  color:#fff;
  box-shadow:0 4px 18px rgba(255,107,53,.4);
  transform:scale(1.02);
}
.vt-btn:not(.active):hover{color:var(--t1);}

/* SEARCH */
.search-wrap{margin:0 16px 10px;position:relative;z-index:1;animation:fadeUp .4s var(--ease) .1s both;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.search-bar{width:100%;padding:13px 14px 13px 42px;border-radius:16px;border:1px solid var(--ibrd);background:var(--inp);color:var(--t1);font-family:var(--font-main);font-size:14px;outline:none;-webkit-appearance:none;transition:border-color .25s,box-shadow .25s;}
.search-bar:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.12);}
.search-bar::placeholder{color:var(--t3);}

/* FILTER ROW */
.filter-row{display:flex;gap:7px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;animation:fadeUp .4s var(--ease) .15s both;z-index:1;position:relative;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--ibrd);background:var(--inp);color:var(--t2);font-family:var(--font-main);font-size:11px;font-weight:700;cursor:pointer;transition:all .22s var(--bounce);white-space:nowrap;letter-spacing:.03em;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
.filter-btn.active{background:linear-gradient(135deg,var(--accent),#ff8c5a);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(255,107,53,.35);transform:translateY(-1px);}

/* PLAYER LIST */
.list-wrap{position:relative;z-index:1;background:rgba(255,255,255,.03);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--brd);border-radius:24px;margin:0 16px 16px;overflow:hidden;animation:fadeUp .4s var(--ease) .2s both;box-shadow:0 8px 40px rgba(0,0,0,.3);}
[data-theme="light"] .list-wrap{background:rgba(255,255,255,.6);}
.player-row{display:flex;align-items:center;padding:0;border-bottom:1px solid var(--div);cursor:pointer;position:relative;overflow:hidden;animation:rowIn .35s var(--ease) both;transition:transform .2s var(--bounce);}
.player-row:last-child{border-bottom:none;}
.player-row:active{transform:scale(.99);}
/* Stronger team bg */
.row-bg{position:absolute;inset:0;pointer-events:none;transition:opacity .25s;}
.row-shimmer{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.07) 50%,transparent 100%);transform:translateX(-100%);opacity:0;}
.player-row:hover .row-shimmer{animation:shimmerSlide .55s var(--ease) both;}
@keyframes shimmerSlide{from{transform:translateX(-100%);opacity:1;}to{transform:translateX(100%);opacity:0;}}
.row-accent-line{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 3px 3px 0;opacity:.9;transition:width .2s var(--bounce);}
.player-row:hover .row-accent-line{width:6px;}
.row-content{position:relative;z-index:1;display:flex;align-items:center;gap:12px;padding:10px 14px 10px 18px;width:100%;}
/* Circle avatar — matches field token */
.row-avatar-wrap{position:relative;flex-shrink:0;}
.row-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid;box-shadow:0 4px 16px rgba(0,0,0,.45);transition:transform .2s var(--bounce),box-shadow .2s;position:relative;overflow:hidden;}
.player-row:hover .row-avatar{transform:scale(1.1);box-shadow:0 8px 22px rgba(0,0,0,.6);}
.row-avatar::after{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,rgba(255,255,255,.22),transparent 60%);pointer-events:none;}
.row-avatar img{width:30px;height:30px;object-fit:contain;position:relative;z-index:1;}
.row-avatar-fb{font-size:20px;position:relative;z-index:1;}
/* Mini badges on avatar */
.row-av-badge{position:absolute;line-height:1;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;z-index:2;}
.row-av-badge.c-badge{top:-3px;right:-3px;background:#ffc400;color:#1a0f00;box-shadow:0 0 8px rgba(255,196,0,.7);}
.row-av-badge.vc-badge{top:-3px;right:-3px;background:#9ca8b4;color:#111;box-shadow:0 0 6px rgba(180,180,200,.5);}
.row-av-badge.oc-badge{top:-3px;left:-3px;background:#FF6B35;color:#fff;box-shadow:0 0 8px rgba(255,107,53,.6);}
.row-av-badge.pc-badge{bottom:-3px;left:-3px;background:#9b59b6;color:#fff;box-shadow:0 0 8px rgba(155,89,182,.6);}
/* Tier dot bottom-right */
.row-av-tier{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;z-index:2;border:2px solid var(--bg);}
.row-av-tier.gold{background:#FFD700;box-shadow:0 0 8px rgba(255,215,0,.6);}
.row-av-tier.silver{background:#C0C8D8;box-shadow:0 0 6px rgba(192,200,216,.5);}
.row-av-tier.bronze{background:#CD7F32;box-shadow:0 0 6px rgba(205,127,50,.4);}
.row-info{flex:1;min-width:0;}
.row-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;letter-spacing:.01em;}
.row-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.row-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.05em;text-transform:uppercase;transition:transform .15s var(--bounce);}
.row-badge:hover{transform:scale(1.08);}
.rb-bat{background:rgba(79,172,254,.15);color:#4facfe;}
.rb-bowl{background:rgba(231,76,60,.15);color:#e74c3c;}
.rb-ar{background:rgba(241,196,15,.15);color:#f1c40f;}
.rb-wk{background:rgba(155,89,182,.15);color:#bb8fce;}
.rb-team{background:rgba(255,255,255,.07);color:var(--t2);}
[data-theme="light"] .rb-team{background:rgba(0,0,0,.06);}
.rb-owned{background:rgba(255,107,53,.12);color:var(--accent);}
.rb-unsold{background:rgba(255,255,255,.05);color:var(--t3);}
[data-theme="light"] .rb-unsold{background:rgba(0,0,0,.05);}
.rb-cap{background:rgba(255,215,0,.2);color:#ffd700;animation:capPulse 2s ease infinite;}
.rb-vc{background:rgba(180,180,200,.15);color:#b4b4c8;}
@keyframes capPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.5);}50%{box-shadow:0 0 0 5px rgba(255,215,0,0);}}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.row-pts{font-family:var(--font-mono);font-size:14px;font-weight:500;transition:transform .2s var(--bounce);}
.player-row:hover .row-pts{transform:scale(1.1);}
.row-pts-label{font-size:8px;color:var(--t3);font-weight:600;letter-spacing:.04em;}
.row-chevron{font-size:10px;color:var(--t3);transition:transform .2s var(--bounce),color .2s;}
.player-row:hover .row-chevron{transform:translateX(3px);color:var(--accent);}
.empty-state{padding:40px 20px;text-align:center;color:var(--t3);font-size:14px;}
@keyframes rowIn{from{opacity:0;transform:translateX(-18px);}to{opacity:1;transform:none;}}

/* CARD MODAL */
.modal{display:none;position:fixed;inset:0;background:var(--ov);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;animation:modalIn .3s var(--ease) both;}
@keyframes modalIn{from{opacity:0;}to{opacity:1;}}
.modal-close{position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:300;transition:transform .2s var(--bounce),background .2s;backdrop-filter:blur(8px);}
.modal-close:hover{transform:scale(1.1) rotate(90deg);background:rgba(255,80,50,.3);}
.card-scene{perspective:1200px;width:min(80vw,300px);aspect-ratio:.68;filter:drop-shadow(0 28px 60px rgba(0,0,0,.85));cursor:pointer;animation:cardPop .45s var(--bounce) .05s both;}
@keyframes cardPop{from{opacity:0;transform:scale(.7) translateY(30px);}to{opacity:1;transform:none;}}
.card-flip{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);}
.card-flip.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;clip-path:polygon(12% 0%,88% 0%,100% 12%,100% 80%,50% 100%,0% 80%,0% 12%);display:flex;flex-direction:column;overflow:hidden;}
.card-back-face{transform:rotateY(180deg);}
.card-face::before{content:'';position:absolute;inset:4px;z-index:1;pointer-events:none;clip-path:polygon(12% 0%,88% 0%,100% 12%,100% 80%,50% 100%,0% 80%,0% 12%);background:rgba(255,255,255,.09);}
.card-face::after{content:'';position:absolute;inset:4px;z-index:2;pointer-events:none;clip-path:polygon(12% 0%,88% 0%,100% 12%,100% 80%,50% 100%,0% 80%,0% 12%);background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,255,255,.04) 12px,rgba(255,255,255,.04) 13px);}
.card-face.gold{background:linear-gradient(150deg,#3B2400 0%,#8B6000 18%,#E8B800 38%,#FFE066 50%,#C49A00 65%,#7A5000 82%,#3B2400 100%);color:#2C1A00;}
.card-face.silver{background:linear-gradient(150deg,#1C1C1C 0%,#606060 18%,#C4C4C4 38%,#EFEFEF 50%,#8C8C8C 65%,#444444 82%,#1C1C1C 100%);color:#111111;}
.card-face.bronze{background:linear-gradient(150deg,#2E1200 0%,#7A3800 18%,#C07028 38%,#E8A050 50%,#9A5018 65%,#4A2000 82%,#2E1200 100%);color:#2E1200;}
.cf-inner{position:relative;z-index:3;display:flex;flex-direction:column;height:100%;padding:8% 9% 24% 9%;}
.cf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4%;}
.cf-rating{font-family:var(--font-display);font-size:clamp(36px,10vw,52px);line-height:.88;}
.cf-role{font-family:var(--font-display);font-size:clamp(14px,4vw,18px);letter-spacing:.04em;margin-top:2px;opacity:.85;}
.cf-logo{width:clamp(60px,18vw,80px);height:clamp(60px,18vw,80px);object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));}
.cf-logo-fallback{font-size:clamp(40px,13vw,58px);line-height:1;}
.cf-name{font-family:var(--font-display);font-size:clamp(17px,5.5vw,28px);letter-spacing:.045em;line-height:1;text-align:center;white-space:normal;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,.15);margin-bottom:3%;}
.cf-owner{font-family:var(--font-main);font-size:clamp(8px,2.2vw,11px);font-weight:700;text-align:center;opacity:.75;letter-spacing:.02em;margin-bottom:3%;background:rgba(0,0,0,.15);border-radius:4px;padding:2px 6px;display:inline-block;align-self:center;}
.cf-divider{height:1.5px;background:currentColor;opacity:.2;margin:0 2% 4%;border-radius:1px;}
.cf-stats{display:flex;align-items:stretch;width:100%;}
.cf-stat-col{flex:1;display:flex;flex-direction:column;gap:clamp(3px,1vw,5px);}
.cf-stat-col:first-child{padding-right:5%;}.cf-stat-col:last-child{padding-left:5%;}
.cf-stat-vdiv{width:1.5px;background:currentColor;opacity:.2;flex-shrink:0;border-radius:1px;}
.cf-stat-row{display:flex;align-items:baseline;justify-content:space-between;gap:4px;}
.cf-stat-val{font-family:var(--font-display);font-size:clamp(14px,4.5vw,20px);line-height:1;flex-shrink:0;}
.cf-stat-lbl{font-family:var(--font-display);font-size:clamp(10px,3vw,14px);opacity:.6;white-space:nowrap;}
.cb-inner{position:relative;z-index:3;display:flex;flex-direction:column;height:100%;padding:8% 8% 24% 8%;}
.cb-header{text-align:center;margin-bottom:4%;padding-bottom:3%;border-bottom:1.5px solid rgba(0,0,0,.2);}
.cb-name{font-family:var(--font-display);font-size:clamp(15px,5vw,22px);letter-spacing:.045em;line-height:1;white-space:normal;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cb-sub{font-family:var(--font-main);font-size:clamp(8px,2.2vw,10px);opacity:.75;margin-top:3px;font-weight:700;letter-spacing:.03em;}
.cb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(3px,1vw,5px);flex:1;}
.cb-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.1);border-radius:6px;padding:clamp(3px,1vw,5px) 2px;border:1px solid rgba(0,0,0,.07);}
.cb-stat-val{font-family:var(--font-display);font-size:clamp(13px,4vw,18px);line-height:1;}
.cb-stat-lbl{font-size:clamp(7px,1.8vw,9px);font-weight:700;text-transform:uppercase;letter-spacing:.04em;opacity:.6;margin-top:1px;text-align:center;}
.cb-footer{margin-top:4%;text-align:center;font-family:var(--font-main);font-size:clamp(9px,2.5vw,11px);font-weight:700;opacity:.85;padding:5px 8px;background:rgba(0,0,0,.12);border-radius:7px;border:1px solid rgba(0,0,0,.07);}
@keyframes capPulse2{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.5);}50%{box-shadow:0 0 0 5px rgba(255,215,0,0);}}
.rb-cap{animation:capPulse2 2s ease infinite;}

/* FIELD VIEW */
.field-centering{display:flex;justify-content:center;padding:0 12px;}
.field-outer{
  width:100%;max-width:520px;
  border-radius:32px;overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.08);
  animation:fadeUp .6s var(--bounce) .15s both;position:relative;
}
.field{position:relative;padding:14px 10px 18px;background-color:#174d1a;background-image:repeating-linear-gradient(180deg,rgba(0,0,0,.05) 0px,rgba(0,0,0,.05) 28px,transparent 28px,transparent 56px),radial-gradient(ellipse at 50% 50%,#2a7a2e 0%,#1e5c22 45%,#0f3811 100%);}
[data-theme="light"] .field{background-color:#256326;background-image:repeating-linear-gradient(180deg,rgba(0,0,0,.04) 0px,rgba(0,0,0,.04) 28px,transparent 28px,transparent 56px),radial-gradient(ellipse at 50% 50%,#3a9e3f 0%,#2e7d32 45%,#1b4d1e 100%);}
.field::before{content:'';position:absolute;inset:10px;border-radius:50%;border:1.5px dashed var(--boundary);pointer-events:none;}
.pitch-strip{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:38px;height:210px;background:linear-gradient(180deg,#d4b882 0%,#c8a55c 40%,#b89040 60%,#c8a55c 100%);border-radius:5px;border:1px solid rgba(255,255,255,.25);box-shadow:0 0 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);pointer-events:none;z-index:0;}
.pitch-strip::before,.pitch-strip::after{content:'';position:absolute;left:-8px;right:-8px;height:2px;background:rgba(255,255,255,.6);border-radius:1px;}
.pitch-strip::before{top:22px;}.pitch-strip::after{bottom:22px;}
.role-row{position:relative;z-index:1;display:flex;justify-content:center;align-items:flex-end;gap:8px;padding:6px 8px 4px;flex-wrap:wrap;}
.role-label{text-align:center;font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--row-label);text-shadow:0 1px 4px rgba(0,0,0,.6);margin-bottom:2px;margin-top:6px;}
.fp{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;animation:tokenIn .45s var(--bounce) both;}

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxe8ueJLArFFRBqnVIhYn6LBEAnHsU6El_BlKeRgXIdR5Xo4UNgLV79NiLWtQyfQpDy/exec";
const myTeam=localStorage.getItem("teamName")||"";

/* THEME */
const savedTheme=localStorage.getItem("theme")||"dark";
document.documentElement.setAttribute("data-theme",savedTheme);
document.getElementById("theme-icon").textContent=savedTheme==="dark"?"\u2600\ufe0f":"\ud83c\udf19";
function toggleTheme(){
  const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);localStorage.setItem("theme",next);
  document.getElementById("theme-icon").textContent=next==="dark"?"\u2600\ufe0f":"\ud83c\udf19";
}

/* PARTICLES */
(function(){
  const canvas=document.getElementById("pitch-canvas"),ctx=canvas.getContext("2d");
  let W,H,P=[];
  const EM=["\ud83c\udfcf","\u26a1","\u2728","\ud83c\udf1f","\ud83d\udcab","\u2022","\u2022","\u2022","\u2022","\u2022"];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function make(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:-Math.random()*.45-.1,size:Math.random()*7+5,emoji:EM[Math.floor(Math.random()*EM.length)],alpha:Math.random()*.28+.04,life:Math.random()*200+100};}
  function init(){P=Array.from({length:22},make);}
  function tick(){
    ctx.clearRect(0,0,W,H);
    const isDark=document.documentElement.getAttribute("data-theme")==="dark";
    P.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0||p.y<-20)P[i]=make();
      ctx.save();ctx.globalAlpha=p.alpha*(isDark?1:.4);ctx.font=p.size+"px serif";ctx.fillText(p.emoji,p.x,p.y);ctx.restore();});
    requestAnimationFrame(tick);
  }
  window.addEventListener("resize",()=>{resize();init();});resize();init();tick();
})();

/* TEAM DATA - unified for both views */
const TEAMS={
  MI:{color:"#004BA0",color2:"#1a6fd4",c1:"#004BA0",c2:"#1a6fd4",grad:"linear-gradient(110deg,#004BA0,#1a6fd4,#0090ff)",logo:"ipl team logo/mi.webp",fb:"\ud83d\udd35",full:"Mumbai Indians"},
  CSK:{color:"#c07c08",color2:"#f5a623",c1:"#c07c08",c2:"#FFD700",grad:"linear-gradient(110deg,#7a4f00,#c07c08,#FFD700)",logo:"ipl team logo/csk.jpg",fb:"\ud83d\udfe1",full:"Chennai Super Kings"},
  RCB:{color:"#8B0000",color2:"#ff1a35",c1:"#8B0000",c2:"#ff4560",grad:"linear-gradient(110deg,#4a0000,#b0001a,#ff4560)",logo:"ipl team logo/rcb.jpg",fb:"\ud83d\udd34",full:"Royal Challengers"},
  KKR:{color:"#3A225D",color2:"#6b3aaa",c1:"#3A225D",c2:"#8b5cf6",grad:"linear-gradient(110deg,#1a0a2e,#3A225D,#8b5cf6)",logo:"ipl team logo/kkr.webp",fb:"\ud83d\ufe35",full:"Kolkata Knight Riders"},
  DC:{color:"#17479E",color2:"#2a5fc0",c1:"#17479E",c2:"#4facfe",grad:"linear-gradient(110deg,#0a1f4e,#17479E,#4facfe)",logo:"ipl team logo/dc.webp",fb:"\ud83d\udd37",full:"Delhi Capitals"},
  PBKS:{color:"#c41920",color2:"#ED1F27",c1:"#c41920",c2:"#ff6b6b",grad:"linear-gradient(110deg,#6a0008,#c41920,#ff6b6b)",logo:"ipl team logo/pk.webp",fb:"\ud83e\udd81",full:"Punjab Kings"},
  RR:{color:"#254AA5",color2:"#f542b3",c1:"#254AA5",c2:"#f542b3",grad:"linear-gradient(110deg,#102060,#254AA5,#f542b3)",logo:"ipl team logo/rr.webp",fb:"\ud83d\udc97",full:"Rajasthan Royals"},
  SRH:{color:"#c04010",color2:"#F7591A",c1:"#c04010",c2:"#ff8c00",grad:"linear-gradient(110deg,#6a2000,#c04010,#ff8c00)",logo:"ipl team logo/srh.webp",fb:"\ud83d\udfe0",full:"Sunrisers Hyderabad"},
  GT:{color:"#1B2133",color2:"#3a5a9a",c1:"#1B2133",c2:"#3a5a9a",grad:"linear-gradient(110deg,#0a0e18,#1B2133,#3a5a9a)",logo:"ipl team logo/gt.webp",fb:"\ud83d\udee1\ufe0f",full:"Gujarat Titans"},
  LSG:{color:"#1d6b42",color2:"#5ec48a",c1:"#1d6b42",c2:"#5ec48a",grad:"linear-gradient(110deg,#0a3020,#1d6b42,#5ec48a)",logo:"ipl team logo/lsg.jpg",fb:"\ud83d\udfe2",full:"Lucknow Super Giants"},
};
function getTeam(n){
  const u=(n||"").toUpperCase();
  for(const k of Object.keys(TEAMS)) if(u.includes(k)) return{abbr:k,...TEAMS[k]};
  return{abbr:(u.slice(0,3)||"IPL"),color:"#2a3a5a",color2:"#4facfe",c1:"#2a3a5a",c2:"#4facfe",grad:"linear-gradient(110deg,#0d1a2e,#2a3a5a,#4facfe)",logo:"",fb:"\ud83c\udfcf",full:"IPL Team"};
}

/* HELPERS */
function getPts(p){return parseFloat(p["Total Points"]||p["Current Points"]||0)||0;}
function gi(p,...keys){for(const k of keys){const v=p[k];if(v!==undefined&&v!==null&&v!=="")return parseInt(v)||0;}return 0;}
function roleClass(r){return r==="BOWL"?"rb-bowl":r==="AR"?"rb-ar":r==="WK"?"rb-wk":"rb-bat";}
const TIER_PTS_COLOR={gold:"#FFD700",silver:"#C0C8D8",bronze:"#CD7F32"};

/* STATE */
let allPlayers=[],activeFilter="ALL",tierMap={},ratingMap={};
let leadersGlobal={},myPlayersGlobal=[];
let fieldLoaded=false;

function calcTiersAndRatings(players){
  const withPts=players.filter(p=>getPts(p)>0).sort((a,b)=>getPts(b)-getPts(a));
  const total=withPts.length,goldCount=Math.ceil(total*.33),silverCount=Math.ceil(total*.33);
  players.forEach(p=>{
    const pts=getPts(p),name=p["Player Name"];
    if(pts<=0){tierMap[name]="bronze";ratingMap[name]=35;return;}
    const rank=withPts.findIndex(x=>x["Player Name"]===name);
    if(rank<goldCount){tierMap[name]="gold";ratingMap[name]=Math.max(80,99-Math.round((rank/Math.max(goldCount-1,1))*19));}
    else if(rank<goldCount+silverCount){const r=rank-goldCount;tierMap[name]="silver";ratingMap[name]=Math.max(60,79-Math.round((r/Math.max(silverCount-1,1))*19));}
    else{const r=rank-goldCount-silverCount,bc=Math.max(total-goldCount-silverCount,1);tierMap[name]="bronze";ratingMap[name]=Math.max(40,59-Math.round((r/Math.max(bc-1,1))*19));}
  });
}

/* VIEW SWITCH */
let currentView="cards";
function switchView(view){
  currentView=view;
  document.getElementById("view-cards").style.display=view==="cards"?"block":"none";
  document.getElementById("view-field").style.display=view==="field"?"block":"none";
  document.getElementById("vt-cards").classList.toggle("active",view==="cards");
  document.getElementById("vt-field").classList.toggle("active",view==="field");
  document.getElementById("page-title").textContent=view==="cards"?"All Players":"My Squad";
  if(view==="cards") document.getElementById("player-count").textContent=allPlayers.length+" players";
  else document.getElementById("player-count").textContent="Your team on the pitch";
  if(view==="field"&&!fieldLoaded) loadField();
}

/* LOAD */
document.addEventListener("DOMContentLoaded",async()=>{
  try{
    const res=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getPlayers"})});
    const r=await res.json();
    if(r.status==="success"){allPlayers=r.players;calcTiersAndRatings(allPlayers);applyFilters();}
    else throw new Error();
  }catch{
    document.getElementById("player-list").innerHTML='<div class="empty-state" style="color:#e74c3c">\u26a0\ufe0f Failed to load players.</div>';
  }
});

/* FILTERS */
function setFilter(val,btn){
  activeFilter=val;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");applyFilters();
}
function applyFilters(){
  const q=document.getElementById("search-bar").value.toLowerCase().trim();
  const f=allPlayers.filter(p=>{
    const mq=!q||p["Player Name"].toLowerCase().includes(q)||(p["IPL Team"]||"").toLowerCase().includes(q);
    const role=(p["Role"]||"").toUpperCase(),tier=tierMap[p["Player Name"]]||"bronze",sold=p["Sold To"]&&p["Sold To"].trim();
    if(activeFilter==="BAT")    return mq&&role==="BAT";
    if(activeFilter==="BOWL")   return mq&&role==="BOWL";
    if(activeFilter==="AR")     return mq&&role==="AR";
    if(activeFilter==="WK")     return mq&&role==="WK";
    if(activeFilter==="GOLD")   return mq&&tier==="gold";
    if(activeFilter==="SILVER") return mq&&tier==="silver";
    if(activeFilter==="BRONZE") return mq&&tier==="bronze";
    if(activeFilter==="SOLD")   return mq&&!!sold;
    if(activeFilter==="UNSOLD") return mq&&!sold;
    return mq;
  });
  document.getElementById("player-count").textContent=f.length+" of "+allPlayers.length+" players";
  renderList(f);
}

function renderList(players){
  const el=document.getElementById("player-list");
  if(!players.length){el.innerHTML='<div class="empty-state">No players match 🏏</div>';return;}
  const myCap=localStorage.getItem("captain")||"",myVC=localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal?.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leadersGlobal?.purpleCap?.name||"").trim().toLowerCase();
  el.innerHTML=players.map((p,i)=>{
    const tier=tierMap[p["Player Name"]]||"bronze",team=getTeam(p["IPL Team"]||""),pts=getPts(p);
    const role=(p["Role"]||"BAT").toUpperCase(),name=p["Player Name"]||"",owned=p["Sold To"]&&p["Sold To"].trim();
    const isCap=myCap===name&&p["Sold To"]===myTeam,isVC=myVC===name&&p["Sold To"]===myTeam;
    const pnl=name.trim().toLowerCase(),isOC=ocName&&pnl===ocName,isPC=pcName&&pnl===pcName;
    const tierColor=TIER_PTS_COLOR[tier];
    // Circle avatar — player headshot > team logo > emoji fallback
    const playerImg=p["Image"]&&p["Image"].toString().trim();
    const logoImg=playerImg
      ?`<img src="${playerImg}" style="width:46px;height:46px;object-fit:cover;object-position:top center;position:relative;z-index:1;border-radius:50%;" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
       (team.logo?`<img src="${team.logo}" style="width:30px;height:30px;object-fit:contain;position:relative;z-index:1;display:none" alt="${team.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="font-size:20px;display:none">${team.fb}</span>`:`<span style="font-size:20px;display:none">${team.fb}</span>`)
      :(team.logo?`<img src="${team.logo}" style="width:30px;height:30px;object-fit:contain;position:relative;z-index:1" alt="${team.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="font-size:20px;display:none">${team.fb}</span>`:`<span style="font-size:20px">${team.fb}</span>`);
    // Small badges around the circle
    let avBadges=`<div class="row-av-tier ${tier}"></div>`;
    if(isCap)     avBadges+=`<div class="row-av-badge c-badge">C</div>`;
    else if(isVC) avBadges+=`<div class="row-av-badge vc-badge">VC</div>`;
    if(isOC)      avBadges+=`<div class="row-av-badge oc-badge">🧢</div>`;
    if(isPC)      avBadges+=`<div class="row-av-badge pc-badge">🎩</div>`;
    return`<div class="player-row" style="animation-delay:${Math.min(i*.04,.5)}s" onclick="openCard(${i})">
      <div class="row-bg" style="background:linear-gradient(110deg,${team.color}44 0%,${team.color2}18 50%,transparent 80%)"></div>
      <div class="row-shimmer"></div>
      <div class="row-accent-line" style="background:linear-gradient(180deg,${tierColor},${team.color2})"></div>
      <div class="row-content">
        <div class="row-avatar-wrap">
          <div class="row-avatar" style="background:linear-gradient(135deg,${team.color},${team.color2});border-color:${team.color2}bb">${logoImg}</div>
          ${avBadges}
        </div>
        <div class="row-info">
          <div class="row-name">${name}</div>
          <div class="row-meta">
            <span class="row-badge ${roleClass(role)}">${role}</span>
            <span class="row-badge rb-team">${team.abbr}</span>
            ${owned?`<span class="row-badge rb-owned">${p["Sold To"]}</span>`:`<span class="row-badge rb-unsold">Unsold</span>`}
          </div>
        </div>
        <div class="row-right">
          <div class="row-pts" style="color:${tierColor}">${pts>0?pts+" pts":"—"}</div>
          <div class="row-pts-label">${pts>0?"fantasy pts":"no pts"}</div>
        </div>
        <div class="row-chevron">❯</div>
      </div>
    </div>`;
  }).join("");
  window._fp=players;
}

/* OPEN CARD */
function openCard(idx){
  const p=window._fp[idx];
  const tier=tierMap[p["Player Name"]]||"bronze",team=getTeam(p["IPL Team"]||""),pts=getPts(p);
  const rating=ratingMap[p["Player Name"]]||35,role=(p["Role"]||"BAT").toUpperCase();
  const name=p["Player Name"]||"",owned=p["Sold To"]&&p["Sold To"].trim();
  const myCap=localStorage.getItem("captain")||"",myVC=localStorage.getItem("viceCaptain")||"";
  const isCap=myCap===name&&p["Sold To"]===myTeam,isVC=myVC===name&&p["Sold To"]===myTeam;
  const price=p["Price Bought"]?`\u20b9${p["Price Bought"]}Cr`:"Unsold",fantasyTeam=owned||"Unsold";
  const runs=gi(p,"Runs","runs"),wkts=gi(p,"Wickets","wickets"),cats=gi(p,"Catches","catches");
  const fours=gi(p,"4s","fours"),sixes=gi(p,"6s","sixes"),fifties=gi(p,"50s","fifties");
  const hunds=gi(p,"100s","hundreds"),threeW=gi(p,"3W","threew"),fiveW=gi(p,"5W","fivew");
  const fourW=gi(p,"fourv"),maidens=gi(p,"Maidens","maidens"),dots=gi(p,"Dots","dots");
  const front=document.getElementById("card-front"),back=document.getElementById("card-back");
  front.className=`card-face ${tier}`;back.className=`card-face card-back-face ${tier}`;
  document.getElementById("card-flip").classList.remove("flipped");
  const pImgCard=p["Image"]&&p["Image"].toString().trim();
  const logoHTML=pImgCard
    ?`<img src="${pImgCard}" style="width:clamp(60px,18vw,80px);height:clamp(60px,18vw,80px);object-fit:cover;object-position:top center;border-radius:50%;border:2px solid rgba(255,255,255,.25);filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));" alt="${name}" onerror="this.style.display='none';this.nextSibling.style.display='block'">`+
     (team.logo?`<img src="${team.logo}" class="cf-logo" style="display:none" alt="${team.abbr}" onerror="this.style.display='none';this.nextSibling.style.display='block'"><span class="cf-logo-fallback" style="display:none">${team.fb}</span>`:`<span class="cf-logo-fallback" style="display:none">${team.fb}</span>`)
    :(team.logo?`<img src="${team.logo}" class="cf-logo" alt="${team.abbr}" onerror="this.style.display='none';this.nextSibling.style.display='block'"><span class="cf-logo-fallback" style="display:none">${team.fb}</span>`:`<span class="cf-logo-fallback">${team.fb}</span>`);
  front.innerHTML=`<div class="cf-inner"><div class="cf-top"><div><div class="cf-rating">${rating}</div><div class="cf-role">${role}</div></div><div>${logoHTML}</div></div><div class="cf-name">${name.toUpperCase()}</div><div class="cf-owner">${fantasyTeam}</div><div class="cf-divider"></div><div class="cf-stats"><div class="cf-stat-col"><div class="cf-stat-row"><span class="cf-stat-val">${runs}</span><span class="cf-stat-lbl">RUN</span></div><div class="cf-stat-row"><span class="cf-stat-val">${wkts}</span><span class="cf-stat-lbl">WKT</span></div><div class="cf-stat-row"><span class="cf-stat-val">${cats}</span><span class="cf-stat-lbl">CAT</span></div></div><div class="cf-stat-vdiv"></div><div class="cf-stat-col"><div class="cf-stat-row"><span class="cf-stat-val">${fours}</span><span class="cf-stat-lbl">4s</span></div><div class="cf-stat-row"><span class="cf-stat-val">${sixes}</span><span class="cf-stat-lbl">6s</span></div><div class="cf-stat-row"><span class="cf-stat-val">${pts}</span><span class="cf-stat-lbl">PTS</span></div></div></div></div>`;
  back.innerHTML=`<div class="cb-inner"><div class="cb-header"><div class="cb-name">${name.toUpperCase()}</div><div class="cb-sub">${team.abbr} \u00b7 ${pts} pts \u00b7 ${price} \u00b7 ${fantasyTeam}</div></div><div class="cb-grid"><div class="cb-stat"><div class="cb-stat-val">${runs}</div><div class="cb-stat-lbl">Runs</div></div><div class="cb-stat"><div class="cb-stat-val">${fours}</div><div class="cb-stat-lbl">4s</div></div><div class="cb-stat"><div class="cb-stat-val">${sixes}</div><div class="cb-stat-lbl">6s</div></div><div class="cb-stat"><div class="cb-stat-val">${cats}</div><div class="cb-stat-lbl">Catches</div></div><div class="cb-stat"><div class="cb-stat-val">${wkts}</div><div class="cb-stat-lbl">Wickets</div></div><div class="cb-stat"><div class="cb-stat-val">${maidens}</div><div class="cb-stat-lbl">Maidens</div></div><div class="cb-stat"><div class="cb-stat-val">${dots}</div><div class="cb-stat-lbl">Dots</div></div><div class="cb-stat"><div class="cb-stat-val">${fifties}</div><div class="cb-stat-lbl">50s</div></div><div class="cb-stat"><div class="cb-stat-val">${hunds}</div><div class="cb-stat-lbl">100s</div></div><div class="cb-stat"><div class="cb-stat-val">${threeW}</div><div class="cb-stat-lbl">3W</div></div><div class="cb-stat"><div class="cb-stat-val">${fiveW}</div><div class="cb-stat-lbl">5W</div></div><div class="cb-stat"><div class="cb-stat-val">${fourW}</div><div class="cb-stat-lbl">4W</div></div></div><div class="cb-footer">${pts} pts \u00b7 Rating ${rating}${isCap?" \u00b7 Captain \ud83c\udf1f":isVC?" \u00b7 Vice-Captain \u2b50":""}</div></div>`;
  document.getElementById("card-modal").classList.add("open");
}
function flipCard(){document.getElementById("card-flip").classList.toggle("flipped");}
function closeCardModal(){document.getElementById("card-modal").classList.remove("open");document.getElementById("card-flip").classList.remove("flipped");}
function handleCardOverlay(e){if(e.target===document.getElementById("card-modal"))closeCardModal();}

/* ========================
   FIELD VIEW
======================== */
async function loadField(){
  fieldLoaded=true;
  try{
    const r=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getRoles",teamName:myTeam})}).then(x=>x.json());
    if(r?.status==="success"){if(r.captain)localStorage.setItem("captain",r.captain);if(r.viceCaptain)localStorage.setItem("viceCaptain",r.viceCaptain);}
  }catch{}
  const lr=await fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"getLeaders"})}).then(x=>x.json()).catch(()=>null);
  leadersGlobal=lr?.leaders||{};
  myPlayersGlobal=allPlayers.filter(p=>p["Sold To"]===myTeam);
  const loadEl=document.getElementById("field-loading");
  if(!myPlayersGlobal.length){loadEl.innerHTML='<span style="font-size:42px">\ud83c\udfcf</span><br>Your squad is empty.<br>Head to Squad to draft players!';return;}
  loadEl.style.display="none";
  renderField();
}

function renderField(){
  const cap=localStorage.getItem("captain")||"",vc=localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal.orangeCap?.name||"").trim().toLowerCase();
  const pcName=(leadersGlobal.purpleCap?.name||"").trim().toLowerCase();
  const groups={WK:[],BAT:[],AR:[],BOWL:[]};
  myPlayersGlobal.forEach(p=>{const r=p["Role"];if(groups[r])groups[r].push(p);else groups.BAT.push(p);});
  const sorted=[...allPlayers].sort((a,b)=>getPts(b)-getPts(a));
  const rankMap={};sorted.forEach((p,i)=>{rankMap[(p["Player Name"]||"").trim()]=i+1;});
  const container=document.getElementById("field-container");
  const rows=[{label:"BOWLERS",key:"BOWL"},{label:"ALL-ROUNDERS",key:"AR"},{label:"BATTERS",key:"BAT"},{label:"WICKET-KEEPERS",key:"WK"}];
  let html="";
  rows.forEach(({label,key})=>{
    const pl=groups[key];if(!pl.length)return;
    const tokens=pl.map((p,idx)=>{
      const name=p["Player Name"]||"",nl=name.trim().toLowerCase();
      const isC=cap===name,isVC_=vc===name,isOC=ocName&&nl===ocName,isPC=pcName&&nl===pcName;
      const pts=getPts(p),tc=getTeam(p["IPL Team"]||""),sn=name.split(" ").slice(-1)[0],delay=idx*.06+.1;
      let badges="";
      if(isC) badges+='<div class="fp-badge cap-c">C</div>';
      else if(isVC_) badges+='<div class="fp-badge cap-vc">VC</div>';
      if(isOC) badges+='<div class="fp-badge orange-cap">\ud83e\udde2</div>';
      if(isPC) badges+='<div class="fp-badge purple-cap">\ud83c\udfa9</div>';
      const pImg=p["Image"]&&p["Image"].toString().trim();
      const logoHTML=pImg
        ?`<img src="${pImg}" style="width:46px;height:46px;object-fit:cover;object-position:top center;border-radius:50%;position:relative;z-index:1;" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`+
         (tc.logo?`<img src="${tc.logo}" style="width:34px;height:34px;object-fit:contain;display:none" alt="${tc.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;font-size:22px">${tc.fb}</span>`:`<span style="display:none;font-size:22px">${tc.fb}</span>`)
        :(tc.logo?`<img src="${tc.logo}" style="width:34px;height:34px;object-fit:contain;" alt="${tc.abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;font-size:22px">${tc.fb}</span>`:`<span style="font-size:22px">${tc.fb}</span>`);
      return`<div class="fp" style="animation-delay:${delay}s" onclick="openFmModal('${encodeURIComponent(name)}')">
        <div class="fp-avatar-wrap">
          <div class="fp-avatar" style="background:linear-gradient(135deg,${tc.c1},${tc.c2});border-color:${tc.c2}88">${logoHTML}</div>
          ${badges}
        </div>
        <div class="fp-name">${sn}</div>
        <div class="fp-pts">${pts} pts</div>
      </div>`;
    }).join("");
    html+=`<div class="role-label">${label}</div><div class="role-row">${tokens}</div>`;
  });
  const pitchStrip=container.querySelector(".pitch-strip");
  container.innerHTML="";container.appendChild(pitchStrip);
  const d=document.createElement("div");d.innerHTML=html;container.appendChild(d);
}

/* FIELD PLAYER DETAIL MODAL */
function openFmModal(enc){
  const name=decodeURIComponent(enc),p=myPlayersGlobal.find(x=>(x["Player Name"]||"")===name);
  if(!p)return;
  const tc=getTeam(p["IPL Team"]||""),cap=localStorage.getItem("captain")||"",vc=localStorage.getItem("viceCaptain")||"";
  const ocName=(leadersGlobal.orangeCap?.name||"").trim().toLowerCase(),pcName=(leadersGlobal.purpleCap?.name||"").trim().toLowerCase();
  const pnl=name.trim().toLowerCase(),pts=getPts(p);
  const sorted=[...allPlayers].sort((a,b)=>getPts(b)-getPts(a));
  const rank=sorted.findIndex(x=>(x["Player Name"]||"").trim()===name.trim())+1,total=sorted.length;
  document.getElementById("fm-header").style.background=`linear-gradient(135deg,${tc.c1} 0%,${tc.c2} 100%)`;
  const logoEl=document.getElementById("fm-logo");
  logoEl.style.background=`linear-gradient(135deg,${tc.c1},${tc.c2})`;
  logoEl.style.borderColor="rgba(255,255,255,.3)";
  const fmImg=p["Image"]&&p["Image"].toString().trim();
  logoEl.style.overflow="hidden";
  logoEl.style.padding="0";
  logoEl.innerHTML=fmImg
    ?`<img src="${fmImg}" style="width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:14px;" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`+
     (tc.logo?`<img src="${tc.logo}" style="width:42px;height:42px;object-fit:contain;display:none" alt="${tc.abbr}" onerror="this.style.display='none'"><span style="font-size:28px;display:none">${tc.fb}</span>`:`<span style="font-size:28px;display:none">${tc.fb}</span>`)
    :(tc.logo?`<img src="${tc.logo}" style="width:42px;height:42px;object-fit:contain;" alt="${tc.abbr}" onerror="this.parentNode.innerHTML='<span style=font-size:28px>${tc.fb}</span>'">`:`<span style="font-size:28px">${tc.fb}</span>`);
  document.getElementById("fm-name").textContent=name;
  document.getElementById("fm-sub").textContent=(p["IPL Team"]||"\u2014")+" \u00b7 "+(p["Role"]||"\u2014")+" \u00b7 \u20b9"+(p["Price Bought"]||"\u2014")+" Cr";
  let bh=`<span class="fmbadge role">${p["Role"]||"\u2014"}</span>`;
  if(cap===name) bh+='<span class="fmbadge captain">\ud83d\udc51 Captain</span>';
  if(vc===name)  bh+='<span class="fmbadge vc">\u2b50 Vice-Captain</span>';
  if(ocName&&pnl===ocName) bh+='<span class="fmbadge ocap">\ud83e\udde2 Orange Cap</span>';
  if(pcName&&pnl===pcName) bh+='<span class="fmbadge pcap">\ud83c\udfa9 Purple Cap</span>';
  bh+=`<span class="fmbadge price">\u20b9${p["Price Bought"]||"\u2014"} Cr</span>`;
  document.getElementById("fm-badges").innerHTML=bh;
  document.getElementById("fm-rank").textContent="#"+rank;
  document.getElementById("fm-rank-sub").textContent="out of "+total+" players";
  document.getElementById("fm-pts").textContent=pts;
  const statDefs={
    Batting:[{k:"Runs",i:"\ud83c\udfc3",l:"Runs"},{k:"6s",i:"\ud83d\udca5",l:"Sixes"},{k:"4s",i:"4\ufe0f\u20e3",l:"Fours"},{k:"50s",i:"\u2b50",l:"50s"},{k:"100s",i:"\ud83d\udcaf",l:"100s"}],
    Bowling:[{k:"Wickets",i:"\ud83c\udfaf",l:"Wickets"},{k:"Maidens",i:"\ud83d\udd35",l:"Maidens"},{k:"Dots",i:"\u26ab",l:"Dot Balls"},{k:"3W",i:"\ud83c\udfb3",l:"3-Wkt Haul"},{k:"5W",i:"\ud83d\udd25",l:"5-Wkt Haul"},{k:"fourv",i:"\u26a1",l:"4-Wkt Haul"}],
    Fielding:[{k:"Catches",i:"\ud83e\udddf",l:"Catches"},{k:"Run Outs",i:"\ud83c\udfc3",l:"Run Outs"},{k:"Stumpings",i:"\ud83e\udd45",l:"Stumpings"}]
  };
  let sh="";
  Object.entries(statDefs).forEach(([title,defs])=>{
    sh+=`<div class="fm-stats-title">${title}</div><div class="fm-stats-grid">`;
    defs.forEach(d=>{const v=parseFloat(p[d.k])||0;sh+=`<div class="fm-stat-box"><span class="fm-stat-icon">${d.i}</span><div class="fm-stat-val${v===0?" zero":""}">${v}</div><div class="fm-stat-label">${d.l}</div></div>`;});
    sh+="</div>";
  });
  document.getElementById("fm-stats").innerHTML=sh;
  document.getElementById("fm-modal").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeFmModal(){document.getElementById("fm-modal").classList.remove("open");document.body.style.overflow="";}
function handleFmOverlay(e){if(e.target===document.getElementById("fm-modal"))closeFmModal();}
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeCardModal();closeFmModal();}});
</script>
